function tickIntroCI(dt) {
  const cam = CI.cam;
  CI.introTimer += dt;
  const t = CI.introTimer;

  // Letterbox slides in quickly
  if (CI.letterbox < 1) CI.letterbox = Math.min(1, CI.letterbox + dt * 2.5);

  // Camera slow push toward player
  cam.curZoom += (cam.txz - cam.curZoom) * Math.min(1, dt * 0.25);
  cam.curX += (cam.tax - cam.curX) * Math.min(1, dt * 0.2);
  cam.curY += (cam.tay - cam.curY) * Math.min(1, dt * 0.2);

  // Darkness fades in gradually (starts black, fades to reveal dungeon)
  if (t < 1.0) {
    CI.introDark = Math.max(0, 1.0 - t * 0.9);
  } else {
    CI.introDark = Math.max(0, CI.introDark - dt * 0.4);
  }

  // Typewriter for current line
  CI.typewriterTimer += dt;
  const charsPerSec = 32;
  const tl = CI.typewriterTarget.length;
  const sl = Math.min(tl, Math.floor(CI.typewriterTimer * charsPerSec));
  CI.typewriterText = CI.typewriterTarget.substring(0, sl);

  // Advance intro lines on timer
  if (!CI.done) {
    CI.lineLife -= dt;
    if (CI.lineLife <= 0) {
      CI.introLineIdx++;
      if (CI.introLineIdx >= CI.lines.length) {
        // All lines done — fade out and release control
        CI.done = true;
        CI.phase = 2;
      } else {
        const next = CI.lines[CI.introLineIdx];
        CI.typewriterTarget = next.text;
        CI.typewriterText = '';
        CI.typewriterTimer = 0;
        CI.lineLife = next.dur;
      }
    }
  }

  // Fade out letterbox when done
  if (CI.phase === 2) {
    CI.fade = Math.min(1, CI.fade + dt * 1.2);
    CI.letterbox = Math.max(0, CI.letterbox - dt * 2.0);
    if (CI.fade >= 1) {
      endIntroCinematic();
    }
  }

  tickPRT(dt);
}

function tickBossIntroCI(dt) {
  const cam = CI.cam;
  CI.bossIntroTimer += dt;
  const t = CI.bossIntroTimer;

  // Letterbox
  if (CI.letterbox < 1) CI.letterbox = Math.min(1, CI.letterbox + dt * 2.0);

  // Camera slow pan from player upward to boss
  cam.curZoom += (cam.txz - cam.curZoom) * Math.min(1, dt * 0.18);
  cam.curX += (cam.tax - cam.curX) * Math.min(1, dt * 0.12);
  cam.curY += (cam.tay - cam.curY) * Math.min(1, dt * 0.12);

  // Red vignette builds over time
  CI.vignetteAmt = Math.min(0.55, t * 0.06);

  // Boss eye ignition and wing spread animate in
  if (t > 1.0) CI.bossEyeGlow = Math.min(1, (t - 1.0) * 0.8);
  if (t > 2.0) CI.bossWingSpread = Math.min(1, (t - 2.0) * 0.5);

  // Start showing subtitles after 1.5s
  if (t > 1.5 && CI.bossIntroLineIdx < CI.lines.length && CI.typewriterTarget === '') {
    const next = CI.lines[CI.bossIntroLineIdx];
    CI.typewriterTarget = next.text;
    CI.typewriterText = '';
    CI.typewriterTimer = 0;
    CI.lineLife = next.dur;
  }

  // Typewriter
  CI.typewriterTimer += dt;
  const charsPerSec = 32;
  const tl = CI.typewriterTarget.length;
  const sl = Math.min(tl, Math.floor(CI.typewriterTimer * charsPerSec));
  CI.typewriterText = CI.typewriterTarget.substring(0, sl);

  // Advance subtitle lines
  if (!CI.done && CI.typewriterTarget !== '') {
    CI.lineLife -= dt;
    if (CI.lineLife <= 0) {
      CI.bossIntroLineIdx++;
      if (CI.bossIntroLineIdx >= CI.lines.length) {
        CI.done = true;
        CI.phase = 2;
      } else {
        const next = CI.lines[CI.bossIntroLineIdx];
        CI.typewriterTarget = next.text;
        CI.typewriterText = '';
        CI.typewriterTimer = 0;
        CI.lineLife = next.dur;
      }
    }
  }

  // Fade out and activate boss
  if (CI.phase === 2) {
    CI.fade = Math.min(1, CI.fade + dt * 1.0);
    CI.letterbox = Math.max(0, CI.letterbox - dt * 1.5);
    if (CI.fade >= 1) {
      endBossIntroCinematic();
    }
  }

  tickPRT(dt);
}

function drawIntroCI() {
  const cam = CI.cam;
  CX.save();
  const ox = LW / 2 - cam.curX * T * cam.curZoom;
  const oy = LH / 2 - cam.curY * T * cam.curZoom;
  CX.translate(ox, oy);
  CX.scale(cam.curZoom, cam.curZoom);

  // Draw normal world
  const th = getTheme();
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (!MAP[r] || MAP[r][c] === undefined) continue;
    const tile = MAP[r][c], px = c * T, py = r * T;
    if (tile === 1) { CX.fillStyle = th.wc[(r * 37 + c * 13) % 4]; CX.fillRect(px, py, T, T); }
    else if (tile === 0 || tile === 2) { CX.fillStyle = th.fc[(r * 7 + c * 19) % 4]; CX.fillRect(px, py, T, T); }
  }

  // Torches
  TORCHES.forEach(t => {
    const fl = Math.sin(F * .22 + t.ph) * .2 + 1;
    const px = (t.x + .5) * T, py = (t.y + .5) * T;
    CX.fillStyle = '#78350f'; CX.fillRect(px - 2, py - 1, 4, 7);
    CX.fillStyle = ['#fde68a', '#f97316', '#fb923c'][(Math.floor(F * .28 + t.ph * 3)) % 3];
    CX.beginPath(); CX.ellipse(px, py - 5, 3.5 * fl, 6 * fl, 0, 0, 6.28); CX.fill();
  });

  // Player kneeling (breathing idle pose)
  AnimSystem.drawPlayer();

  drawPRT();
  CX.restore();

  // Darkness overlay fades from black
  if (CI.introDark > 0) {
    CX.fillStyle = 'rgba(0,0,0,' + CI.introDark.toFixed(3) + ')';
    CX.fillRect(0, 0, LW, LH);
  }

  // Fade overlay
  if (CI.fade > 0) {
    CX.fillStyle = 'rgba(0,0,0,' + CI.fade.toFixed(3) + ')';
    CX.fillRect(0, 0, LW, LH);
  }

  // Letterbox bars
  const lbH = 52 * easeInOut(CI.letterbox);
  CX.fillStyle = '#000';
  CX.fillRect(0, 0, LW, lbH);
  CX.fillRect(0, LH - lbH, LW, lbH);

  // Subtitle
  if (CI.typewriterText && CI.letterbox > 0.3) {
    const subY = LH - lbH - 22;
    const maxW = LW * 0.7;
    CX.font = 'italic 18px "Crimson Text", serif';
    CX.textAlign = 'center'; CX.textBaseline = 'alphabetic';
    const words = CI.typewriterText.split(' ');
    let row = '', rows = [];
    words.forEach(w => { const t2 = row + (row ? ' ' : '') + w; if (CX.measureText(t2).width > maxW) { rows.push(row); row = w; } else row = t2; });
    rows.push(row);
    const rh = 22, totalH = rows.length * rh;
    const sy = subY - totalH + rh;
    const bgX = LW * 0.15;
    const bgW = LW * 0.7;
    const bgH = totalH + 18;
    const grad = CX.createLinearGradient(0, sy - 14, 0, sy + bgH);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.2, 'rgba(0,0,0,0.72)');
    grad.addColorStop(1, 'rgba(0,0,0,0.72)');
    CX.fillStyle = grad; CX.fillRect(bgX, sy - 14, bgW, bgH);
    // Thin separator
    CX.strokeStyle = 'rgba(201,168,76,0.5)'; CX.lineWidth = 1;
    CX.beginPath(); CX.moveTo(LW * 0.2, sy - 8); CX.lineTo(LW * 0.8, sy - 8); CX.stroke();
    CX.fillStyle = 'rgba(220,210,190,0.95)';
    rows.forEach((r, i) => CX.fillText(r, LW / 2, sy + i * rh));
    // Blinking cursor
    if (CI.typewriterText.length < CI.typewriterTarget.length || (Math.floor(F * 0.05) % 2 === 0)) {
      CX.fillStyle = 'rgba(220,210,190,0.8)';
      const lastRowW = CX.measureText(rows[rows.length - 1]).width;
      CX.fillRect(LW / 2 + lastRowW / 2 + 3, sy + (rows.length - 1) * rh - 14, 2, 16);
    }
  }
}

function drawBossIntroCI() {
  const cam = CI.cam;
  CX.save();
  const ox = LW / 2 - cam.curX * T * cam.curZoom;
  const oy = LH / 2 - cam.curY * T * cam.curZoom;
  CX.translate(ox, oy);
  CX.scale(cam.curZoom, cam.curZoom);

  // Draw world
  const th = getTheme();
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (!MAP[r] || MAP[r][c] === undefined) continue;
    const tile = MAP[r][c], px = c * T, py = r * T;
    if (tile === 1) { CX.fillStyle = th.wc[(r * 37 + c * 13) % 4]; CX.fillRect(px, py, T, T); }
    else if (tile === 0 || tile === 2) { CX.fillStyle = th.fc[(r * 7 + c * 19) % 4]; CX.fillRect(px, py, T, T); }
  }

  // Torches (dimmer during boss intro)
  TORCHES.forEach(t => {
    const fl = Math.sin(F * .22 + t.ph) * .15 + 0.7;
    const px = (t.x + .5) * T, py = (t.y + .5) * T;
    CX.fillStyle = '#78350f'; CX.fillRect(px - 2, py - 1, 4, 7);
    CX.fillStyle = '#b45309';
    CX.beginPath(); CX.ellipse(px, py - 5, 3 * fl, 5 * fl, 0, 0, 6.28); CX.fill();
  });

  drawPRT();

  // Draw boss as SILHOUETTE with eye ignition
  if (BOSS && BOSS.alive) {
    const bx = (BOSS.x + 0.5) * T, by = (BOSS.y + 0.5) * T;
    const wingS = 0.7 + CI.bossWingSpread * 1.3;  // wings grow as bossWingSpread goes 0→1

    CX.save();
    // Silhouette body — pure black shadow
    CX.shadowColor = CI.bossEyeGlow > 0.3 ? `rgba(200,0,0,${CI.bossEyeGlow * 0.8})` : 'transparent';
    CX.shadowBlur = 30 * CI.bossEyeGlow;

    // Wings silhouette
    CX.fillStyle = '#0a0005';
    for (let side = -1; side <= 1; side += 2) {
      CX.beginPath();
      CX.moveTo(bx, by - 12);
      CX.bezierCurveTo(
        bx + side * 18 * wingS, by - 28,
        bx + side * 42 * wingS, by - 10,
        bx + side * 48 * wingS, by + 18
      );
      CX.bezierCurveTo(
        bx + side * 36 * wingS, by + 8,
        bx + side * 14, by + 6,
        bx, by + 4
      );
      CX.closePath();
      CX.fill();
    }

    // Body silhouette
    CX.fillStyle = '#0a0005';
    CX.beginPath(); CX.ellipse(bx, by, 14, 22, 0, 0, 6.28); CX.fill();

    // Horns
    for (let side = -1; side <= 1; side += 2) {
      CX.fillStyle = '#0a0005';
      CX.beginPath();
      CX.moveTo(bx + side * 8, by - 18);
      CX.quadraticCurveTo(bx + side * 22, by - 42, bx + side * 14, by - 50);
      CX.quadraticCurveTo(bx + side * 18, by - 44, bx + side * 10, by - 20);
      CX.closePath(); CX.fill();
    }

    // Eyes ignite (0→1)
    if (CI.bossEyeGlow > 0) {
      const gAlpha = CI.bossEyeGlow;
      const eyePulse = Math.sin(F * 0.12) * 0.15 + 1;
      for (let side = -1; side <= 1; side += 2) {
        const ex = bx + side * 5, ey = by - 8;
        const eg = CX.createRadialGradient(ex, ey, 0, ex, ey, 7 * eyePulse);
        eg.addColorStop(0, `rgba(255,60,0,${gAlpha})`);
        eg.addColorStop(0.4, `rgba(200,0,0,${gAlpha * 0.7})`);
        eg.addColorStop(1, 'rgba(200,0,0,0)');
        CX.fillStyle = eg;
        CX.beginPath(); CX.arc(ex, ey, 7 * eyePulse, 0, 6.28); CX.fill();
        // Pupil slit
        CX.fillStyle = `rgba(255,120,0,${gAlpha})`;
        CX.beginPath(); CX.ellipse(ex, ey, 1.5, 4, 0, 0, 6.28); CX.fill();
      }
    }

    CX.restore();
  }

  // Player at bottom (kneeling silhouette)
  AnimSystem.drawPlayer();

  CX.restore();

  // Red vignette overlay (slowly builds)
  if (CI.vignetteAmt > 0) {
    const vg = CX.createRadialGradient(LW / 2, LH / 2, LW * 0.15, LW / 2, LH / 2, LW * 0.75);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(160,0,0,' + CI.vignetteAmt.toFixed(3) + ')');
    CX.fillStyle = vg; CX.fillRect(0, 0, LW, LH);
  }

  // Fade overlay
  if (CI.fade > 0) {
    CX.fillStyle = 'rgba(0,0,0,' + CI.fade.toFixed(3) + ')';
    CX.fillRect(0, 0, LW, LH);
  }

  // Letterbox bars
  const lbH = 52 * easeInOut(CI.letterbox);
  CX.fillStyle = '#000';
  CX.fillRect(0, 0, LW, lbH);
  CX.fillRect(0, LH - lbH, LW, lbH);

  // Subtitle
  if (CI.typewriterText && CI.letterbox > 0.3) {
    const subY = LH - lbH - 22;
    const maxW = LW * 0.7;
    CX.font = 'italic 18px "Crimson Text", serif';
    CX.textAlign = 'center'; CX.textBaseline = 'alphabetic';
    const words = CI.typewriterText.split(' ');
    let row = '', rows = [];
    words.forEach(w => { const t2 = row + (row ? ' ' : '') + w; if (CX.measureText(t2).width > maxW) { rows.push(row); row = w; } else row = t2; });
    rows.push(row);
    const rh = 22, totalH = rows.length * rh;
    const sy = subY - totalH + rh;
    const bgX = LW * 0.15, bgW = LW * 0.7, bgH = totalH + 18;
    const grad = CX.createLinearGradient(0, sy - 14, 0, sy + bgH);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.2, 'rgba(0,0,0,0.78)');
    grad.addColorStop(1, 'rgba(0,0,0,0.78)');
    CX.fillStyle = grad; CX.fillRect(bgX, sy - 14, bgW, bgH);
    CX.strokeStyle = 'rgba(180,0,0,0.6)'; CX.lineWidth = 1;
    CX.beginPath(); CX.moveTo(LW * 0.2, sy - 8); CX.lineTo(LW * 0.8, sy - 8); CX.stroke();
    CX.fillStyle = 'rgba(240,180,160,0.95)';
    rows.forEach((r, i) => CX.fillText(r, LW / 2, sy + i * rh));
    if (CI.typewriterText.length < CI.typewriterTarget.length || (Math.floor(F * 0.05) % 2 === 0)) {
      CX.fillStyle = 'rgba(240,180,160,0.8)';
      const lastRowW = CX.measureText(rows[rows.length - 1]).width;
      CX.fillRect(LW / 2 + lastRowW / 2 + 3, sy + (rows.length - 1) * rh - 14, 2, 16);
    }
  }
}

// ── Achievement Checker (reliable, runs every frame in playing state) ─
function checkAchievements() {
  if (!ACHIEVEMENTS) return;
  // first_blood
  if (!ACHIEVEMENTS.first_blood.unlocked && P.killed >= 1) unlockAchievement('first_blood');
  // savior
  if (!ACHIEVEMENTS.savior.unlocked && P.saved >= 5) unlockAchievement('savior');
  // untouchable — checked on exit, but also verify continuously
  // (actual unlock remains in checkExit to ensure level completion)
  // sanity_keeper
  if (!ACHIEVEMENTS.sanity_keeper.unlocked && LV >= 5 && P.san > 70) unlockAchievement('sanity_keeper');
  // boss_slayer
  if (!ACHIEVEMENTS.boss_slayer.unlocked && BOSS_DEAD) unlockAchievement('boss_slayer');
  // shield_bearer
  if (!ACHIEVEMENTS.shield_bearer.unlocked && P.shieldActive) unlockAchievement('shield_bearer');
  // sharpshooter
  if (!ACHIEVEMENTS.sharpshooter.unlocked && BOW_KILLS >= 10) unlockAchievement('sharpshooter');
}

// ── Main Loop ─────────────────────────────────────────────────────────
function loop(ts) {
  if(!lastTime) lastTime=ts;
  DT=Math.min((ts-lastTime)/1000,0.033);
  lastTime=ts; F++;

  const frozen=FREEZE_TIME>0;
  if(frozen) FREEZE_TIME=Math.max(0,FREEZE_TIME-DT);

  CX.clearRect(0,0,LW,LH);
  CX.save();

  if(SHK>0.3){CX.translate((Math.random()-.5)*SHK,(Math.random()-.5)*SHK);SHK*=Math.pow(.74,DT*TARGET_FPS);}else SHK=0;
  if(FADEIN){FADE=Math.max(0,FADE-DT*3);if(FADE<=0){FADE=0;FADEIN=false;}}
  if(AFL>0) AFL=Math.max(0,AFL-DT);
  if(DFL>0) DFL=Math.max(0,DFL-DT);

  if(STATE==='title'){
    drawTitle(); _hideIngamePause();
  } else if(STATE==='titlecinematic'){
    TC_tick(DT); TC_draw(); _hideIngamePause();
  } else if(STATE==='training'){
    TR_tick(DT); TR_draw(); _hideIngamePause();
  } else if(STATE==='playing'){
    _showIngamePause();
    const GDT = frozen ? 0 : DT * GAME_SPEED;
    if(!frozen){tickPlayer(GDT);tickENE(GDT);tickTraps(GDT);tickSanity(GDT);if(LV===10)tickBoss(GDT);}
    tickPRT(GDT); tickSlashTrails(GDT); tickProjectiles(GDT); tickAchievToasts(DT);
    checkAchievements();
    SoundManager.updateMusicLayers(DT);
    FX.update(DT);
    drawWorld(); drawAchievToasts(); drawHUD();
    if(AFL>0){CX.fillStyle=`rgba(255,255,255,${AFL/0.22})`;CX.fillRect(0,0,LW,LH);}
    if(DFL>0){CX.fillStyle=`rgba(220,38,38,${DFL/0.33})`;CX.fillRect(0,0,LW,LH);}
    if(P.san<40){const s=(40-P.san)/40;const vg=CX.createRadialGradient(LW/2,LH/2,LW*.13,LW/2,LH/2,LW*.72);vg.addColorStop(0,'transparent');vg.addColorStop(1,`rgba(80,0,120,${s*.62})`);CX.fillStyle=vg;CX.fillRect(0,0,LW,LH);}
    if(FADE>0){CX.fillStyle=`rgba(0,0,0,${FADE})`;CX.fillRect(0,0,LW,LH);}
  } else if(STATE==='cinematic'){
    _showIngamePause();
    tickCI(DT); drawCI(); drawHUD();
  } else if(STATE==='endcard'){
    drawEnd(); _hideIngamePause();
  } else if(STATE==='pause'){
    _showIngamePause();
    drawWorld(); drawHUD(); drawPause();
  } else if(STATE==='settings'){
    drawTitle(); drawSettings(); _hideIngamePause();
  } else if(STATE==='achievements'){
    drawTitle(); drawAchievPanel(); _hideIngamePause();
  }

  CX.restore();
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────────────────────────────
// 1. CINEMATIC TITLE CARD — TC_* namespace
// ─────────────────────────────────────────────────────────────────────
const TC = {
  timer: 0,
  phase: 0,      // 0=darkness, 1=torch ignite, 2=title reveal, 3=subtitle, 4=done
  fade: 1.0,
  titleAlpha: 0,
  subtitleAlpha: 0,
  dustParticles: [],
  torchSparks: [],
  skipped: false,
};

function TC_reset() {
  TC.timer = 0; TC.phase = 0; TC.fade = 1.0;
  TC.titleAlpha = 0; TC.subtitleAlpha = 0;
  TC.dustParticles = []; TC.torchSparks = [];
  TC.skipped = false;
  drawTitle._t = 0;
  // seed dust particles
  for (let i = 0; i < 28; i++) {
    TC.dustParticles.push({
      x: Math.random() * LW, y: Math.random() * LH,
      vx: (Math.random()-0.5)*0.22, vy: (Math.random()-0.5)*0.15,
      alpha: Math.random()*0.18+0.04, r: Math.random()*1.8+0.6
    });
  }
}
TC_reset();

function TC_skip() {
  TC.skipped = true;
  TC.phase = 99;
  drawTitle._t = 0;
  STATE = 'title';
}

function TC_tick(dt) {
  if (TC.skipped || TC.phase >= 99) { STATE = 'title'; return; }
  TC.timer += dt;

  // Update dust
  TC.dustParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = LW; if (p.x > LW) p.x = 0;
    if (p.y < 0) p.y = LH; if (p.y > LH) p.y = 0;
  });

  // Phase 0 → 1: pure darkness with dust, ~1.2s
  if (TC.phase === 0 && TC.timer > 1.2) { TC.phase = 1; TC.timer = 0; }

  // Phase 1 → torch sparks + light reveal, ~1.8s
  if (TC.phase === 1) {
    if (F % 3 === 0) {
      for (let i = 0; i < 3; i++) {
        TC.torchSparks.push({
          x: LW/2 + (Math.random()-0.5)*180, y: LH*0.62 + (Math.random()-0.5)*40,
          vx: (Math.random()-0.5)*1.8, vy: -Math.random()*2.2-0.5,
          life: 1.0, col: Math.random()<0.5?'#fde68a':'#f97316', r: Math.random()*2.5+1
        });
      }
    }
    TC.fade = Math.max(0, 1 - TC.timer/1.8);
    if (TC.timer > 1.8) { TC.phase = 2; TC.timer = 0; }
  }
  if (TC.phase >= 1) {
    TC.torchSparks.forEach(s => { s.x+=s.vx; s.y+=s.vy; s.vy+=0.04; s.life-=dt*1.1; });
    TC.torchSparks = TC.torchSparks.filter(s => s.life > 0);
  }

  // Phase 2 → title golden reveal, ~1.5s
  if (TC.phase === 2) {
    TC.titleAlpha = Math.min(1, TC.timer / 1.5);
    if (TC.timer > 1.5) { TC.phase = 3; TC.timer = 0; }
  }

  // Phase 3 → subtitle + hold, ~1.8s then go to title
  if (TC.phase === 3) {
    TC.titleAlpha = 1;
    TC.subtitleAlpha = Math.min(1, TC.timer / 1.0);
    if (TC.timer > 2.2) { TC.phase = 4; TC.timer = 0; }
  }

  // Phase 4 → fade out and transition
  if (TC.phase === 4) {
    TC.fade = Math.min(1, TC.timer / 0.7);
    if (TC.timer > 0.7) {
      drawTitle._t = 0;
      STATE = 'title';
    }
  }
}

function TC_draw() {
  // Background dungeon silhouette
  CX.fillStyle = '#000'; CX.fillRect(0, 0, LW, LH);

  // Dungeon floor silhouette (background atmosphere)
  CX.fillStyle = '#0a0a18';
  for (let i = 0; i < Math.ceil(LW/40)+1; i++) {
    const bx = i*40, bh = i%2===0?60:40;
    CX.fillRect(bx, LH-bh, 36, bh);
  }
  CX.fillRect(0, LH-30, LW, 30);

  // Dust particles
  TC.dustParticles.forEach(p => {
    CX.save(); CX.globalAlpha = p.alpha * (TC.phase >= 1 ? 0.7 : 1);
    CX.fillStyle = '#c9a84c'; CX.beginPath(); CX.arc(p.x, p.y, p.r, 0, 6.28); CX.fill();
    CX.restore();
  });

  // Torch sparks (phase 1+)
  if (TC.phase >= 1) {
    TC.torchSparks.forEach(s => {
      CX.save(); CX.globalAlpha = s.life * 0.85;
      CX.fillStyle = s.col; CX.shadowColor = s.col; CX.shadowBlur = 8;
      CX.beginPath(); CX.arc(s.x, s.y, s.r*s.life, 0, 6.28); CX.fill();
      CX.restore();
    });
    // Torch glow radial under title area
    const torchAmt = TC.phase===1 ? Math.min(1, TC.timer/1.8) : 1;
    const tg = CX.createRadialGradient(LW/2, LH*0.72, 0, LW/2, LH*0.72, 280);
    tg.addColorStop(0, `rgba(249,115,22,${torchAmt*0.22})`);
    tg.addColorStop(0.5, `rgba(201,168,76,${torchAmt*0.10})`);
    tg.addColorStop(1, 'rgba(0,0,0,0)');
    CX.fillStyle = tg; CX.fillRect(0, 0, LW, LH);
  }

  // Title reveal (phase 2+)
  if (TC.titleAlpha > 0) {
    const ta = TC.titleAlpha;
    // Glow pulse
    const gp = Math.sin(F * 0.06) * 0.18 + 0.82;
    CX.save(); CX.globalAlpha = ta;
    CX.shadowColor = '#c9a84c'; CX.shadowBlur = 50 * gp;
    CX.fillStyle = '#fde68a'; CX.font = 'bold 72px Cinzel,serif';
    CX.textAlign = 'center'; CX.textBaseline = 'alphabetic';
    CX.fillText('DUNGEON', LW/2, LH/2 - 40);
    CX.fillText('BREAK', LW/2, LH/2 + 42);
    CX.shadowBlur = 0;
    CX.fillStyle = 'rgba(201,168,76,0.55)'; CX.font = 'italic 16px Crimson Text,serif';
    CX.fillText('— ABYSS EDITION —', LW/2, LH/2 + 72);
    CX.restore();
  }

  // Subtitle (phase 3+)
  if (TC.subtitleAlpha > 0) {
    CX.save(); CX.globalAlpha = TC.subtitleAlpha * 0.82;
    CX.fillStyle = '#94a3b8'; CX.font = 'italic 15px Crimson Text,serif';
    CX.textAlign = 'center'; CX.textBaseline = 'alphabetic';
    CX.fillText('"Escape the dungeon before it consumes you."', LW/2, LH/2 + 108);
    CX.restore();
  }

  // Skip hint
  if (TC.phase <= 3) {
    const sh = (Math.sin(F*0.07)*0.3+0.5);
    CX.save(); CX.globalAlpha = sh * 0.55;
    CX.fillStyle = '#64748b'; CX.font = '10px Cinzel,serif';
    CX.textAlign = 'center'; CX.textBaseline = 'alphabetic';
    CX.fillText('[ Click or Enter to skip ]', LW/2, LH - 18);
    CX.restore();
  }

  // Fade overlay (darkness in/out)
  if (TC.fade > 0) {
    CX.fillStyle = `rgba(0,0,0,${TC.fade})`; CX.fillRect(0, 0, LW, LH);
  }
}

function openTrainingDungeon() {

  TR._movedTimer = 0; TR._roomDwell = 0; TR._atkCd = 0;
  TR.currentMsg = TR_ROOMS[0].msg;

    }
  }

  // Fake one ROOM so Lighting.init() won't crash
  ROOMS = [{ cx: 8, cy: 10, x: 1, y: 1, w: COLS-2, h: ROWS-2 }];

  });

function TR_handleClick(mx, my) {
  // Exit button top-right
  if (mx > LW - 110 && my < 38) { TR_exitToMenu(); return; }
  // In exit portal room, click portal area
  if (TR.room === 7) {
    const px = LW/2, py = LH/2 + 60;
    if (Math.hypot(mx - px, my - py) < 50) TR_exitToMenu();
  }
}

function TR_handleExit() { if (TR.room === 7) TR_exitToMenu(); }

function TR_exitToMenu() {
  TR.fadingOut = true;
  TR.fade = 0;
}

function TR_nextRoom() {
  if (TR.room >= 7) return;
  TR.room++;
  TR.msgAlpha = 0; TR.msgTimer = 0;
  TR.currentMsg = TR_ROOMS[TR.room].msg;
  TR.fade = 1.0; TR.fadingIn = true;
  TR._roomDwell = 0;

  // Clear arrays populated by previous rooms
  ENE = []; TRAPS = []; ITEMS = []; ALLIES = [];

  if (TR.room === 2) {
    // Trap Room — place a real spike trap at centre
    TRAPS = [{ x: 14, y: 10, type: 'spike', timer: 0 }];
  }
  if (TR.room === 3) {
    // Weapon Room — place a real weapon item
    ITEMS = [{ x: 14, y: 10, taken: false, kind: 'weapon', sub: 'sword', rarity: RARITIES[0] }];
    TR.weaponPickedUp = false;
  }
  if (TR.room === 4) {
    // Enemy Room — place a slow skeleton (only once weapon is picked up, enforced in tick)
    TR.trainingEne = {
      x: 18, y: 10, vx: 0, vy: 0, alive: true,
      hp: 1, maxHp: 1, type: 'skeleton',
      alertT: 1.33, atkC: 0, ph: 0, dAnim: 0,
      hitFlash: 0, animState: 'idle', animTimer: 0, walkCycle: 0
    };
    ENE = [TR.trainingEne];
  }
  if (TR.room === 6) {
    // Survivor Room — place a real ally NPC
    ALLIES = [{ x: 18, y: 10, rescued: false, ph: 0.3 }];
  }
}

function TR_tick(dt) {
  TR.timer += dt;
  TR.pulseTrap = (Math.sin(TR.timer * 4) * 0.5 + 0.5);
  TR.weaponBob = Math.sin(TR.timer * 2.2) * 3;
  TR.npcBob = Math.sin(TR.timer * 1.4) * 2;
  TR.exitPortalGlow = Math.sin(TR.timer * 2.8) * 0.4 + 0.6;

  // Fade in
  if (TR.fadingIn) { TR.fade = Math.max(0, TR.fade - dt * 3); if (TR.fade <= 0) TR.fadingIn = false; }

  // Fade out → go to menu
  if (TR.fadingOut) {
    TR.fade = Math.min(1, TR.fade + dt * 3);
    if (TR.fade >= 1) { TR.fadingOut = false; drawTitle._t = 0; STATE = 'title'; return; }
  }

  // Message alpha
  TR.msgTimer += dt;
  TR.msgAlpha = Math.min(1, TR.msgTimer * 2.0);

  // Player movement
  let dx = 0, dy = 0;
  if (K['ArrowUp']    || K['w']) dy = -1;
  if (K['ArrowDown']  || K['s']) dy =  1;
  if (K['ArrowLeft']  || K['a']) dx = -1;
  if (K['ArrowRight'] || K['d']) dx =  1;
  if (Math.abs(TOUCH_DIR.x) > 0.15 || Math.abs(TOUCH_DIR.y) > 0.15) {
    const L = Math.hypot(TOUCH_DIR.x, TOUCH_DIR.y)||1;
    dx = TOUCH_DIR.x/L; dy = TOUCH_DIR.y/L;
  }
  const moving = (dx !== 0 || dy !== 0);
  if (moving) {
    const L = Math.hypot(dx,dy)||1;
    dx = dx/L*4*dt; dy = dy/L*4*dt;
    if (Math.abs(dx) > Math.abs(dy)) { TR.playerFx = dx>0?1:-1; TR.playerFy = 0; }
    else { TR.playerFx = 0; TR.playerFy = dy>0?1:-1; }
    TR.playerX += dx; TR.playerY += dy;
    TR.playerX = Math.max(1.3, Math.min(COLS-2.3, TR.playerX));
    TR.playerY = Math.max(1.3, Math.min(ROWS-2.3, TR.playerY));
  }

  // Sync P so AnimSystem.drawPlayer works correctly
  P.x = TR.playerX; P.y = TR.playerY;
  P.fx = TR.playerFx; P.fy = TR.playerFy;
  P.vx = dx/dt||0; P.vy = dy/dt||0;
  P.animState = moving ? 'walk' : 'idle';
  P.walkCycle += moving ? dt * 8 : 0;
  P.breathCycle += dt * 1.2;
  P.hitFlash = 0; P.dead = false; P.aanim = 0;

  // Tick particles (need F to advance)
  tickPRT(dt);

  // Room-specific logic
  if (TR.room === 1 && moving) {
    TR._movedTimer = (TR._movedTimer||0) + dt;
    if (TR._movedTimer > 2.5) { TR._movedTimer = 0; TR_nextRoom(); }
  }

  // Weapon Room — detect real item pickup
  if (TR.room === 3 && !TR.weaponPickedUp) {
    ITEMS.forEach(it => {
      if (!it.taken && Math.hypot(TR.playerX - it.x, TR.playerY - it.y) < 1.1) {
        it.taken = true;
        TR.weaponPickedUp = true;
        P.wep = it.sub; P.wepRarity = it.rarity;
        SoundManager.snd('item_pickup');
        spawnP(it.x, it.y, 8, {col:'#fde68a', spd:1.0, life:0.6, r:3, star:true});
        setTimeout(() => TR_nextRoom(), 600);
      }
    });
  }

  // Enemy Room — AI (only if weapon is held)
  if (TR.room === 4 && TR.trainingEne && TR.trainingEne.alive) {
    const e = TR.trainingEne;
    const edx = TR.playerX - e.x, edy = TR.playerY - e.y;
    const ed = Math.hypot(edx, edy) || 1;
    // Slower than normal enemies
    e.vx += (edx/ed) * 1.2 * 0.18 * dt;
    e.vy += (edy/ed) * 1.2 * 0.18 * dt;
    const spd2 = Math.hypot(e.vx, e.vy);
    if (spd2 > 1.2*dt) { e.vx = e.vx/spd2*1.2*dt; e.vy = e.vy/spd2*1.2*dt; }
    e.vx *= Math.pow(0.82, dt*TARGET_FPS); e.vy *= Math.pow(0.82, dt*TARGET_FPS);
    e.x += e.vx; e.y += e.vy;
    e.x = Math.max(1.3, Math.min(COLS-2.3, e.x));
    e.y = Math.max(1.3, Math.min(ROWS-2.3, e.y));
    if (e.hitFlash > 0) e.hitFlash = Math.max(0, e.hitFlash - dt);
    e.ph += 0.04*dt*TARGET_FPS;
    AnimSystem.tickEnemy(e, dt);

    // Player attack
    if (K[' '] && P.wep && ed < 1.8) {
      TR._atkCd = TR._atkCd || 0;
      if (TR._atkCd <= 0) {
        TR._atkCd = 0.35;
        e.hp--; e.hitFlash = 0.25;
        SoundManager.snd('melee_hit');
        spawnP(e.x, e.y, 6, {col:'#ef4444',spd:1.2,life:0.3,r:3});
        if (e.hp <= 0) {
          e.alive = false; e.dAnim = 0.5;
          SoundManager.snd('enemy_death');
          spawnP(e.x, e.y, 12, {col:'#ef4444',spd:1.5,life:0.8,r:4});
          setTimeout(() => TR_nextRoom(), 900);
        }
      }
    }
    if (TR._atkCd > 0) TR._atkCd -= dt;
  }

  // Exit portal proximity check
  if (TR.room === 7) {
    const portalTX = COLS/2, portalTY = (ROWS/2)+2;
    if (Math.hypot(TR.playerX - portalTX, TR.playerY - portalTY) < 1.5) {
      TR_exitToMenu();
    }
  }

  // Auto-advance for non-interactive rooms [spawn, mvmt, trap, wpn, ene, sanity, surv, portal]
  const autoDwell = [7, 0, 8, 0, 0, 8, 8, 0];
  if (autoDwell[TR.room] > 0) {
    TR._roomDwell = (TR._roomDwell||0) + dt;
    if (TR._roomDwell > autoDwell[TR.room]) { TR._roomDwell = 0; TR_nextRoom(); }
  }
}

  CX.fillStyle = '#000'; CX.fillRect(0, 0, LW, LH);

// ─────────────────────────────────────────────────────────────────────
// 3. PORTAL WARP TRANSITION  — called from checkExit portal logic
// ─────────────────────────────────────────────────────────────────────
const PW = {
  active: false, timer: 0, phase: 0,
  onComplete: null,
};

function startPortalWarp(callback) {
  PW.active = true; PW.timer = 0; PW.phase = 0;
  PW.onComplete = callback || null;
}

function tickPortalWarp(dt) {
  if (!PW.active) return;
  PW.timer += dt;
  if (PW.phase === 0 && PW.timer > 0.3) { PW.phase = 1; PW.timer = 0; }
  if (PW.phase === 1 && PW.timer > 0.4) { PW.phase = 2; PW.timer = 0; }
  if (PW.phase === 2 && PW.timer > 0.22) {
    PW.phase = 3; PW.timer = 0;
    if (PW.onComplete) PW.onComplete();
  }
  if (PW.phase === 3 && PW.timer > 0.5) { PW.active = false; }
  // Spawn spiral particles during phases 0-1
  if (PW.phase <= 1 && F % 2 === 0) {
    const a = PW.timer * 18; const r = 1.5;
    spawnP(P.x + Math.cos(a)*r, P.y + Math.sin(a)*r, 2, {col:'#34d399',spd:1.2,life:0.4,r:3,star:true});
  }
}

function drawPortalWarp() {
  if (!PW.active) return;
  if (PW.phase === 1) {
    const z = Math.min(1, PW.timer / 0.4);
    CX.save();
    const wg = CX.createRadialGradient(LW/2,LH/2,0,LW/2,LH/2,LW*0.7);
    wg.addColorStop(0,'rgba(52,211,153,0)');
    wg.addColorStop(0.5,`rgba(52,211,153,${z*0.15})`);
    wg.addColorStop(1,'rgba(0,0,0,0)');
    CX.fillStyle=wg; CX.fillRect(0,0,LW,LH); CX.restore();
  }
  if (PW.phase === 2) {
    const fl = Math.min(1, PW.timer/0.22);
    CX.fillStyle=`rgba(255,255,255,${fl})`; CX.fillRect(0,0,LW,LH);
  }
}

    const tx2 = (t.x + 0.5) * T, ty2 = (t.y + 0.5) * T;
    const radius = T * (3.2 + fl * 0.6);

// 5. FOG SYSTEM
// ─────────────────────────────────────────────────────────────────────
const FOG = {
  particles: [],
  timer: 0,
};
for (let i = 0; i < 18; i++) {
  FOG.particles.push({
    x: Math.random()*LW, y: Math.random()*LH,
    vx: (Math.random()-0.5)*0.18, vy: (Math.random()-0.5)*0.06,
    alpha: Math.random()*0.05+0.015, r: Math.random()*55+30,
    ph: Math.random()*6.28
  });
}

function tickFog(dt) {
  FOG.timer += dt;
  FOG.particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.ph += dt * 0.4;
    if (p.x < -p.r) p.x = LW + p.r;
    if (p.x > LW + p.r) p.x = -p.r;
    if (p.y < -p.r) p.y = LH + p.r;
    if (p.y > LH + p.r) p.y = -p.r;
  });
}

function drawFog() {
  if (STATE !== 'playing') return;
  FOG.particles.forEach(p => {
    const pa = p.alpha * (0.7 + Math.sin(p.ph) * 0.3);
    CX.save(); CX.globalAlpha = pa;
    CX.fillStyle = '#c4c4d0';
    CX.beginPath(); CX.arc(p.x, p.y, p.r, 0, 6.28); CX.fill();
    CX.restore();
  });
  // Screen edge darkening for atmosphere
  const eg = CX.createRadialGradient(LW/2, LH/2, LW*0.32, LW/2, LH/2, LW*0.72);
  eg.addColorStop(0, 'rgba(0,0,0,0)');
  eg.addColorStop(1, 'rgba(0,0,0,0.28)');
  CX.fillStyle = eg; CX.fillRect(0, 0, LW, LH);
}

// ─────────────────────────────────────────────────────────────────────
// 6. HALLUCINATION SYSTEM
// ─────────────────────────────────────────────────────────────────────
const HAL = {
  shadowEnemies: [],     // shadow shapes that vanish on approach
  fakeTraps: [],         // fake traps that vanish on step
  whisperTimer: 0,
  whisperInterval: 4.5,
  distortWave: 0,
  purpleTintAlpha: 0,
};

function tickHallucinations(dt) {
  if (typeof P === 'undefined' || STATE !== 'playing') return;
  const san = P.san;

  // Severity levels
  const mild   = san < 60 && san >= 40;
  const medium = san < 40 && san >= 20;
  const severe = san < 20 && san >= 8;
  const extreme= san < 8;

  // Mild — whispers (audio) + shadow shapes in corners
  if (mild || medium || severe || extreme) {
    HAL.whisperTimer += dt;
    if (HAL.whisperTimer >= HAL.whisperInterval) {
      HAL.whisperTimer = 0;
      HAL.whisperInterval = 3.0 + Math.random() * 3;
      // Whisper tone
      SoundManager.playTone(80 + Math.random()*40, 'sine', 0.8, 0.018, 60);
      // Shadow shape in random corner
      if (HAL.shadowEnemies.length < 4) {
        const corners = [{x:2,y:2},{x:COLS-3,y:2},{x:2,y:ROWS-3},{x:COLS-3,y:ROWS-3}];
        const c = corners[(Math.random()*4)|0];
        HAL.shadowEnemies.push({ x:c.x, y:c.y, alpha:0.7, life:2.5, fadingOut:false });
      }
    }
  }

  // Tick shadow enemies
  HAL.shadowEnemies.forEach(s => {
    s.life -= dt;
    if (s.life < 0.6 || Math.hypot(P.x-s.x, P.y-s.y) < 1.5) s.fadingOut = true;
    if (s.fadingOut) s.alpha = Math.max(0, s.alpha - dt*3);
  });
  HAL.shadowEnemies = HAL.shadowEnemies.filter(s => s.alpha > 0);

  // Medium — spawn fake traps occasionally
  if ((medium || severe || extreme) && Math.random() < dt * 0.12 && HAL.fakeTraps.length < 5) {
    const fx = 2 + Math.floor(Math.random()*(COLS-4));
    const fy = 2 + Math.floor(Math.random()*(ROWS-4));
    HAL.fakeTraps.push({ x:fx, y:fy, life:3.5, alpha:0.7 });
  }
  HAL.fakeTraps.forEach(ft => {
    ft.life -= dt;
    if (ft.life < 0.5 || Math.hypot(P.x-ft.x, P.y-ft.y) < 0.6) ft.alpha = Math.max(0, ft.alpha-dt*4);
    else ft.alpha = Math.min(0.7, ft.alpha);
  });
  HAL.fakeTraps = HAL.fakeTraps.filter(ft => ft.alpha > 0);

  // Severe / Extreme — distortion wave and purple tint
  if (severe || extreme) {
    HAL.distortWave = (HAL.distortWave + dt * (severe ? 1.8 : 3.5)) % (Math.PI * 2);
  }
  const targetPurple = extreme ? 0.28 : severe ? 0.18 : medium ? 0.08 : mild ? 0.03 : 0;
  HAL.purpleTintAlpha += (targetPurple - HAL.purpleTintAlpha) * Math.min(1, dt * 1.5);
}

function drawHallucinations() {
  if (STATE !== 'playing') return;
  const san = P.san;

  // Shadow enemies
  HAL.shadowEnemies.forEach(s => {
    const sx=(s.x+0.5)*T, sy=(s.y+0.5)*T;
    CX.save(); CX.globalAlpha=s.alpha*0.62;
    CX.fillStyle='#1a0030'; CX.shadowColor='#7c3aed'; CX.shadowBlur=12;
    CX.beginPath(); CX.ellipse(sx,sy,9,13,0,0,6.28); CX.fill();
    CX.beginPath(); CX.arc(sx,sy-16,7,0,6.28); CX.fill();
    CX.restore();
  });

  // Fake traps
  HAL.fakeTraps.forEach(ft => {
    const ftx=(ft.x+0.5)*T, fty=(ft.y+0.5)*T;
    CX.save(); CX.globalAlpha=ft.alpha;
    CX.strokeStyle='rgba(239,68,68,0.7)'; CX.lineWidth=2;
    CX.shadowColor='#ef4444'; CX.shadowBlur=8;
    CX.beginPath(); CX.arc(ftx,fty,T*0.45,0,6.28); CX.stroke();
    CX.fillStyle='rgba(239,68,68,0.12)'; CX.beginPath(); CX.arc(ftx,fty,T*0.45,0,6.28); CX.fill();
    CX.restore();
  });

  // Purple fog overlay
  if (HAL.purpleTintAlpha > 0.005) {
    CX.fillStyle=`rgba(60,0,120,${HAL.purpleTintAlpha})`;
    CX.fillRect(0,0,LW,LH);
  }

  // Distortion lines (severe+)
  if (san < 20) {
    const dw = HAL.distortWave;
    CX.save(); CX.globalAlpha=0.04 + (san < 8 ? 0.05 : 0);
    CX.strokeStyle='#a855f7'; CX.lineWidth=1.5;
    for (let y=0; y<LH; y+=18) {
      CX.beginPath();
      CX.moveTo(0, y + Math.sin(dw + y*0.03)*6);
      CX.lineTo(LW, y + Math.sin(dw + y*0.03 + 0.8)*6);
      CX.stroke();
    }
    CX.restore();
  }
}

// ─────────────────────────────────────────────────────────────────────
// 7. PATCH: inject fog, torch, hallucinations, portal warp into game loop
// Safe pattern: wrap with new named functions that call captured originals.
// Originals are captured into local variables BEFORE the wrappers are defined.
// The main loop calls tickPlayer/drawWorld/startGame — these variable references
// are re-pointed AFTER capture so no hoisting conflict occurs.
// ─────────────────────────────────────────────────────────────────────

// Step 1 — capture originals into uniquely-named variables
const _tp_orig = tickPlayer;

let EVENT_ROOMS = [];       // array of { roomIdx, type, state, timer, npc }
let ESCORT_COUNT = 0;       // persistent across runs

const EVENT_TYPES = ['blood_ritual', 'cursed_shrine', 'lost_survivor'];

function buildEventRooms() {
  EVENT_ROOMS = [];
  if (LV === 10 || ROOMS.length < 3) return;
  // Skip room 0 (spawn) and last (portal)
  for (let i = 1; i < ROOMS.length - 1; i++) {
    if (Math.random() < 0.13) {
      const type = EVENT_TYPES[(Math.random() * EVENT_TYPES.length) | 0];
      EVENT_ROOMS.push({
        roomIdx: i,
        type,
        state: 'idle',     // idle | active | done
        timer: 0,
        npc: null,
        choicePromptTimer: 0,
      });
    }
  }
}

function getEventRoomAt(wx, wy) {
  for (const ev of EVENT_ROOMS) {
    if (ev.state === 'done') continue;
    const rm = ROOMS[ev.roomIdx];
    if (!rm) continue;
    if (wx >= rm.x && wx < rm.x + rm.w && wy >= rm.y && wy < rm.y + rm.h) return ev;
  }
  return null;
}

function tickEventRooms(dt) {
  if (STATE !== 'playing' || P.dead) return;
  EVENT_ROOMS.forEach(ev => {
    if (ev.state === 'done') return;
    const rm = ROOMS[ev.roomIdx];
    if (!rm) return;
    const inRoom = P.x >= rm.x && P.x < rm.x + rm.w && P.y >= rm.y && P.y < rm.y + rm.h;
    if (!inRoom) { ev.choicePromptTimer = 0; return; }

    ev.timer += dt;
    if (ev.state === 'idle') ev.state = 'active';

    ev.choicePromptTimer = Math.min(ev.choicePromptTimer + dt * 2, 1);

    // Blood particles in blood ritual room
    if (ev.type === 'blood_ritual' && F % 6 === 0) {
      spawnP(rm.cx, rm.cy, 1, { col: '#dc2626', spd: 0.3, life: 0.8, r: 2, gv: -0.02 });
    }
    if (ev.type === 'cursed_shrine' && F % 8 === 0) {
      spawnP(rm.cx, rm.cy, 1, { col: '#a855f7', spd: 0.25, life: 0.9, r: 1.8, gv: -0.03 });
    }
  });
}

let ACTIVE_EVENT_CHOICE = null; // { ev, timer }

function openEventChoice(ev) {
  if (ACTIVE_EVENT_CHOICE) return;
  if (ev.state === 'done') return;
  ACTIVE_EVENT_CHOICE = { ev, timer: 0 };
  // Pause-like freeze during choice
}

function resolveEventChoice(choice) {
  if (!ACTIVE_EVENT_CHOICE) return;
  const ev = ACTIVE_EVENT_CHOICE.ev;
  ACTIVE_EVENT_CHOICE = null;
  ev.state = 'done';

  if (ev.type === 'blood_ritual') {
    if (choice === 1) { // Sacrifice HP for legendary weapon
      if (P.hp > 3) {
        P.hp -= 2; P.displayHp = P.hp;
        const sub = WK[(Math.random() * WK.length) | 0];
        P.wep = sub; P.wepRarity = RARITIES[3]; // Legendary
        GAME_MSG = '🩸 Blood offered — Legendary ' + WD[sub].label + ' acquired!'; GAME_MSG_TIMER = 4;
        shk(10);
        spawnP(ev.roomIdx >= 0 ? ROOMS[ev.roomIdx].cx : P.x, ev.roomIdx >= 0 ? ROOMS[ev.roomIdx].cy : P.y, 20, { col: '#dc2626', spd: 1.5, life: 0.9, r: 4, star: true });
        unlockAchievement('blood_pact');
      } else {
        GAME_MSG = '⚠ Not enough HP to complete the ritual!'; GAME_MSG_TIMER = 3;
      }
    } else {
      GAME_MSG = 'You step away from the altar.'; GAME_MSG_TIMER = 2;
    }
  } else if (ev.type === 'cursed_shrine') {
    if (choice === 1) { // +30 sanity
      P.san = Math.min(100, P.san + 30);
      GAME_MSG = '🔮 The shrine blesses you — +30 Sanity!'; GAME_MSG_TIMER = 3;
      spawnP(ROOMS[ev.roomIdx].cx, ROOMS[ev.roomIdx].cy, 15, { col: '#a855f7', spd: 1.2, life: 0.8, r: 3, star: true });
      unlockAchievement('dark_bargain');
    } else { // +2 max HP but spawn enemies
      P.maxHp += 2; P.hp = Math.min(P.maxHp, P.hp + 2);
      GAME_MSG = '💪 +2 Max HP — but something stirs…'; GAME_MSG_TIMER = 3;
      const rm = ROOMS[ev.roomIdx];
      for (let i = 0; i < 3; i++) {
        const ex = rm.x + 1 + ((Math.random() * (rm.w - 2)) | 0);
        const ey = rm.y + 1 + ((Math.random() * (rm.h - 2)) | 0);
        ENE.push({ x: ex, y: ey, vx: 0, vy: 0, alive: true, hp: 1, maxHp: 1, type: 'demon', alertT: 1, atkC: 0, ph: Math.random() * 6.28, dAnim: 0, hitFlash: 0, animState: 'idle', animTimer: 0, walkCycle: 0 });
      }
      shk(8);
      unlockAchievement('dark_bargain');
    }
  } else if (ev.type === 'lost_survivor') {
    if (choice === 1) { // Escort
      P.saved++;
      ESCORT_COUNT++;
      P.san = Math.min(100, P.san + 10);
      GAME_MSG = '🧍 You escort the survivor to safety. +sanity'; GAME_MSG_TIMER = 3.5;
      if (ESCORT_COUNT >= 5) unlockAchievement('guardian');
    } else { // Abandon
      P.san = Math.max(0, P.san - 20);
      GAME_MSG = '💔 You leave them behind. -20 Sanity.'; GAME_MSG_TIMER = 3;
      shk(4);
      unlockAchievement('heartless');
    }
  }
}

}

function triggerWeaponAbility() {
  if (!P.wep || P.dead) return;
  const rar = P.wepRarity;
  const dmgMult = rarityDmgMult(rar) * metaGetDmgMult();

  if (P.wep === 'sword') {
    const wa = WA.sword_spin;
    if (wa.timer > 0) { GAME_MSG = '🌀 Spin: ' + wa.timer.toFixed(1) + 's'; GAME_MSG_TIMER = 1; return; }
    wa.timer = wa.cd;
    shk(8);
    spawnRing(P.x, P.y, '#f59e0b');
    spawnP(P.x, P.y, 20, { col: '#f59e0b', spd: 1.5, life: 0.5, r: 4, star: true });
    let hits = 0;
    ENE.forEach(e => {
      if (!e.alive) return;
      if (Math.hypot(e.x - P.x, e.y - P.y) < 1.8) {
        const dmg = Math.ceil(2 * dmgMult);
        e.hp -= dmg; e.hitFlash = 0.2;
        hits++;
        if (e.hp <= 0) { killEnemy(e); P.san = Math.min(100, P.san + WD.sword.sg); }
      }
    });
    if (BOSS && BOSS.alive) { if (Math.hypot(BOSS.x - P.x, BOSS.y - P.y) < 2) damageBoss(Math.ceil(3 * dmgMult)); }
    GAME_MSG = '🌀 Sword Spin! Hit ' + hits + ' enemies'; GAME_MSG_TIMER = 2;
    wa.count++;
    if (wa.count >= 50) unlockAchievement('blade_master');

  } else if (P.wep === 'axe') {
    const wa = WA.axe_slam;
    if (wa.timer > 0) { GAME_MSG = '💥 Slam: ' + wa.timer.toFixed(1) + 's'; GAME_MSG_TIMER = 1; return; }
    wa.timer = wa.cd;
    shk(14);
    spawnP(P.x, P.y, 24, { col: '#f97316', spd: 2.0, life: 0.6, r: 5 });
    spawnRing(P.x, P.y, '#f97316');
    let hits = 0;
    ENE.forEach(e => {
      if (!e.alive) return;
      if (Math.hypot(e.x - P.x, e.y - P.y) < 2.2) {
        e.hp -= Math.ceil(2 * dmgMult); e.hitFlash = 0.25;
        e.vx = (e.x - P.x) * 3; e.vy = (e.y - P.y) * 3; // knockback = stun
        e.atkC = Math.max(e.atkC, 1.5); // stun cooldown
        hits++; wa.stunCount++;
        if (e.hp <= 0) { killEnemy(e); P.san = Math.min(100, P.san + WD.axe.sg); }
      }
    });
    if (BOSS && BOSS.alive) { if (Math.hypot(BOSS.x - P.x, BOSS.y - P.y) < 2.5) damageBoss(Math.ceil(4 * dmgMult)); }
    GAME_MSG = '💥 Ground Slam! Stunned ' + hits; GAME_MSG_TIMER = 2;
    if (wa.stunCount >= 30) unlockAchievement('crusher');

  } else if (P.wep === 'bow') {
    const wa = WA.bow_pierce;
    if (wa.timer > 0) { GAME_MSG = '🎯 Pierce: ' + wa.timer.toFixed(1) + 's'; GAME_MSG_TIMER = 1; return; }
    wa.timer = wa.cd;
    const vx2 = P.fx !== 0 ? P.fx : 0; const vy2 = P.fy !== 0 ? P.fy : -1;
    // Piercing arrow — handled via a special projectile flag
    PROJECTILES.push({ x: P.x, y: P.y, vx: vx2 * 14, vy: vy2 * 14, life: 0, damage: Math.ceil(3 * dmgMult), fromPlayer: true, hit: false, isBoss: false, piercing: true, piercedCount: 0 });
    SoundManager.snd('bow_shoot');
    GAME_MSG = '🎯 Piercing Arrow!'; GAME_MSG_TIMER = 2;

  } else if (P.wep === 'dagger') {
    const wa = WA.dagger_dash;
    if (wa.timer > 0) { GAME_MSG = '👻 Dash: ' + wa.timer.toFixed(1) + 's'; GAME_MSG_TIMER = 1; return; }
    wa.timer = wa.cd;
    // Find nearest enemy and teleport past them
    let nearest = null, nearDist = 999;
    ENE.forEach(e => { if (!e.alive) return; const d = Math.hypot(e.x - P.x, e.y - P.y); if (d < nearDist && d < 5) { nearDist = d; nearest = e; } });
    if (nearest) {
      const dx2 = nearest.x - P.x, dy2 = nearest.y - P.y;
      const L = Math.hypot(dx2, dy2) || 1;
      const nx2 = P.x + (dx2 / L) * (nearDist + 0.9);
      const ny2 = P.y + (dy2 / L) * (nearDist + 0.9);
      if (!solidAt(nx2, ny2)) { P.x = nx2; P.y = ny2; }
      nearest.hp -= Math.ceil(2 * dmgMult); nearest.hitFlash = 0.25;
      spawnP(nearest.x, nearest.y, 14, { col: '#a78bfa', spd: 1.8, life: 0.5, r: 3, star: true });
      if (nearest.hp <= 0) { killEnemy(nearest); P.san = Math.min(100, P.san + WD.dagger.sg); }
      wa.count++; shk(5);
      if (wa.count >= 20) unlockAchievement('phantom');
      GAME_MSG = '👻 Dash Strike!'; GAME_MSG_TIMER = 1.5;
    } else {
      GAME_MSG = '👻 No enemies in range'; GAME_MSG_TIMER = 1.5;
    }

  } else if (P.wep === 'spear') {
    const wa = WA.spear_throw;
    if (wa.timer > 0) { GAME_MSG = '🔱 Throw: ' + wa.timer.toFixed(1) + 's'; GAME_MSG_TIMER = 1; return; }
    wa.timer = wa.cd;
    const vx2 = P.fx !== 0 ? P.fx : 0; const vy2 = P.fy !== 0 ? P.fy : -1;
    PROJECTILES.push({ x: P.x, y: P.y, vx: vx2 * 12, vy: vy2 * 12, life: 0, damage: Math.ceil(2 * dmgMult), fromPlayer: true, hit: false, isBoss: false, spearThrow: true, spearHits: 0 });
    shk(4);
    GAME_MSG = '🔱 Spear Thrown!'; GAME_MSG_TIMER = 1.5;
  }
}

const ABYSS_FOG = [];
let ABYSS_WAVE_TIMER = 0;
const MAX_BOSS_ENEMIES = 12;

function spawnBossMinion(cx, cy, circleOffset) {
  // Respect enemy cap
  const aliveCount = ENE.filter(e => e.alive).length;
  if (aliveCount >= MAX_BOSS_ENEMIES) return;
  const types = ['skeleton', 'ghoul', 'demon', 'wraith'];
  const type = types[(Math.random() * types.length) | 0];
  const hp = type === 'wraith' ? 2 : type === 'demon' ? 2 : 1;
  let x, y;
  if (circleOffset !== undefined) {
    // Spawn in circle around player
    x = P.x + Math.cos(circleOffset) * 2.5;
    y = P.y + Math.sin(circleOffset) * 2.5;
  } else {
    // Spawn near boss or safe arena floor
    for (let attempt = 0; attempt < 20; attempt++) {
      const ang = Math.random() * 6.28;
      const dist = 2 + Math.random() * 3;
      const tx = cx + Math.cos(ang) * dist;
      const ty = cy + Math.sin(ang) * dist;
      if (!solidAt(tx, ty) && Math.hypot(tx - P.x, ty - P.y) > 1.5) { x = tx; y = ty; break; }
    }
    if (x === undefined) { const pos = rndFloor(4); x = pos.x; y = pos.y; }
  }
  if (solidAt(x, y)) return;
  ENE.push({ x, y, vx: 0, vy: 0, alive: true, hp, maxHp: hp, type, alertT: 1.0, atkC: 0, ph: Math.random() * 6.28, dAnim: 0, hitFlash: 0, animState: 'idle', animTimer: 0, walkCycle: 0 });
  spawnP(x, y, 6, { col: '#7c3aed', spd: 0.8, life: 0.5, r: 2.5, star: true });
}

function triggerPhase3ArenaTransform() {
  // One-time visual + mechanical blast
  GAME_MSG = '💀 "THE ABYSS CONSUMES ALL!"'; GAME_MSG_TIMER = 5;
  shk(18); AFL = 0.3;
  SoundManager.snd('boss_roar');

  // Crack floor particle burst
  for (let i = 0; i < 40; i++) {
    const fx = ROOMS[0].x + Math.random() * ROOMS[0].w;
    const fy = ROOMS[0].y + Math.random() * ROOMS[0].h;
    spawnP(fx, fy, 3, { col: '#550000', spd: 0.4, life: 2.0, r: 3.5, gv: -0.01 });
  }
  // Dark energy burst from boss
  spawnP(BOSS.x, BOSS.y, 50, { col: '#4c0080', spd: 2.5, life: 1.2, r: 5, star: true });
  spawnP(BOSS.x, BOSS.y, 30, { col: '#ef4444', spd: 2.0, life: 1.0, r: 4 });

  // Spawn fire traps in random safe spots (not on player)
  for (let i = 0; i < 8; i++) {
    let pos;
    for (let a = 0; a < 15; a++) {
      pos = rndFloor(3);
      if (Math.hypot(pos.x - P.x, pos.y - P.y) > 1.8) break;
    }
    TRAPS.push({ x: pos.x, y: pos.y, type: 'fire', timer: Math.random() * 2, phase3: true, life: 25 + Math.random() * 10 });
  }

  // Start abyss edge fog
  for (let i = 0; i < 20; i++) {
    ABYSS_FOG.push({ x: Math.random() * LW, y: Math.random() * LH, vx: (0.5 - Math.random()) * 0.3, vy: (0.5 - Math.random()) * 0.1, alpha: Math.random() * 0.12 + 0.04, r: Math.random() * 48 + 24, ph: Math.random() * 6.28 });
  }
}

// Patch spawnBoss to add new tracking fields
const _spawnBoss_orig = spawnBoss;
spawnBoss = function() {
  _spawnBoss_orig();
  if (!BOSS) return;
  BOSS.phaseAnnounced2  = false;
  BOSS.phaseAnnounced3  = false;
  BOSS.phase3Triggered  = false;
  BOSS.summonTimer      = 0;   // counts up; resets on each summon wave
  BOSS.bossTimerStart   = LEVEL_TIMER;
  BOSS.energyWaveTimer  = 0;
  ABYSS_FOG.length = 0;
  ABYSS_WAVE_TIMER = 0;
};

// Full boss tick override with summoning & arena effects
const _tickBoss_orig = tickBoss;
tickBoss = function(dt) {
  _tickBoss_orig(dt);
  if (!BOSS) return;

  // ── Tick phase-3 timed traps ─────────────────────────────────────
  if (BOSS.phase3Triggered) {
    for (let i = TRAPS.length - 1; i >= 0; i--) {
      const t = TRAPS[i];
      if (!t.phase3) continue;
      t.life -= dt;
      if (t.life <= 0) TRAPS.splice(i, 1);
    }
  }

  if (!BOSS.alive) {
    // On kill, unlock achievements
    unlockAchievement('abyss_slayer');
    if (P.san >= 15) unlockAchievement('unbreakable');
    if (BOSS.bossTimerStart !== undefined && (LEVEL_TIMER - BOSS.bossTimerStart) < 60) unlockAchievement('speed_killer');
    return;
  }

  const hpPct = BOSS.hp / BOSS.maxHp;

  // ── Phase 2 announcement (60%) ───────────────────────────────────
  if (hpPct <= 0.60 && !BOSS.phaseAnnounced2) {
    BOSS.phaseAnnounced2 = true;
    GAME_MSG = '⚠️ "THE ABYSS CLAIMS YOU!"'; GAME_MSG_TIMER = 4;
    shk(16); SoundManager.snd('boss_roar');
    spawnP(BOSS.x, BOSS.y, 28, { col: '#7c3aed', spd: 2.0, life: 1.2, r: 5, star: true });
    BOSS.summonTimer = 0; // reset summon clock for phase 2 interval
  }

  // ── Phase 3 one-time arena transformation (25%) ──────────────────
  if (hpPct <= 0.25 && !BOSS.phase3Triggered) {
    BOSS.phase3Triggered = true;
    triggerPhase3ArenaTransform();
    BOSS.summonTimer = 0;
  }

  // ── Enemy summoning per phase ────────────────────────────────────
  BOSS.summonTimer += dt;
  const aliveCount = ENE.filter(e => e.alive).length;
  let summonInterval, summonCount;
  if (hpPct <= 0.25) {
    summonInterval = 4; summonCount = 6;
  } else if (hpPct <= 0.60) {
    summonInterval = 6; summonCount = 4;
  } else {
    summonInterval = 8; summonCount = 2;
  }

  if (BOSS.summonTimer >= summonInterval) {
    BOSS.summonTimer = 0;
    if (aliveCount < MAX_BOSS_ENEMIES) {
      if (hpPct <= 0.60) {
        // Spawn in circle around player
        for (let i = 0; i < summonCount; i++) {
          const offset = (i / summonCount) * 6.28;
          spawnBossMinion(BOSS.x, BOSS.y, offset);
        }
      } else {
        // Phase 1: scatter near boss
        for (let i = 0; i < summonCount; i++) spawnBossMinion(BOSS.x, BOSS.y);
      }
      shk(5);
    }
  }

  // ── Phase 3 ongoing effects ──────────────────────────────────────
  if (BOSS.phase3Triggered) {
    // Abyss energy wave every 5 seconds
    ABYSS_WAVE_TIMER += dt;
    if (ABYSS_WAVE_TIMER >= 5) {
      ABYSS_WAVE_TIMER = 0;
      shk(4);
      // Ring of purple particles expanding from boss
      for (let i = 0; i < 24; i++) {
        const a = (i / 24) * 6.28;
        spawnP(BOSS.x + Math.cos(a) * 0.5, BOSS.y + Math.sin(a) * 0.5, 2, { col: '#7c3aed', spd: 2.2, life: 0.9, r: 3, angle: a, spread: 0.3, star: true });
      }
      // Spawn 2-3 fresh phase3 fire traps avoiding player
      const newTraps = 2 + (Math.random() < 0.4 ? 1 : 0);
      for (let i = 0; i < newTraps; i++) {
        let pos;
        for (let a = 0; a < 15; a++) {
          pos = rndFloor(3);
          if (Math.hypot(pos.x - P.x, pos.y - P.y) > 1.8) break;
        }
        TRAPS.push({ x: pos.x, y: pos.y, type: 'fire', timer: Math.random() * 2, phase3: true, life: 8 });
      }
    }

    // Abyss fog movement
    ABYSS_FOG.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.ph += dt * 0.5;
      if (p.x < -p.r) p.x = LW + p.r;
      if (p.x > LW + p.r) p.x = -p.r;
      if (p.y < -p.r) p.y = LH + p.r;
      if (p.y > LH + p.r) p.y = -p.r;
    });

    // Floor crack particles occasionally
    if (F % 10 === 0 && ROOMS[0]) {
      const rm = ROOMS[0];
      const cfx = rm.x + Math.random() * rm.w;
      const cfy = rm.y + Math.random() * rm.h;
      spawnP(cfx, cfy, 1, { col: '#550000', spd: 0.2, life: 1.8, r: 2.5, gv: -0.008 });
    }
  }
};

// ── Draw Phase 3 abyss fog overlay ───────────────────────────────────
// Injected into drawWorld via the patch below
function drawAbyssFog() {
  if (!BOSS || !BOSS.phase3Triggered || STATE !== 'playing') return;
  ABYSS_FOG.forEach(p => {
    const pa = p.alpha * (0.7 + Math.sin(p.ph) * 0.3);
    CX.save(); CX.globalAlpha = pa;
    CX.fillStyle = '#2d003a';
    CX.beginPath(); CX.arc(p.x, p.y, p.r, 0, 6.28); CX.fill();
    CX.restore();
  });
  // Dark purple arena tint during phase 3
  const tintAlpha = 0.18 + Math.sin(F * 0.04) * 0.05;
  CX.fillStyle = `rgba(40,0,60,${tintAlpha})`; CX.fillRect(0, 0, LW, LH);
}

// ─────────────────────────────────────────────────────────────────────
// 6. PIERCING ARROW & SPEAR THROW — patch tickProjectiles
// ─────────────────────────────────────────────────────────────────────
const _tickProj_orig = tickProjectiles;
tickProjectiles = function(dt) {
  // Handle new special projectile types first
  for (let i = PROJECTILES.length - 1; i >= 0; i--) {
    const pr = PROJECTILES[i];
    if (!pr.fromPlayer) continue;
    if (!pr.piercing && !pr.spearThrow) continue;

    pr.x += pr.vx * dt; pr.y += pr.vy * dt; pr.life += dt;
    if (F % 4 === 0) spawnP(pr.x, pr.y, 1, { col: pr.spearThrow ? '#38bdf8' : '#c4b5fd', spd: 0.3, life: 0.2, r: 2 });
    const maxLife = pr.spearThrow ? 16 / 12 : 16 / 14;
    if (solidAt(pr.x, pr.y) || pr.life > maxLife) { PROJECTILES.splice(i, 1); continue; }

    let hitAny = false;
    for (let j = ENE.length - 1; j >= 0; j--) {
      const e = ENE[j]; if (!e.alive) continue;
      if (Math.hypot(pr.x - e.x, pr.y - e.y) < 0.55) {
        e.hp -= pr.damage; e.hitFlash = 0.2;
        spawnP(pr.x, pr.y, 8, { col: '#38bdf8', spd: 1.2, life: 0.3, r: 3, star: true });
        if (e.hp <= 0) { killEnemy(e); P.san = Math.min(100, P.san + WD.spear.sg); }
        if (pr.spearThrow) {
          pr.spearHits = (pr.spearHits || 0) + 1;
          if (pr.spearHits >= 3) unlockAchievement('spear_lord');
          hitAny = true;
        }
        if (pr.piercing) {
          pr.piercedCount = (pr.piercedCount || 0) + 1;
          BOW_KILLS++;
          if (BOW_KILLS >= 50) unlockAchievement('sniper');
          // Don't remove — let it pass through
        } else {
          PROJECTILES.splice(i, 1); hitAny = false; break;
        }
      }
    }
  }
  // Original handles non-special projectiles
  _tickProj_orig(dt);
};

// ─────────────────────────────────────────────────────────────────────
// 7. SANITY ACHIEVEMENT TRACKING
// ─────────────────────────────────────────────────────────────────────
function checkSanityAchievements() {
  if (P.san < 40) unlockAchievement('paranoid');
  if (P.san < 10 && !P.dead) unlockAchievement('void_walker');
  if (P.san <= 0) unlockAchievement('mind_broken');
}

// ─────────────────────────────────────────────────────────────────────
// 8. WIRE EVERYTHING INTO THE GAME LOOP (safe capture → wrap pattern)
// ─────────────────────────────────────────────────────────────────────

// 8a. Patch loadLevel to build event rooms
const _ll_orig = loadLevel;
loadLevel = function() {
  _ll_orig();
  buildEventRooms();
  // Boss timer tracked on BOSS object after spawnBoss (in boss patch above)
};

// 8b. Patch tickPlayer to include weapon ability ticks, sanity checks
const _tp2_orig = tickPlayer;
tickPlayer = function(dt) {
  _tp2_orig(dt);
  tickWeaponAbilities(dt);
  tickEventRooms(dt);
  checkSanityAchievements();
};

// 8c. Patch drawWorld to include event decals and abyss fog
const _dw2_orig = drawWorld;
drawWorld = function() {
  _dw2_orig();
  drawEventRoomDecals();
  drawAbyssFog();
  drawEventChoiceUI();
};

// 8d. Patch startGame to reset escort count
const _sg2_orig = startGame;
startGame = function() {
  ESCORT_COUNT = 0;
  _sg2_orig();
};

// 8e. decideEnding — no meta hook needed (meta system removed)

// ─────────────────────────────────────────────────────────────────────
// 9. INPUT BINDINGS for new systems
// ─────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  // Weapon ability: Q key
  if (e.key === 'q' || e.key === 'Q') {
    if (STATE === 'playing') triggerWeaponAbility();
  }
  // Event choice keys
  if (ACTIVE_EVENT_CHOICE) {
    if (e.key === '1') resolveEventChoice(1);
    if (e.key === '2') resolveEventChoice(2);
    if (e.key === 'Escape') { ACTIVE_EVENT_CHOICE = null; }
  }
  // Interact with event room: E key
  if (e.key === 'e' || e.key === 'E') {
    if (STATE === 'playing') {
      const ev = getEventRoomAt(P.x, P.y);
      if (ev && ev.state !== 'done') openEventChoice(ev);
    }
  }
});

// Click handler for event choice UI
CV.addEventListener('click', e => {
  if (!ACTIVE_EVENT_CHOICE) return;
  const r = CV.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (LW / r.width);
  const my = (e.clientY - r.top) * (LH / r.height);
  const panW = 420, panH = 200;
  const panX = LW / 2 - panW / 2, panY = LH / 2 - panH / 2 - 40;
  // Button 1: panX+14, panY+72, 186×38
  if (mx >= panX + 14 && mx <= panX + 200 && my >= panY + 72 && my <= panY + 110) resolveEventChoice(1);
  // Button 2: panX+220, panY+72, 186×38
  if (mx >= panX + 220 && mx <= panX + 406 && my >= panY + 72 && my <= panY + 110) resolveEventChoice(2);
}, true); // capture phase so it fires before other click handlers

// ─────────────────────────────────────────────────────────────────────
// 10. TITLE SCREEN — no meta overlay needed (system removed)
// ─────────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────────
// 11. HUD ABILITY COOLDOWN DISPLAY — inject after drawHUD
// ─────────────────────────────────────────────────────────────────────
const _drawHUD_orig = drawHUD;
drawHUD = function() {
  _drawHUD_orig();
  if (STATE !== 'playing' || !P.wep) return;

  // Ability cooldown badge (bottom center)
  let abilityKey = null, wa = null, icon = '';
  if (P.wep === 'sword')  { abilityKey = 'sword_spin';  wa = WA.sword_spin;  icon = '🌀'; }
  if (P.wep === 'axe')    { abilityKey = 'axe_slam';    wa = WA.axe_slam;    icon = '💥'; }
  if (P.wep === 'bow')    { abilityKey = 'bow_pierce';  wa = WA.bow_pierce;  icon = '🎯'; }
  if (P.wep === 'dagger') { abilityKey = 'dagger_dash'; wa = WA.dagger_dash; icon = '👻'; }
  if (P.wep === 'spear')  { abilityKey = 'spear_throw'; wa = WA.spear_throw; icon = '🔱'; }

  if (!wa) return;
  const ready = wa.timer <= 0;
  const bx = LW / 2 - 56, by = LH - 130;
  CX.save();
  CX.fillStyle = ready ? 'rgba(34,197,94,0.2)' : 'rgba(0,0,0,0.5)';
  CX.strokeStyle = ready ? 'rgba(34,197,94,0.7)' : 'rgba(100,116,139,0.4)';
  CX.lineWidth = 1.5;
  roundRect(CX, bx, by, 112, 30, 6); CX.fill(); CX.stroke();

  if (!ready) {
    const frac = 1 - (wa.timer / wa.cd);
    CX.fillStyle = 'rgba(34,197,94,0.25)';
    roundRect(CX, bx, by, 112 * frac, 30, 6); CX.fill();
  }

  CX.font = '13px serif'; CX.textAlign = 'left'; CX.textBaseline = 'middle';
  CX.fillText(icon, bx + 8, by + 15);
  CX.fillStyle = ready ? '#22c55e' : '#64748b';
  CX.font = 'bold 9px Cinzel,serif'; CX.textBaseline = 'middle';
  CX.fillText(ready ? 'Q — READY' : 'Q — ' + wa.timer.toFixed(1) + 's', bx + 30, by + 15);
  CX.restore();

  // Event room prompt
  const ev = getEventRoomAt(P.x, P.y);
  if (ev && ev.state !== 'done' && !ACTIVE_EVENT_CHOICE) {
    const alpha = Math.sin(F * 0.15) * 0.3 + 0.7;
    CX.save(); CX.globalAlpha = alpha;
    CX.fillStyle = 'rgba(201,168,76,0.18)'; CX.strokeStyle = 'rgba(201,168,76,0.7)'; CX.lineWidth = 1;
    roundRect(CX, LW/2 - 90, LH/2 + 60, 180, 22, 5); CX.fill(); CX.stroke();
    CX.fillStyle = '#fde68a'; CX.font = 'bold 10px Cinzel,serif'; CX.textAlign = 'center'; CX.textBaseline = 'middle';
    CX.fillText('[E] Interact', LW/2, LH/2 + 71);
    CX.restore();
  }
};

// ─────────────────────────────────────────────────────────────────────
// END PATCH MODULE v7.0
// ─────────────────────────────────────────────────────────────────────
</script>
