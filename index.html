function tickPlayer(dt) {
  if (P.dead) return;

  // Movement
  let dx = 0, dy = 0;
  if (K['ArrowUp']   || K['w'] || TOUCH_DIR.y < -0.15) dy = -1;
  if (K['ArrowDown'] || K['s'] || TOUCH_DIR.y >  0.15) dy =  1;
  if (K['ArrowLeft'] || K['a'] || TOUCH_DIR.x < -0.15) dx = -1;
  if (K['ArrowRight']|| K['d'] || TOUCH_DIR.x >  0.15) dx =  1;

  if (Math.abs(TOUCH_DIR.x) > 0.15 || Math.abs(TOUCH_DIR.y) > 0.15) {
    const L = Math.hypot(TOUCH_DIR.x, TOUCH_DIR.y) || 1;
    dx = TOUCH_DIR.x / L; dy = TOUCH_DIR.y / L;
  }

  if (dx || dy) {
    const L = Math.hypot(dx, dy);
    dx = dx / L * P.spd * dt; dy = dy / L * P.spd * dt;
    if (Math.abs(dx) > Math.abs(dy)) { P.fx = dx > 0 ? 1 : -1; P.fy = 0; }
    else { P.fx = 0; P.fy = dy > 0 ? 1 : -1; }
    if (!solidAt(P.x + dx, P.y)) P.x += dx;
    if (!solidAt(P.x, P.y + dy)) P.y += dy;
    // Dust particles while moving
    if (F % 9 === 0) spawnP(P.x, P.y, 1, { col: '#c4a882', spd: .25, life: 0.22, r: 1.8, gv: .04, spread: 3.14 });
  }

  // Store velocity for animation system
  P.vx = dx / dt; P.vy = dy / dt;

  // Cooldowns
  if (P.acd > 0)     P.acd     = Math.max(0, P.acd - dt);
  if (P.aanim > 0)   P.aanim   = Math.max(0, P.aanim - dt);
  if (P.dcd > 0)     P.dcd     = Math.max(0, P.dcd - dt);
  if (P.icd > 0)     P.icd     = Math.max(0, P.icd - dt);
  if (P.hitFlash > 0)P.hitFlash = Math.max(0, P.hitFlash - dt);

  // Shield
  if (P.shieldActive) {
    P.shieldTimer = Math.max(0, P.shieldTimer - dt);
    if (P.shieldTimer <= 0) P.shieldActive = false;
    if (F % 5 === 0) spawnP(P.x + (Math.random() - .5) * 1.2, P.y + (Math.random() - .5) * 1.2, 1, { col: '#67e8f9', spd: .5, life: 0.35, r: 1.5, star: true });
  }

  LEVEL_TIMER += dt;
  const secs = Math.floor(LEVEL_TIMER);
  LEVEL_TIME_STR = String(Math.floor(secs / 60)).padStart(2, '0') + ':' + String(secs % 60).padStart(2, '0');

  SoundManager.tickHeartbeat(dt);
  checkExit();
  collectItems();
  collectAllies();

  if (LV === 5 && P.san > 70) unlockAchievement('sanity_keeper');
  P.displayHp += (P.hp - P.displayHp) * Math.min(1, dt * 8);

  // Animate
  AnimSystem.tickPlayer(dt);
}

function doAttack() {
  if (!P.wep || P.acd > 0 || P.dead) return;
  const w = WD[P.wep]; if (!w) return;
  const rar = P.wepRarity;
  P.acd = w.cd; P.aanim = w.cd; AFL = 0.07;

  if (w.projectile) {
    shk(w.shk);
    const ang = Math.atan2(P.fy, P.fx);
    const dm = Math.max(1, Math.round(rarityDmgMult(rar)));
    spawnProjectile(P.x, P.y, Math.cos(ang) * w.projSpd, Math.sin(ang) * w.projSpd, w.projDmg * dm);
    spawnP(P.x, P.y, 5, { col: '#34d399', spd: 1.2, life: 0.2, r: 1.8, angle: ang, spread: .5 });
    SoundManager.snd('bow_shoot');
    return;
  }

  shk(w.shk);
  const ang = Math.atan2(P.fy, P.fx);
  const tx = P.x + P.fx * w.range * .8, ty = P.y + P.fy * w.range * .8;
  spawnSlashTrail(P.x, P.y, ang, P.wep);

  if (P.wep === 'axe') {
    spawnP(tx, ty, 18, { col: w.sparkCol, spd: 1.8, life: 0.4, r: 4, angle: ang, spread: w.arc });
    spawnP(tx, ty, 6, { col: '#fde68a', spd: 1.0, life: 0.5, r: 2.2, star: true });
  } else if (P.wep === 'dagger') {
    spawnP(tx, ty, 5, { col: w.trailCol, spd: 1.5, life: 0.15, r: 2, angle: ang, spread: .45 });
  } else if (P.wep === 'spear') {
    spawnP(tx, ty, 8, { col: w.trailCol, spd: 1.8, life: 0.25, r: 2, angle: ang, spread: .28 });
  } else {
    spawnP(tx, ty, 7, { col: w.trailCol, spd: 1.2, life: 0.28, r: 2.5, angle: ang, spread: w.arc });
  }

  let hitAny = false;
  const dmg = Math.max(1, Math.round((w.dmg || 1) * rarityDmgMult(rar)));

  // Boss hit
  if (LV === 10 && BOSS && BOSS.alive) {
    const dist = Math.hypot(P.x - BOSS.x, P.y - BOSS.y);
    if (dist < w.range + 0.6) {
      const eAng = Math.atan2(BOSS.y - P.y, BOSS.x - P.x);
      const diff2 = Math.abs(((eAng - ang + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
      if (diff2 < w.arc * 1.3) {
        damageBoss(w.heavyDmg ? Math.round(w.heavyDmg * rarityDmgMult(rar)) : dmg);
        hitAny = true;
      }
    }
  }

  // Enemy hits
  for (let j = ENE.length - 1; j >= 0; j--) {
    const e = ENE[j]; if (!e.alive) continue;
    const dist = Math.hypot(P.x - e.x, P.y - e.y);
    if (dist < w.range) {
      const eAng = Math.atan2(e.y - P.y, e.x - P.x);
      const diff2 = Math.abs(((eAng - ang + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
      if (diff2 < w.arc * 1.2) {
        e.hp -= dmg; e.hitFlash = 0.17; hitAny = true;
        if (e.hp <= 0) { killEnemy(e); P.san = Math.min(100, P.san + w.sg); }
        else { shk(w.shk * .5); spawnP(e.x, e.y, 5, { col: '#ef4444', spd: 1.0, life: 0.2, r: 2, angle: ang, spread: 1.1 }); spawnRing(e.x, e.y, w.col); }
        SoundManager.snd('melee_hit');
      }
    }
  }

  if (hitAny) {
    FREEZE_TIME = Math.max(FREEZE_TIME, w.freezeT);
    spawnRing(tx, ty, w.col);
    FX.spawnImpactBurst(tx, ty, w.sparkCol, 1.5);
    for (let i = 0; i < w.sparkN; i++) {
      const a2 = ang + (Math.random() - .5) * w.arc;
      PRT.push({ wx: tx, wy: ty, vx: Math.cos(a2) * 1.2, vy: Math.sin(a2) * 1.2, life: 0.35, ml: 0.35, r: 1.8, col: w.sparkCol, gv: 0.05, star: false });
    }
  }
}

function killEnemy(e) {
  if (!e.alive) return;
  e.alive = false; e.dAnim = 0.5; P.killed++;
  shk(P.wep && WD[P.wep] ? WD[P.wep].shk : 5);
  spawnP(e.x, e.y, 16, { col: '#8b0000', spd: 1.8, life: 0.8, r: 3.5, gv: .04 });
  spawnP(e.x, e.y, 7, { col: '#7c3aed', spd: .7, life: 1.0, r: 2, gv: -.04 });
  spawnP(e.x, e.y, 4, { col: '#fde68a', spd: .6, life: 0.65, r: 1.5, star: true });
  BLOOD.push({ x: e.x, y: e.y, r: 6 + Math.random() * 6, a: .6 + Math.random() * .35 });
  FREEZE_TIME = Math.max(FREEZE_TIME, 0.15);
  SoundManager.snd('enemy_death');
  if (P.killed === 1) unlockAchievement('first_blood');
}

function playerTakeDamage(amount) {
  if (P.dead || P.dcd > 0 || P.shieldActive) return;
  P.hp = Math.max(0, P.hp - amount);
  P.dcd = 1.2; P.icd = 0.33; P.hitFlash = 0.23;
  DFL = 0.2; shk(7);
  spawnP(P.x, P.y, 8, { col: '#ef4444', spd: 1.2, life: 0.35, r: 3 });
  LEVEL_TOOK_DAMAGE = true;
  SoundManager.snd('player_hurt');
  if (P.hp <= 0 && !P.dead) {
    P.dead = true; P.hp = 0;
    if (P.deathCause !== 'boss') P.deathCause = 'enemy';
    if (P.san < 20 && P.killed > 15) P.deathCause = 'insanity_rampage';
    // Branching death handler
    if (P.san <= 0) triggerSanityCollapseDeath();
    else if (P.deathCause === 'boss') triggerBossExecutionDeath();
    else if (P.san < 20 && P.killed > 40) triggerConsumedDeath();
    else triggerOverwhelmedDeath();
  }
}

function tickSanity(dt) {
  if (P.dead) return;
  P.san = Math.max(0, P.san - getDiff(LV).sdrain * dt);
  if (P.san <= 0 && !P.dead) {
    P.dead = true;
    P.deathCause = 'sanity';
    triggerSanityCollapseDeath();
  }
  if (P.san < 35 && F % 5 === 0) spawnP(P.x + (Math.random() - .5) * 2, P.y + (Math.random() - .5) * 2, 1, { col: '#7c3aed', spd: .25, life: 0.9, r: 1.5 });
}

function checkExit() {
  if (PORTAL_USED || P.dead) return;
  const tx = Math.round(P.x), ty = Math.round(P.y);
  if (!MAP[ty] || MAP[ty][tx] !== 2) return;
  if (LV === 10 && !BOSS_DEAD) return;
  PORTAL_USED = true;
  SoundManager.snd('portal_enter');
  if (!LEVEL_TOOK_DAMAGE) unlockAchievement('untouchable');
  if (LEVEL_TIMER < 90) unlockAchievement('speed_runner');
  saveGame();
  if (LV >= MAX_LV) { decideEnding(); }
  else {
    LV++;
    let fv = 0;
    const iv = setInterval(() => {
      fv += 0.055; FADE = Math.min(1, fv);
      if (FADE >= 1) {
        clearInterval(iv);
        loadLevel();
        // LV10 gets its own boss intro cinematic; all others go straight to playing
        if (LV === 10) {
          startBossIntroCinematic();
        } else {
          STATE = 'playing';
          GAME_MSG = 'Level ' + LV + ' — ' + THEMES[Math.min(LV - 1, THEMES.length - 1)].name + ' — Find the portal.';
          GAME_MSG_TIMER = 5.0;
        }
      }
    }, 16);
  }
}

function collectItems() {
  ITEMS.forEach(it => {
    if (it.taken) return;
    if (Math.abs(P.x - it.x) < .65 && Math.abs(P.y - it.y) < .65) {
      it.taken = true;
      SoundManager.snd('item_pickup');
      if (it.kind === 'weapon') {
        P.wep = it.sub || WK[0]; P.wepRarity = it.rarity || RARITIES[0];
        const w = WD[P.wep] || WD.sword;
        GAME_MSG = w.label + ' acquired! [' + P.wepRarity.name + ']'; GAME_MSG_TIMER = 3.5;
        spawnP(it.x, it.y, 12, { col: w.col, spd: 1.2, life: 0.6, r: 3, star: true }); shk(2);
        if (P.wepRarity.name === 'Epic' || P.wepRarity.name === 'Legendary') {
          spawnP(it.x, it.y, 20, { col: P.wepRarity.col, spd: 2.0, life: 0.8, r: 4, star: true }); shk(5);
        }
        if (isMobile() && P.wep === 'bow') shootBtn.style.display = 'flex'; else shootBtn.style.display = 'none';
        if (isMobile()) specialBtn.style.display = 'flex';
      } else if (it.kind === 'health') {
        P.hp = Math.min(P.maxHp, P.hp + 1); GAME_MSG = '❤️ Health restored!'; GAME_MSG_TIMER = 3.0;
        spawnP(it.x, it.y, 10, { col: '#ef4444', spd: 1.0, life: 0.6, r: 3 });
      } else if (it.kind === 'sanity') {
        P.san = Math.min(100, P.san + 30); GAME_MSG = '🧠 Sanity restored!'; GAME_MSG_TIMER = 3.0;
        spawnP(it.x, it.y, 10, { col: '#818cf8', spd: 1.0, life: 0.6, r: 3 });
      } else if (it.kind === 'shield') {
        P.shieldActive = true; P.shieldTimer = 10;
        GAME_MSG = '🛡️ Shield active! 10s immunity!'; GAME_MSG_TIMER = 3.5;
        spawnP(it.x, it.y, 15, { col: '#67e8f9', spd: 1.5, life: 0.75, r: 3, star: true });
        spawnP(it.x, it.y, 10, { col: '#0ea5e9', spd: 0.8, life: 1.0, r: 2 });
        shk(2);
        SoundManager.snd('shield_activate');
        unlockAchievement('shield_bearer');
      }
    }
  });
}

function collectAllies() {
  ALLIES.forEach(a => {
    if (a.rescued) return;
    if (Math.abs(P.x - a.x) < .85 && Math.abs(P.y - a.y) < .85) {
      a.rescued = true; P.saved++; P.san = Math.min(100, P.san + 14);
      GAME_MSG = '🧍 Survivor rescued! +sanity'; GAME_MSG_TIMER = 3.0;
      spawnP(a.x, a.y, 12, { col: '#22c55e', spd: 1.0, life: 0.7, r: 2.5 });
      SoundManager.snd('item_pickup');
      if (P.saved >= 5) unlockAchievement('savior');
    }
  });
}

// =====================================================================
//  DUNGEON BREAK — ABYSS EDITION  v6.0  — boss.js
//  Abyss Warden — 3-phase boss with projectiles, slam, rage mode
// =====================================================================

function spawnBoss() {
  const cx = (COLS / 2) | 0, cy = (ROWS / 2) | 0;
  BOSS = {
    x: cx, y: cy,          // exact arena centre
    vx: 0, vy: 0,
    hp: 80, maxHp: 80,
    alive: true, phase: 1,
    atkC: 99, ph: 0,       // 99s cooldown — AI frozen until cinematic unlocks it
    hitFlash: 0, icd: 0,
    dAnim: 0, slamAnim: 0,
    slamWarning: null, projC: 99
  };
  BOSS_AI_ACTIVE = false;  // explicitly locked; set true after boss intro ends
}

function tickBoss(dt) {
  if (!BOSS) return;

  // Keep visual pulse alive but freeze ALL combat/movement until intro cinematic done
  if (!BOSS_AI_ACTIVE && BOSS.alive) { BOSS.ph += 0.03 * dt * TARGET_FPS; return; }

  if (!BOSS.alive) {
    BOSS.dAnim = Math.max(0, BOSS.dAnim - dt);
    if (BOSS.dAnim <= 0 && !BOSS_PORTAL_UNLOCKED) {
      BOSS_PORTAL_UNLOCKED = true;
      spawnP(BOSS.x, BOSS.y, 60, { col: '#fde68a', spd: 2.0, life: 1.5, r: 5, star: true });
      spawnP(BOSS.x, BOSS.y, 30, { col: '#ef4444', spd: 1.5, life: 1.2, r: 3 });
      shk(18); AFL = 0.3; BOSS_DEAD = true;
      unlockAchievement('boss_slayer');
      GAME_MSG = '✦ Abyss Warden defeated! Portal is now open!'; GAME_MSG_TIMER = 5;
    }
    // Tick remaining boss projectiles
    for (let i = PROJECTILES.length - 1; i >= 0; i--) {
      const pr = PROJECTILES[i]; if (!pr.isBoss) continue;
      pr.x += pr.vx * dt; pr.y += pr.vy * dt; pr.life += dt;
      if (solidAt(pr.x, pr.y) || pr.life > pr.maxLife) PROJECTILES.splice(i, 1);
    }
    return;
  }

  BOSS.ph += 0.03 * dt * TARGET_FPS;
  if (BOSS.atkC > 0)     BOSS.atkC     = Math.max(0, BOSS.atkC - dt);
  if (BOSS.hitFlash > 0) BOSS.hitFlash = Math.max(0, BOSS.hitFlash - dt);
  if (BOSS.icd > 0)      BOSS.icd      = Math.max(0, BOSS.icd - dt);
  if (BOSS.slamAnim > 0) BOSS.slamAnim = Math.max(0, BOSS.slamAnim - dt);
  if (BOSS.projC > 0)    BOSS.projC    = Math.max(0, BOSS.projC - dt);

  const hpPct = BOSS.hp / BOSS.maxHp;
  const prevPhase = BOSS.phase;
  if (hpPct <= 0.2) BOSS.phase = 3;
  else if (hpPct <= 0.5) BOSS.phase = 2;
  else BOSS.phase = 1;

  if (BOSS.phase > prevPhase) {
    shk(16);
    SoundManager.snd('boss_roar');
    spawnP(BOSS.x, BOSS.y, 25, { col: '#ef4444', spd: 1.5, life: 1.0, r: 4 });
    GAME_MSG = BOSS.phase === 2 ? '⚠️ Abyss Warden enrages!' : '💀 FINAL PHASE!';
    GAME_MSG_TIMER = 4;
  }

  const dx = P.x - BOSS.x, dy = P.y - BOSS.y, dist = Math.hypot(dx, dy);
  const spd = BOSS.phase === 3 ? 2.3 : BOSS.phase === 2 ? 1.7 : 1.2;

  if (BOSS.phase === 3 && F % 8 === 0) shk(3);

  if (dist > 0.5) {
    BOSS.vx += (dx / dist) * spd * 0.25 * dt;
    BOSS.vy += (dy / dist) * spd * 0.25 * dt;
  }
  const s2 = Math.hypot(BOSS.vx, BOSS.vy);
  if (s2 > spd * dt) { BOSS.vx = BOSS.vx / s2 * spd * dt; BOSS.vy = BOSS.vy / s2 * spd * dt; }
  BOSS.vx *= Math.pow(0.85, dt * TARGET_FPS);
  BOSS.vy *= Math.pow(0.85, dt * TARGET_FPS);

  const nx = BOSS.x + BOSS.vx, ny = BOSS.y + BOSS.vy;
  if (!solidAt(nx, BOSS.y)) BOSS.x = nx; else BOSS.vx *= -.5;
  if (!solidAt(BOSS.x, ny)) BOSS.y = ny; else BOSS.vy *= -.5;

  // Slam attack
  if (dist < 1.5 && BOSS.atkC <= 0) {
    BOSS.atkC = BOSS.phase === 3 ? 0.75 : BOSS.phase === 2 ? 1.08 : 1.42;
    BOSS.slamAnim = 0.33;
    BOSS.slamWarning = { x: P.x, y: P.y, timer: 0.33, fired: false };
    shk(8);
    SoundManager.snd('melee_hit');
    spawnP(BOSS.x, BOSS.y, 14, { col: '#ef4444', spd: 1.5, life: 0.5, r: 3, angle: Math.atan2(dy, dx), spread: 1.5 });
  }
  if (BOSS.slamWarning && !BOSS.slamWarning.fired) {
    BOSS.slamWarning.timer = Math.max(0, BOSS.slamWarning.timer - dt);
    if (BOSS.slamWarning.timer <= 0) {
      BOSS.slamWarning.fired = true;
      if (P.dcd <= 0 && Math.hypot(P.x - BOSS.slamWarning.x, P.y - BOSS.slamWarning.y) < 1.8) {
        P.deathCause = 'boss'; playerTakeDamage(2);
      }
    }
  }

  // Projectile spread
  if (BOSS.phase >= 2 && BOSS.projC <= 0) {
    BOSS.projC = BOSS.phase === 3 ? 0.67 : 1.17;
    const ang = Math.atan2(dy, dx);
    const spread = BOSS.phase === 3 ? 3 : 1;
    for (let i = -spread; i <= spread; i += spread || 1) {
      const a = ang + i * 0.35;
      PROJECTILES.push({ x: BOSS.x, y: BOSS.y, vx: Math.cos(a) * 10, vy: Math.sin(a) * 10, life: 0, maxLife: 5, damage: 1, fromPlayer: false, hit: false, isBoss: true });
    }
  }

  // Boss projectile → player
  for (let i = PROJECTILES.length - 1; i >= 0; i--) {
    const pr = PROJECTILES[i]; if (!pr.isBoss) continue;
    pr.x += pr.vx * dt; pr.y += pr.vy * dt; pr.life += dt;
    if (F % 5 === 0) spawnP(pr.x, pr.y, 1, { col: '#7c3aed', spd: 0.3, life: 0.25, r: 2 });
    if (solidAt(pr.x, pr.y) || pr.life > pr.maxLife) { PROJECTILES.splice(i, 1); continue; }
    if (!P.shieldActive && P.dcd <= 0 && !P.dead && Math.hypot(pr.x - P.x, pr.y - P.y) < 0.6) {
      PROJECTILES.splice(i, 1); P.deathCause = 'boss'; playerTakeDamage(1);
    }
  }
}

function damageBoss(dmg) {
  if (!BOSS || !BOSS.alive || BOSS.icd > 0) return;
  BOSS.hp = Math.max(0, BOSS.hp - dmg);
  BOSS.hitFlash = 0.2; BOSS.icd = 0.13; shk(6);
  if (BOSS.hp <= 0) {
    BOSS.alive = false; BOSS.dAnim = 1.0;
    shk(22); AFL = 0.33; FREEZE_TIME = 0.3;
    spawnP(BOSS.x, BOSS.y, 50, { col: '#fde68a', spd: 2.5, life: 1.5, r: 5, star: true });
    spawnP(BOSS.x, BOSS.y, 30, { col: '#ef4444', spd: 2.0, life: 1.3, r: 4 });
    spawnP(BOSS.x, BOSS.y, 15, { col: '#7c3aed', spd: 1.3, life: 2.0, r: 3 });
    SoundManager.snd('enemy_death');
  } else {
    SoundManager.snd('melee_hit');
    spawnP(BOSS.x, BOSS.y, 8, { col: '#ef4444', spd: 1.5, life: 0.4, r: 3 });
  }
}

function drawBoss() {
  if (!BOSS) return;
  const bx = (BOSS.x + .5) * T, by = (BOSS.y + .5) * T;
  if (!BOSS.alive) {
    if (BOSS.dAnim > 0) {
      const t = Math.max(0, BOSS.dAnim / 1.0);
      CX.save(); CX.globalAlpha = t;
      CX.fillStyle = '#7c3aed'; CX.beginPath(); CX.arc(bx, by, T * (1 - t + .2) * 1.4, 0, 6.28); CX.fill();
      CX.globalAlpha = 1; CX.restore();
    }
    return;
  }

  const hpPct = BOSS.hp / BOSS.maxHp;
  const floatY = Math.sin(F * .08 + BOSS.ph) * 4;
  const pulse = Math.sin(F * .12) * .5 + .5;

  // Shadow
  CX.fillStyle = 'rgba(0,0,0,.5)';
  CX.beginPath(); CX.ellipse(bx, by + 22, 28, 8, 0, 0, 6.28); CX.fill();

  // Slam warning indicator
  if (BOSS.slamWarning && !BOSS.slamWarning.fired) {
    const wmax = 0.33, wt = BOSS.slamWarning.timer;
    const wx2 = (BOSS.slamWarning.x + .5) * T, wy2 = (BOSS.slamWarning.y + .5) * T;
    CX.save(); CX.globalAlpha = (wmax - wt) / wmax * 0.7;
    CX.strokeStyle = '#ef4444'; CX.lineWidth = 3;
    CX.beginPath(); CX.arc(wx2, wy2, T * 1.1, 0, 6.28); CX.stroke();
    CX.fillStyle = 'rgba(239,68,68,0.15)';
    CX.beginPath(); CX.arc(wx2, wy2, T * 1.1, 0, 6.28); CX.fill(); CX.restore();
  }

  // Phase 3 rage aura
  if (BOSS.phase === 3) {
    const rageGrad = CX.createRadialGradient(bx,by-floatY,T*0.2,bx,by-floatY,T*1.5);
    rageGrad.addColorStop(0,`rgba(255,50,0,${pulse*0.18})`);
    rageGrad.addColorStop(1,'rgba(0,0,0,0)');
    CX.fillStyle=rageGrad; CX.beginPath(); CX.arc(bx, by - floatY, T * 1.5, 0, 6.28); CX.fill();
  }
  if (BOSS.phase >= 2) {
    const p2Grad = CX.createRadialGradient(bx,by-floatY,T*0.1,bx,by-floatY,T*1.1);
    p2Grad.addColorStop(0,`rgba(120,0,200,${pulse*0.15})`);
    p2Grad.addColorStop(1,'rgba(0,0,0,0)');
    CX.fillStyle=p2Grad; CX.beginPath(); CX.arc(bx, by-floatY, T*1.1, 0, 6.28); CX.fill();
  }

  const glowCol = BOSS.phase === 3 ? '#ef4444' : BOSS.phase === 2 ? '#7c3aed' : '#8b0000';
  CX.save(); CX.shadowColor = glowCol; CX.shadowBlur = 32 + pulse * 16;

  // WINGS (always present, larger in phase 2+)
  const wingSpan = BOSS.phase === 3 ? T*2.0 : BOSS.phase === 2 ? T*1.6 : T*1.1;
  const wingFlap = Math.sin(F * (BOSS.phase===3?0.22:0.15)) * 0.28;
  const wingCol = BOSS.phase === 3 ? 'rgba(90,10,10,0.88)' : BOSS.phase === 2 ? 'rgba(50,5,90,0.85)' : 'rgba(40,5,40,0.75)';
  const wingEdge = BOSS.phase === 3 ? 'rgba(220,30,30,0.4)' : BOSS.phase === 2 ? 'rgba(130,0,220,0.35)' : 'rgba(100,0,100,0.25)';
  // Left wing
  CX.fillStyle = wingCol;
  CX.beginPath();
  CX.moveTo(bx - T*0.45, by - floatY - T*0.1);
  CX.quadraticCurveTo(bx-wingSpan, by-floatY-T*(0.6+wingFlap), bx-wingSpan*0.8, by-floatY+T*0.5);
  // Wing fingers (bat membrane style)
  for(let wi=0;wi<3;wi++){
    const wfx = bx-wingSpan*(0.9-wi*0.22);
    const wfy = by-floatY-T*(0.55+wingFlap-wi*0.12);
    CX.lineTo(wfx, wfy);
  }
  CX.quadraticCurveTo(bx-T*0.7, by-floatY+T*0.25, bx-T*0.45, by-floatY+T*0.18);
  CX.closePath(); CX.fill();
  // Wing edge highlight
  CX.strokeStyle=wingEdge; CX.lineWidth=1.5;
  CX.beginPath(); CX.moveTo(bx-T*0.45,by-floatY-T*0.1); CX.quadraticCurveTo(bx-wingSpan,by-floatY-T*(0.6+wingFlap),bx-wingSpan*0.8,by-floatY+T*0.5); CX.stroke();
  // Right wing (mirror)
  CX.fillStyle = wingCol;
  CX.beginPath();
  CX.moveTo(bx + T*0.45, by - floatY - T*0.1);
  CX.quadraticCurveTo(bx+wingSpan, by-floatY-T*(0.6+wingFlap), bx+wingSpan*0.8, by-floatY+T*0.5);
  for(let wi=0;wi<3;wi++){
    const wfx = bx+wingSpan*(0.9-wi*0.22);
    const wfy = by-floatY-T*(0.55+wingFlap-wi*0.12);
    CX.lineTo(wfx, wfy);
  }
  CX.quadraticCurveTo(bx+T*0.7, by-floatY+T*0.25, bx+T*0.45, by-floatY+T*0.18);
  CX.closePath(); CX.fill();
  CX.strokeStyle=wingEdge; CX.lineWidth=1.5;
  CX.beginPath(); CX.moveTo(bx+T*0.45,by-floatY-T*0.1); CX.quadraticCurveTo(bx+wingSpan,by-floatY-T*(0.6+wingFlap),bx+wingSpan*0.8,by-floatY+T*0.5); CX.stroke();

  // Body (massive)
  const bodyCol = BOSS.phase === 3 ? '#7f1d1d' : BOSS.phase === 2 ? '#3b0764' : '#1a0000';
  CX.fillStyle = bodyCol;
  CX.beginPath(); CX.ellipse(bx, by - floatY, T * .52, T * .62, 0, 0, 6.28); CX.fill();

  // Armor plating on body
  CX.fillStyle = BOSS.phase===3 ? '#991b1b' : BOSS.phase===2 ? '#4c1d95' : '#2d0000';
  CX.beginPath(); CX.ellipse(bx, by-floatY, T*0.36, T*0.46, 0, 0, 6.28); CX.fill();

  // Chest core glow
  const coreCol = BOSS.phase===3 ? ['#ef4444','#fde68a'] : BOSS.phase===2 ? ['#7c3aed','#c4b5fd'] : ['#dc2626','#ef4444'];
  const coreGrad = CX.createRadialGradient(bx, by-floatY, 0, bx, by-floatY, T*0.3);
  coreGrad.addColorStop(0, coreCol[1]); coreGrad.addColorStop(0.4,coreCol[0]+'cc'); coreGrad.addColorStop(1,'rgba(0,0,0,0)');
  CX.fillStyle=coreGrad; CX.beginPath(); CX.arc(bx,by-floatY,T*0.3,0,6.28); CX.fill();

  // Chest plate rune lines
  CX.strokeStyle=coreCol[0]+'80'; CX.lineWidth=1;
  for(let ri=0;ri<4;ri++){const ra=(ri/4)*6.28+BOSS.ph*0.2; CX.beginPath(); CX.moveTo(bx,by-floatY); CX.lineTo(bx+Math.cos(ra)*T*0.28,by-floatY+Math.sin(ra)*T*0.28); CX.stroke();}

  // Head
  CX.fillStyle = '#0f0000';
  CX.beginPath(); CX.arc(bx, by - floatY - T * .55, T * .32, 0, 6.28); CX.fill();
  CX.fillStyle='rgba(0,0,0,0.4)'; CX.beginPath(); CX.arc(bx+4,by-floatY-T*0.55,T*0.22,0,6.28); CX.fill();

  // Massive curved horns
  CX.fillStyle = BOSS.phase===3?'#7f1d1d':'#450000';
  // Left horn (curved back)
  CX.beginPath();
  CX.moveTo(bx-T*0.22, by-floatY-T*0.8);
  CX.quadraticCurveTo(bx-T*0.55, by-floatY-T*1.4, bx-T*0.35, by-floatY-T*1.6);
  CX.quadraticCurveTo(bx-T*0.2, by-floatY-T*1.65, bx-T*0.15, by-floatY-T*1.3);
  CX.quadraticCurveTo(bx-T*0.3, by-floatY-T*1.0, bx-T*0.1, by-floatY-T*0.82);
  CX.closePath(); CX.fill();
  // Right horn
  CX.beginPath();
  CX.moveTo(bx+T*0.22, by-floatY-T*0.8);
  CX.quadraticCurveTo(bx+T*0.55, by-floatY-T*1.4, bx+T*0.35, by-floatY-T*1.6);
  CX.quadraticCurveTo(bx+T*0.2, by-floatY-T*1.65, bx+T*0.15, by-floatY-T*1.3);
  CX.quadraticCurveTo(bx+T*0.3, by-floatY-T*1.0, bx+T*0.1, by-floatY-T*0.82);
  CX.closePath(); CX.fill();

  // Shoulder spikes
  CX.fillStyle='#3d0000';
  for(let si=0;si<3;si++){
    const sx2=bx-T*0.45-si*T*0.08;
    CX.beginPath(); CX.moveTo(sx2,by-floatY-T*0.3+si*T*0.1); CX.lineTo(sx2-T*0.15,by-floatY-T*(0.5-si*0.05)); CX.lineTo(sx2+T*0.1,by-floatY-T*0.2+si*T*0.1); CX.closePath(); CX.fill();
    const sx3=bx+T*0.45+si*T*0.08;
    CX.beginPath(); CX.moveTo(sx3,by-floatY-T*0.3+si*T*0.1); CX.lineTo(sx3+T*0.15,by-floatY-T*(0.5-si*0.05)); CX.lineTo(sx3-T*0.1,by-floatY-T*0.2+si*T*0.1); CX.closePath(); CX.fill();
  }

  // Eyes (large, menacing)
  const eyeCol2 = BOSS.phase === 3 ? '#fde68a' : BOSS.phase===2 ? '#c4b5fd' : '#ef4444';
  CX.fillStyle = eyeCol2; CX.shadowColor = eyeCol2; CX.shadowBlur = 16 + pulse * 10;
  CX.beginPath(); CX.ellipse(bx-T*0.12, by-floatY-T*.58, 5+pulse*2, 3.5+pulse, 0, 0, 6.28); CX.fill();
  CX.beginPath(); CX.ellipse(bx+T*0.12, by-floatY-T*.58, 5+pulse*2, 3.5+pulse, 0, 0, 6.28); CX.fill();
  // Pupil slits
  CX.fillStyle='#0a0000'; CX.shadowBlur=0;
  CX.beginPath(); CX.ellipse(bx-T*0.12, by-floatY-T*0.58, 1.5, 3, 0, 0, 6.28); CX.fill();
  CX.beginPath(); CX.ellipse(bx+T*0.12, by-floatY-T*0.58, 1.5, 3, 0, 0, 6.28); CX.fill();

  CX.restore();

  // Hit flash
  if (BOSS.hitFlash > 0) {
    CX.save(); CX.globalAlpha = Math.min(1, BOSS.hitFlash / 0.2) * .7;
    CX.fillStyle = '#fff'; CX.beginPath(); CX.ellipse(bx, by - floatY, T * .55, T * .65, 0, 0, 6.28); CX.fill(); CX.restore();
  }
  // Slam ring
  if (BOSS.slamAnim > 0) {
    const sp = 1 - BOSS.slamAnim / 0.33;
    CX.save(); CX.globalAlpha = sp * .6;
    CX.strokeStyle = '#ef4444'; CX.lineWidth = 4;
    CX.beginPath(); CX.arc(bx, by - floatY, T * (0.5 + sp * 1.2), 0, 6.28); CX.stroke(); CX.restore();
  }

  // Boss HP bar
  const barW = LW * .65, barH = 18, barX = (LW - barW) / 2, barY = 14;
  CX.save();
  CX.fillStyle = 'rgba(0,0,0,.88)'; roundRect(CX, barX - 4, barY - 4, barW + 8, barH + 8, 4); CX.fill();
  CX.fillStyle = '#1a0000'; CX.fillRect(barX, barY, barW, barH);
  const hpColor = hpPct > 0.5 ? '#dc2626' : hpPct > 0.2 ? '#7c3aed' : '#fde68a';
  const hpGrad = CX.createLinearGradient(barX, 0, barX + barW, 0);
  hpGrad.addColorStop(0, hpColor + 'dd'); hpGrad.addColorStop(1, hpColor + '88');
  CX.fillStyle = hpGrad; CX.fillRect(barX, barY, barW * hpPct, barH);
  CX.strokeStyle = 'rgba(239,68,68,0.5)'; CX.lineWidth = 1.5; CX.strokeRect(barX, barY, barW, barH);
  CX.fillStyle = '#fff'; CX.font = 'bold 11px Cinzel,serif'; CX.textAlign = 'center'; CX.textBaseline = 'middle';
  CX.fillText('⚠ ABYSS WARDEN — Phase ' + BOSS.phase, LW / 2, barY + barH / 2);
  if (BOSS.phase === 3) {
    CX.fillStyle = `rgba(239,68,68,${pulse * 0.9})`; CX.font = 'bold 12px Cinzel,serif';
    CX.fillText('⚠ RAGE MODE', LW / 2, barY + barH + 15);
  }
  CX.restore();
}

  cam: { curZoom: 1, txz: 1, curX: 0, curY: 0, tax: 0, tay: 0 },

  typewriterTarget: '',
  typewriterTimer: 0,
};

// Easing helpers
function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

// ── Ending controller ────────────────────────────────────────────────────────
function decideEnding() {
  // Lock all gameplay systems
  STATE = 'cinematic';
  CINEMATIC_ACTIVE = true;
  hideTouchForCinematic();
  BOSS_AI_ACTIVE = false;
  TRAPS = [];
  ENE.forEach(e => { e.alive = false; });
  // Branch to specific ending
  if (P.san < 50 && P.saved < 4) triggerRampageEnding();
  else if (P.saved > 4) triggerBetrayedEnding();
  else if (P.san > 50 && P.saved >= 1) triggerTrueHeroEnding();
  else startVictoryCinematic();
}

function triggerRampageEnding() {
  STATE = 'cinematic'; CINEMATIC_ACTIVE = true;
  CI = {
    type: 'rampage', actors: [], lines: [], lineIdx: 0, lineFade: 0, lineLife: 3.3, phase: 0,
    cam: { curZoom: 1, txz: 1.8, curX: P.x, curY: P.y, tax: P.x, tay: P.y },
    letterbox: 0, fade: 0, shakeAmt: 0, done: false,
    deathTimer: 0, vignetteCol: 'rgba(200,0,0,', vignetteAmt: 0, pulse: 0,
    typewriterText: '', typewriterTarget: '', typewriterTimer: 0,
    toneCol: 'rgba(200,10,0,',
    rampageTimer: 0,
  };
  // Slow orbit: camera orbits player
  CI.cam.tax = P.x + 2.5; CI.cam.tay = P.y + 1.5;
  // Guard silhouettes converging
  for (let i = 0; i < 8; i++) {
    const ang = (i / 8) * Math.PI * 2;
    CI.actors.push({ x: P.x + Math.cos(ang) * 9, y: P.y + Math.sin(ang) * 9, tx: P.x + Math.cos(ang) * 1.2, ty: P.y + Math.sin(ang) * 1.2, type: 'guard', ph: i * 0.4, spd: 0.025 });
  }
  CI.lines = ['The dungeon fell.', 'But something did not.', 'Madness devours the mad.'];
  EC_T = '⚔️ THE LAST STAND'; EC_S = 'The dungeon was endless. So was the madness.'; EC_W = false;
  CI.typewriterTarget = CI.lines[0] || '';
  CI.typewriterText = ''; CI.typewriterTimer = 0;
  unlockAchievement('rampage');
}

function triggerBetrayedEnding() {
  STATE = 'cinematic'; CINEMATIC_ACTIVE = true;
  CI = {
    type: 'betrayed', actors: [], lines: [], lineIdx: 0, lineFade: 0, lineLife: 3.3, phase: 0,
    cam: { curZoom: 2.1, txz: 1.3, curX: P.x, curY: P.y, tax: P.x, tay: P.y },

  // Survivors gather then step back, guards appear behind
  for (let i = 0; i < 5; i++) {

  }
  CI.lines = ['You saved them.', 'They feared what saved them.', 'Mercy is not always returned.'];

  CI.typewriterTarget = CI.lines[0] || '';

}

function triggerTrueHeroEnding() {
  STATE = 'cinematic'; CINEMATIC_ACTIVE = true;
  CI = {
    type: 'hero', actors: [], lines: [], lineIdx: 0, lineFade: 0, lineLife: 3.3, phase: 0,
    cam: { curZoom: 1.85, txz: 1.6, curX: P.x, curY: P.y + 1, tax: P.x, tay: P.y },
    letterbox: 0, fade: 0, shakeAmt: 0, done: false,
    deathTimer: 0, vignetteCol: 'rgba(255,200,80,', vignetteAmt: 0, pulse: 0,

  };
  // Survivor walks beside player toward exit portal
  CI.actors.push({ x: P.x + 3.5, y: P.y + 2, tx: P.x + 0.9, ty: P.y + 0.5, type: 'survivor', ph: 0.3, spd: 0.02 });
  // Golden dust particles
  for (let i = 0; i < 5; i++) spawnP(P.x + (Math.random()-0.5)*4, P.y + (Math.random()-0.5)*4, 3, { col: '#fde68a', spd: 0.4, life: 1.5, r: 2.5, star: true });
  CI.lines = ['You walked through darkness.', 'And did not become it.', 'Some light survives.'];

function ciAdvance() {
  if (CI.done) return;
  if (CI.type === 'death_enemy' || CI.type === 'death_sanity' || CI.type === 'death_boss' || CI.type === 'death_insanity_rampage' || CI.type === 'death_sanity_collapse') return;
  // Skip intro cinematic
  if (CI.type === 'intro') { CI.done = true; endIntroCinematic(); return; }
  // Skip boss intro cinematic
  if (CI.type === 'boss_intro') { CI.done = true; endBossIntroCinematic(); return; }
  CI.lineIdx++;
  CI.lineFade = 0;
  CI.lineLife = 3.33;
  CI.typewriterText = '';
  CI.typewriterTarget = CI.lines[CI.lineIdx] || '';
  CI.typewriterTimer = 0;
  if (CI.lineIdx >= CI.lines.length) { CI.done = true; CI.phase = 2; }
}

function tickCI(dt) {
  const cam = CI.cam;

  // ── INTRO CINEMATIC tick ──────────────────────────────────────────────────
  if (CI.type === 'intro') { tickIntroCI(dt); return; }
  // ── BOSS INTRO CINEMATIC tick ─────────────────────────────────────────────
  if (CI.type === 'boss_intro') { tickBossIntroCI(dt); return; }

  // Smooth camera zoom and pan
  cam.curZoom += (cam.txz - cam.curZoom) * Math.min(1, dt * 0.42);
  cam.curX += (cam.tax - cam.curX) * Math.min(1, dt * 0.36);
  cam.curY += (cam.tay - cam.curY) * Math.min(1, dt * 0.36);

  // Letterbox slide in
  if (CI.letterbox < 1) CI.letterbox = Math.min(1, CI.letterbox + dt * 1.9);

  // Line fade
  if (CI.lineFade < 1) CI.lineFade = Math.min(1, CI.lineFade + dt * 1.7);

  // Typewriter effect
  CI.typewriterTimer += dt;
  const charsPerSec = 38;
  const targetLen = CI.typewriterTarget.length;
  const shownLen = Math.min(targetLen, Math.floor(CI.typewriterTimer * charsPerSec));
  CI.typewriterText = CI.typewriterTarget.substring(0, shownLen);

  const isDeathScene = CI.type === 'death_enemy' || CI.type === 'death_sanity' || CI.type === 'death_boss' || CI.type === 'death_insanity_rampage' || CI.type === 'death_sanity_collapse';

  if (isDeathScene) {
    CI.deathTimer = Math.max(0, CI.deathTimer - dt);
    CI.vignetteAmt = Math.min(1, CI.vignetteAmt + dt * 1.0);
    if (CI.type === 'death_sanity') CI.pulse = (Math.sin(F * .08) * .5 + .5) * CI.vignetteAmt;
    // Boss death: heavy screen crack effect — shake ramps up mid-scene
    if (CI.type === 'death_boss' && CI.vignetteAmt > 0.5) {
      if (F % 18 === 0) shk(8 * CI.vignetteAmt);
    }
    // Insanity rampage: heavy red distortion shake + glitch particles
    if (CI.type === 'death_insanity_rampage') {
      if (F % 6 === 0) shk(12 * CI.vignetteAmt);
      if (CI.vignetteAmt > 0.3 && F % 4 === 0) {
        spawnP(P.x + (Math.random() - .5) * 3, P.y + (Math.random() - .5) * 3, 2, { col: '#ef4444', spd: 1.5, life: 0.3, r: 3, star: true });
      }
    }
    // Sanity collapse: spiralling purple/red particles + camera zoom + ghost orbit + flicker shake
    if (CI.type === 'death_sanity_collapse') {
      CI.collapseTimer = (CI.collapseTimer || 0) + dt;
      const ct = CI.collapseTimer;
      // Scene 1 (0–3s): flickering light shake, purple particles begin
      if (ct < 3) {
        if (F % 14 === 0) shk(4 * CI.vignetteAmt);
        if (F % 6 === 0) spawnP(P.x + (Math.random()-.5)*4, P.y + (Math.random()-.5)*4, 1, { col: '#7c3aed', spd: 0.5, life: 0.8, r: 2 });
      }
      // Scene 2 (3–7s): ghosts orbit, particles swirl faster, camera zooms in
      if (ct >= 3 && ct < 7) {
        CI.cam.txz = 2.4;
        CI.actors.forEach(a => {
          a.orbitAng += dt * 1.1;
          a.tx = P.x + Math.cos(a.orbitAng) * a.orbitR;
          a.ty = P.y + Math.sin(a.orbitAng) * a.orbitR;
        });
        if (F % 4 === 0) spawnP(P.x + (Math.random()-.5)*5, P.y + (Math.random()-.5)*5, 2, { col: '#a855f7', spd: 0.8, life: 0.6, r: 2.5, star: true });
        if (F % 8 === 0) shk(6 * CI.vignetteAmt);
      }
      // Scene 3 (7–11s): player kneels, dark shadow grows, particles spiral down
      if (ct >= 7 && ct < 11) {
        CI.cam.txz = 2.8; CI.cam.tax = P.x; CI.cam.tay = P.y;
        if (F % 3 === 0) spawnP(P.x + (Math.random()-.5)*2, P.y + (Math.random()-.5)*2, 3, { col: '#4c0080', spd: 0.6, life: 1.0, r: 3 });
        if (F % 10 === 0) shk(9 * CI.vignetteAmt);
      }
      // Scene 4 (11s+): body dissolves — dark particles swallow player outward
      if (ct >= 11) {
        if (F % 2 === 0) spawnP(P.x + (Math.random()-.5)*1.5, P.y + (Math.random()-.5)*1.5, 4, { col: '#1a0030', spd: 1.8, life: 0.5, r: 4, star: true });
        if (F % 5 === 0) shk(14 * CI.vignetteAmt);
      }
    }
    if (CI.deathTimer <= 0 && !CI.done) {
      CI.lineLife -= dt;
      if (CI.lineFade < 1) CI.lineFade += dt * 1.5;
      if (CI.lineLife <= 0) {
        CI.lineIdx++;
        CI.lineFade = 0;
        CI.lineLife = 2.0;
        CI.typewriterText = '';
        CI.typewriterTarget = CI.lines[CI.lineIdx] || '';
        CI.typewriterTimer = 0;
        if (CI.lineIdx >= CI.lines.length) { CI.done = true; CI.phase = 2; }
      }
    }
  } else {
    if (!CI.done) { CI.lineLife -= dt; if (CI.lineLife <= 0) ciAdvance(); }
  }

  // Move actors
  CI.actors.forEach(a => {
    const adx = a.tx - a.x, ady = a.ty - a.y, ad = Math.hypot(adx, ady);
    if (ad > .04) { a.x += adx * a.spd * dt * TARGET_FPS; a.y += ady * a.spd * dt * TARGET_FPS; }
    a.ph += .035 * dt * TARGET_FPS;
  });

  // Phase transition — actors converge
  if (CI.phase === 0 && !isDeathScene) {
    const close = CI.actors.filter(a => Math.hypot(a.x - P.x, a.y - P.y) < 1.1).length;
    if (close >= Math.min(2, CI.actors.length)) {
      CI.phase = 1;
      CI.shakeAmt = CI.type === 'rampage' ? 14 : 10;
      const col = CI.type === 'hero' ? '#fde68a' : CI.type === 'betrayed' ? '#8b0000' : '#ef4444';
      spawnP(P.x, P.y, 25, { col, spd: 1.5, life: 1.2, r: 4, star: CI.type === 'hero' });
      shk(CI.shakeAmt);
    }
  }

  if (CI.shakeAmt > 0) { shk(CI.shakeAmt * .35); CI.shakeAmt *= Math.pow(0.88, dt * TARGET_FPS); }

  // Fade to end card
  if (CI.phase === 2) {
    CI.fade = Math.min(1, CI.fade + dt * 0.72);
    if (CI.fade >= 1) { STATE = 'endcard'; EC_A = 0; CINEMATIC_ACTIVE = false; }
  }

  tickPRT(dt);
  tickSlashTrails(dt);
}

function drawCI() {
  if (CI.type === 'intro') { drawIntroCI(); return; }
  if (CI.type === 'boss_intro') { drawBossIntroCI(); return; }
  const cam = CI.cam;
  CX.save();
  const ox = LW / 2 - cam.curX * T * cam.curZoom;
  const oy = LH / 2 - cam.curY * T * cam.curZoom;
  CX.translate(ox, oy);
  CX.scale(cam.curZoom, cam.curZoom);

  const th = getTheme();
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (!MAP[r] || MAP[r][c] === undefined) continue;
    const tile = MAP[r][c], px = c * T, py = r * T;
    if (tile === 1) { CX.fillStyle = th.wc[(r * 37 + c * 13) % 4]; CX.fillRect(px, py, T, T); }
    else if (tile === 0 || tile === 2) { CX.fillStyle = th.fc[(r * 7 + c * 19) % 4]; CX.fillRect(px, py, T, T); }
  }

  TORCHES.forEach(t => {
    const fl = Math.sin(F * .22 + t.ph) * .2 + 1;
    const px = (t.x + .5) * T, py = (t.y + .5) * T;
    CX.fillStyle = '#78350f'; CX.fillRect(px - 2, py - 1, 4, 7);
    CX.fillStyle = ['#fde68a', '#f97316', '#fb923c'][(Math.floor(F * .28 + t.ph * 3)) % 3];
    CX.beginPath(); CX.ellipse(px, py - 5, 3.5 * fl, 6 * fl, 0, 0, 6.28); CX.fill();
  });

  drawPRT(); drawSlashTrails();

  // Draw player
  AnimSystem.drawPlayer();

  // Cinematic actors
  CI.actors.forEach(a => {
    const ax = (a.x + .5) * T, ay = (a.y + .5) * T;
    const cols = { survivor: '#22c55e', traitor: '#ef4444', guard: '#64748b', phantom: '#c4b5fd' };
    const bodyCol = cols[a.type] || '#94a3b8';
    const walkB = Math.sin(a.ph * 3) * 1.5;
    if (a.type === 'phantom') CX.globalAlpha = .52 + Math.sin(F * .08 + a.ph) * .28;
    // Body
    CX.fillStyle = bodyCol; CX.beginPath(); CX.ellipse(ax, ay+walkB, 7, 9, 0, 0, 6.28); CX.fill();
    // Armor tint
    CX.fillStyle='rgba(0,0,0,0.2)'; CX.beginPath(); CX.ellipse(ax+2,ay+walkB,5,7,0,0,6.28); CX.fill();
    // Head
    CX.fillStyle = 'rgba(240,217,160,.88)'; CX.beginPath(); CX.arc(ax, ay - 7 + walkB, 5.5, 0, 6.28); CX.fill();
    // Guard helm
    if(a.type==='guard'){
      CX.fillStyle='#475569'; CX.beginPath(); CX.arc(ax,ay-9+walkB,5.8,Math.PI,2*Math.PI); CX.fill();
      CX.fillStyle='#334155'; CX.fillRect(ax-5.5,ay-9+walkB,11,3);
      // Guard spear
      CX.strokeStyle='#94a3b8'; CX.lineWidth=1.5;
      CX.beginPath(); CX.moveTo(ax+8,ay-12+walkB); CX.lineTo(ax+9,ay+8+walkB); CX.stroke();
      CX.fillStyle='#c0c0c0'; CX.beginPath(); CX.moveTo(ax+7,ay-14+walkB); CX.lineTo(ax+10,ay-12+walkB); CX.lineTo(ax+8,ay-12+walkB); CX.fill();
    }
    // Traitor hood
    if(a.type==='traitor'){
      CX.fillStyle='#1e293b'; CX.beginPath(); CX.arc(ax,ay-9+walkB,6,Math.PI,2*Math.PI); CX.fill();
      CX.fillStyle=bodyCol; CX.beginPath(); CX.arc(ax-2.5,ay-10+walkB,1.5,0,6.28); CX.fill();
      CX.beginPath(); CX.arc(ax+2.5,ay-10+walkB,1.5,0,6.28); CX.fill();
    }
    // Survivor warm color
    if(a.type==='survivor'){
      CX.fillStyle='#78350f'; CX.fillRect(ax-5,ay-1+walkB,10,9); // rags body
    }
    if (a.type === 'phantom') {
      CX.globalAlpha = .22 + Math.sin(F * .06 + a.ph) * .12;
      CX.fillStyle = '#818cf8'; CX.beginPath(); CX.arc(ax, ay, T * .45, 0, 6.28); CX.fill();
    }
    CX.globalAlpha = 1;
  });

  CX.restore();

  // Letterbox bars (eased) — 60px target height
  const lbH = 60 * easeInOut(CI.letterbox);
  CX.fillStyle = '#000';
  CX.fillRect(0, 0, LW, lbH);
  CX.fillRect(0, LH - lbH, LW, lbH);

  const isDeathScene = CI.type === 'death_enemy' || CI.type === 'death_sanity' || CI.type === 'death_boss' || CI.type === 'death_insanity_rampage' || CI.type === 'death_sanity_collapse';

  // Cinematic tone overlay (per ending type)
  if (!isDeathScene && CI.toneCol && CI.letterbox > 0.4) {
    const toneAlpha = CI.letterbox * 0.18;
    if (CI.type === 'hero') {
      // Warm dawn glow from top
      const dawnGrad = CX.createLinearGradient(0, 0, 0, LH);
      dawnGrad.addColorStop(0, `rgba(255,200,80,${toneAlpha*1.5})`);
      dawnGrad.addColorStop(0.5, `rgba(255,160,40,${toneAlpha*0.3})`);
      dawnGrad.addColorStop(1, 'rgba(0,0,0,0)');
      CX.fillStyle=dawnGrad; CX.fillRect(0,0,LW,LH);
    } else if (CI.type === 'rampage') {
      // Red chaos tint + slight desaturation
      CX.fillStyle=`rgba(180,0,0,${toneAlpha})`; CX.fillRect(0,0,LW,LH);
      // Chaotic shadow vignette
      const vigR=CX.createRadialGradient(LW/2,LH/2,LW*0.1,LW/2,LH/2,LW*0.75);
      vigR.addColorStop(0,'rgba(0,0,0,0)'); vigR.addColorStop(1,`rgba(50,0,0,${toneAlpha*2})`);
      CX.fillStyle=vigR; CX.fillRect(0,0,LW,LH);
    } else if (CI.type === 'betrayed') {
      // Cold blue-grey daylight
      CX.fillStyle=`rgba(40,60,120,${toneAlpha})`; CX.fillRect(0,0,LW,LH);
      const coldVig=CX.createRadialGradient(LW/2,LH/2,LW*0.2,LW/2,LH/2,LW*0.7);
      coldVig.addColorStop(0,'rgba(0,0,0,0)'); coldVig.addColorStop(1,`rgba(0,10,30,${toneAlpha*1.5})`);
      CX.fillStyle=coldVig; CX.fillRect(0,0,LW,LH);
    }
  }

  // Death vignette
  if (isDeathScene && CI.vignetteAmt > 0) {
    let vigAlpha = CI.vignetteAmt * .85;
    if (CI.type === 'death_sanity') vigAlpha += CI.pulse * .35;
    const vg = CX.createRadialGradient(LW / 2, LH / 2, LW * .08, LW / 2, LH / 2, LW * .75);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, CI.vignetteCol + vigAlpha + ')');
    CX.fillStyle = vg; CX.fillRect(0, 0, LW, LH);
    // Sanity collapse: purple scan lines
    if (CI.type === 'death_sanity') {
      for (let i = 0; i < 6; i++) {
        const ly = (LH * .2 + i * LH * .13 + Math.sin(F * .04 + i) * 8) | 0;
        CX.fillStyle = `rgba(160,0,255,${CI.vignetteAmt * .12 + Math.sin(F * .07 + i) * .05})`;
        CX.fillRect(0, ly, LW, 2 + Math.sin(F * .1 + i) * 2);
      }
    }
    // Sanity collapse (visual) — pulsing purple/red scanlines + fracture + dark shadow pool
    if (CI.type === 'death_sanity_collapse') {
      const ct = CI.collapseTimer || 0;
      // Rapid-flicker scanlines through all phases
      for (let i = 0; i < 8; i++) {
        const ly = (LH * .1 + i * LH * .11 + Math.sin(F * .05 + i * 1.1) * 14) | 0;
        const scanA = CI.vignetteAmt * (.1 + Math.sin(F * .08 + i) * .07);
        CX.fillStyle = ct < 7 ? `rgba(140,0,220,${scanA})` : `rgba(60,0,80,${scanA})`;
        CX.fillRect(0, ly, LW, 2 + Math.sin(F * .13 + i) * 3);
      }
      // Phase 2+ : random purple glitch bars
      if (ct >= 3 && F % 7 === 0) {
        const gly = Math.random() * LH;
        CX.fillStyle = `rgba(180,0,255,${Math.random() * 0.16})`;
        CX.fillRect(Math.random() * LW * 0.3, gly, LW * (0.2 + Math.random() * 0.5), 1 + Math.random() * 5);
      }
      // Phase 3+ : dark shadow pool beneath player — grows upward
      if (ct >= 7) {
        const px2 = CI.cam ? (LW / 2) : (P.x * 32 + 16);
        const py2 = CI.cam ? (LH / 2 + 30) : (P.y * 32 + 16);
        const poolR = Math.min(120, (ct - 7) * 20);
        const poolG = CX.createRadialGradient(LW/2, LH*0.62, 0, LW/2, LH*0.62, poolR);
        poolG.addColorStop(0, `rgba(10,0,20,${Math.min(0.85, (ct-7)*0.12)})`);
        poolG.addColorStop(1, 'rgba(0,0,0,0)');
        CX.fillStyle = poolG; CX.fillRect(0, 0, LW, LH);
      }
      // Phase 4 (11s+): fracture lines radiating from player
      if (ct >= 11) {
        CX.save();
        const fractureAlpha = Math.min(1, (ct - 11) * 0.4) * CI.vignetteAmt;
        CX.strokeStyle = `rgba(160,0,255,${fractureAlpha * 0.7})`;
        CX.lineWidth = 1.2;
        const fx = LW / 2, fy = LH / 2;
        for (let fr = 0; fr < 10; fr++) {
          const fang = fr * Math.PI / 5 + (ct * 0.3);
          const flen = (60 + fr * 25) * fractureAlpha;
          CX.beginPath(); CX.moveTo(fx, fy);
          CX.lineTo(fx + Math.cos(fang) * flen, fy + Math.sin(fang) * flen);
          CX.stroke();
        }
        CX.restore();
      }
    }
    // Boss execution: wing shadow spreading from top — full screen dark bloom
    if (CI.type === 'death_boss' && CI.vignetteAmt > 0.4) {
      const wingOverlay = CX.createLinearGradient(0, 0, 0, LH * 0.65);
      wingOverlay.addColorStop(0, `rgba(0,0,0,${CI.vignetteAmt * 0.82})`);
      wingOverlay.addColorStop(0.6, `rgba(20,0,0,${CI.vignetteAmt * 0.35})`);
      wingOverlay.addColorStop(1, 'rgba(0,0,0,0)');
      CX.fillStyle = wingOverlay; CX.fillRect(0, 0, LW, LH * 0.65);
      // Screen crack lines radiating from impact point
      if (CI.vignetteAmt > 0.65) {
        CX.save();
        const crackAlpha = (CI.vignetteAmt - 0.65) / 0.35;
        CX.strokeStyle = `rgba(255,60,60,${crackAlpha * 0.6})`;
        CX.lineWidth = 1.5;
        const cx2 = LW * 0.5, cy2 = LH * 0.5;
        for (let cr = 0; cr < 8; cr++) {
          const ang = cr * Math.PI / 4 + 0.2;
          const len = (80 + cr * 30) * crackAlpha;
          CX.beginPath(); CX.moveTo(cx2, cy2);
          CX.lineTo(cx2 + Math.cos(ang) * len, cy2 + Math.sin(ang) * len);
          CX.stroke();
        }
        CX.restore();
      }
    }
    // Insanity rampage: red glitch scanlines + horizontal RGB shift bars
    if (CI.type === 'death_insanity_rampage') {
      for (let i = 0; i < 8; i++) {
        const ly = (LH * .15 + i * LH * .1 + Math.sin(F * .06 + i * 1.3) * 12) | 0;
        CX.fillStyle = `rgba(200,0,0,${CI.vignetteAmt * .15 + Math.sin(F * .09 + i) * .07})`;
        CX.fillRect(0, ly, LW, 3 + Math.sin(F * .12 + i) * 3);
      }
      // Glitch bars — random horizontal colored bars
      if (CI.vignetteAmt > 0.4 && F % 5 === 0) {
        const gly = Math.random() * LH;
        CX.fillStyle = `rgba(255,0,0,${Math.random() * 0.18})`;
        CX.fillRect(Math.random() * LW * 0.4, gly, LW * (0.3 + Math.random() * 0.4), 2 + Math.random() * 8);
      }
    }
  }

  // Subtitle/dialogue box — elegant serif, centered lower screen
  const line = CI.typewriterText || '';
  const fullLine = CI.lines[CI.lineIdx] || '';
  if (fullLine && CI.letterbox > .35) {
    // Keep subtitle above the bottom cinematic bar (at least 140px from bottom)
    const subtitleY = LH - 140;
    CX.save();
    CX.globalAlpha = CI.lineFade * CI.letterbox;

    // Subtitle backdrop — wide, thin, elegant
    const subBg = CX.createLinearGradient(0, subtitleY - 32, 0, subtitleY + 32);
    subBg.addColorStop(0,'rgba(0,0,0,0)');
    subBg.addColorStop(0.3,'rgba(0,0,0,0.72)');
    subBg.addColorStop(0.7,'rgba(0,0,0,0.72)');
    subBg.addColorStop(1,'rgba(0,0,0,0)');
    CX.fillStyle=subBg; CX.fillRect(LW*0.05, subtitleY-32, LW*0.9, 64);

    // Thin gold separator lines
    const sepCol = CI.type==='hero' ? 'rgba(201,168,76,0.5)'
      : CI.type==='betrayed' ? 'rgba(80,100,180,0.4)'
      : CI.type==='death_boss' ? 'rgba(120,0,0,0.6)'
      : CI.type==='death_insanity_rampage' ? 'rgba(200,0,0,0.55)'
      : 'rgba(180,30,30,0.5)';
    CX.strokeStyle=sepCol; CX.lineWidth=0.7;
    CX.beginPath(); CX.moveTo(LW*0.12,subtitleY-28); CX.lineTo(LW*0.88,subtitleY-28); CX.stroke();
    CX.beginPath(); CX.moveTo(LW*0.12,subtitleY+28); CX.lineTo(LW*0.88,subtitleY+28); CX.stroke();

    // Portrait indicator (actor type) — slide in from left
    if (!isDeathScene && CI.actors.length > 0) {
      const actor = CI.actors[0];
      const portraitCols = { survivor: '#22c55e', traitor: '#ef4444', guard: '#64748b', phantom: '#c4b5fd' };
      const slideIn = Math.min(1, CI.letterbox * 3);
      const portX = LW * .08 + 18 + (1 - easeOut(slideIn)) * -40;
      CX.fillStyle = portraitCols[actor.type] || '#94a3b8';
      CX.beginPath(); CX.arc(portX, subtitleY, 16, 0, 6.28); CX.fill();
      CX.fillStyle = 'rgba(240,217,160,.9)'; CX.beginPath(); CX.arc(portX, subtitleY - 6, 6, 0, 6.28); CX.fill();
    }

    // Subtitle text — elegant Crimson serif, centered
    CX.shadowColor = 'rgba(0,0,0,1)'; CX.shadowBlur = 18;
    // Text color per ending tone
    const textCol = isDeathScene
      ? (CI.type === 'death_sanity' || CI.type === 'death_sanity_collapse' ? 'rgba(220,180,255,0.96)'
        : CI.type === 'death_boss' ? 'rgba(255,140,140,0.97)'
        : CI.type === 'death_insanity_rampage' ? 'rgba(255,100,100,0.97)'
        : 'rgba(255,200,200,0.96)')
      : CI.type === 'hero' ? 'rgba(255,240,200,0.97)'
      : CI.type === 'rampage' ? 'rgba(255,200,180,0.95)'
      : 'rgba(200,215,255,0.95)';
    CX.fillStyle = textCol;
    CX.font = 'italic 18px Crimson Text,serif';
    CX.textAlign = 'center'; CX.textBaseline = 'middle';

    // Word wrap
    const words = line.split(' '); let row2 = ''; const rows2 = [];
    words.forEach(w2 => { const tt = row2 + (row2 ? ' ' : '') + w2; if (CX.measureText(tt).width > LW * .68) { rows2.push(row2); row2 = w2; } else row2 = tt; });
    rows2.push(row2);
    const lineH = 22;
    const textStartY = subtitleY - (rows2.length - 1) * lineH * 0.5;
    rows2.forEach((r2, i2) => CX.fillText(r2, LW / 2, textStartY + i2 * lineH));

    // Blinking cursor when typewriter is active
    if (line.length < fullLine.length) {
      const blinkOn = Math.floor(F * 0.15) % 2 === 0;
      if (blinkOn) {
        const lastRow = rows2[rows2.length - 1] || '';
        const tw = CX.measureText(lastRow).width;
        CX.font = '18px Crimson Text,serif';
        CX.fillText('▌', LW / 2 + tw / 2 + 6, textStartY + (rows2.length - 1) * lineH);
      }
    }

    CX.restore();

    // Progress dots and skip hint
    if (!isDeathScene) {
      const dotY = LH - lbH + 18;
      CI.lines.forEach((_, i2) => {
        CX.fillStyle = i2 === CI.lineIdx ? '#fde68a' : 'rgba(100,116,139,.45)';
        CX.beginPath(); CX.arc(LW / 2 + (i2 - CI.lines.length / 2 + .5) * 16, dotY, i2 === CI.lineIdx ? 4 : 2.5, 0, 6.28); CX.fill();
      });
      CX.fillStyle = 'rgba(71,85,105,.5)'; CX.font = '10px Cinzel,serif'; CX.textAlign = 'right'; CX.textBaseline = 'bottom';
      CX.fillText('Click · Enter', LW - 10, LH - 2);
    }
  }

  if (CI.fade > 0) { CX.fillStyle = `rgba(0,0,0,${CI.fade})`; CX.fillRect(0, 0, LW, LH); }
}

// ── World renderer ────────────────────────────────────────────────────
function drawWorld() {
  const th = getTheme();

  // Apply camera transform
  FX.beginWorldTransform();

  // ── Tiles ────────────────────────────────────────────────────────
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = MAP[r][c], px = c * T, py = r * T;
      if (tile === 1) {
        // Rich wall — base color with gradient depth
        const baseCol = th.wc[(r*37+c*13)%4];
        CX.fillStyle = baseCol; CX.fillRect(px,py,T,T);
        // Top face lighter (stone bevel)
        const wallGrad = CX.createLinearGradient(px,py,px,py+T);
        wallGrad.addColorStop(0,'rgba(255,255,255,0.11)');
        wallGrad.addColorStop(0.18,'rgba(255,255,255,0.05)');
        wallGrad.addColorStop(1,'rgba(0,0,0,0.32)');
        CX.fillStyle=wallGrad; CX.fillRect(px,py,T,T);
        // Mortar lines (subtle)
        CX.strokeStyle='rgba(0,0,0,0.22)'; CX.lineWidth=1;
        CX.strokeRect(px+0.5,py+0.5,T-1,T-1);
        // Top edge highlight
        CX.fillStyle='rgba(255,255,255,0.10)'; CX.fillRect(px,py,T,2);
        CX.fillStyle='rgba(255,255,255,0.06)'; CX.fillRect(px,py,2,T);
        // Bottom/right shadow
        CX.fillStyle='rgba(0,0,0,0.30)'; CX.fillRect(px+T-2,py,2,T); CX.fillRect(px,py+T-2,T,2);
        // Moss/stain variation
        if((r*17+c*31)%7===0){CX.fillStyle='rgba(30,60,10,0.18)';CX.fillRect(px+4,py+4,T-8,T-8);}
        if((r*11+c*23)%13===0){CX.fillStyle='rgba(0,0,0,0.15)';CX.fillRect(px+2,py+T-8,T-4,6);}
      } else if (tile === 0) {
        // Floor with subtle variation and cracks
        CX.fillStyle = th.fc[(r*7+c*19)%4]; CX.fillRect(px,py,T,T);
        // Subtle floor gradient for depth
        const floorGrad = CX.createLinearGradient(px,py,px+T,py+T);
        floorGrad.addColorStop(0,'rgba(255,255,255,0.03)');
        floorGrad.addColorStop(1,'rgba(0,0,0,0.10)');
        CX.fillStyle=floorGrad; CX.fillRect(px,py,T,T);
        // Tile grout lines
        CX.strokeStyle='rgba(0,0,0,0.13)'; CX.lineWidth=0.5; CX.strokeRect(px+0.5,py+0.5,T-1,T-1);
        // Pebble / stain detail
        if((r*13+c*7)%11===0){CX.fillStyle='rgba(0,0,0,0.18)';CX.beginPath();CX.arc(px+8,py+10,1.5,0,6.28);CX.fill();}
        if((r*7+c*17)%9===0){CX.fillStyle='rgba(0,0,0,0.10)';CX.beginPath();CX.ellipse(px+T-6,py+6,3,2,0.4,0,6.28);CX.fill();}
        // Thin crack lines
        if((r*3+c*11)%17===0){
          CX.strokeStyle='rgba(0,0,0,0.12)'; CX.lineWidth=0.8; CX.beginPath();
          CX.moveTo(px+4,py+T*0.4); CX.lineTo(px+T*0.6,py+T*0.7); CX.stroke();
        }
      } else if (tile === 2) {
        CX.fillStyle = th.fc[(r*7+c*19)%4]; CX.fillRect(px,py,T,T);
        const pcx=px+T/2, pcy=py+T/2;
        const locked = LV===10 && !BOSS_DEAD;
        const puls = Math.sin(F*.07)*.25+.75;
        const portalCol = locked?'#ff4444':'#00ff88';
        const gOut=CX.createRadialGradient(pcx,pcy,2,pcx,pcy,T*.65);
        gOut.addColorStop(0,locked?'rgba(255,68,68,.22)':'rgba(0,255,136,.22)');gOut.addColorStop(1,'rgba(0,0,0,0)');
        CX.fillStyle=gOut; CX.fillRect(px-T*.4,py-T*.4,T*1.8,T*1.8);
        const gIn=CX.createRadialGradient(pcx,pcy,1,pcx,pcy,T*.44*puls);
        gIn.addColorStop(0,portalCol);gIn.addColorStop(.5,locked?'#cc2222':'#00cc66');gIn.addColorStop(1,'transparent');
        CX.fillStyle=gIn; CX.beginPath(); CX.arc(pcx,pcy,T*.44*puls,0,6.28); CX.fill();
        CX.strokeStyle=`rgba(${locked?'255,68,68':'0,255,136'},${.88*puls})`; CX.lineWidth=2.5;
        CX.beginPath(); CX.arc(pcx,pcy,T*.38,0,6.28); CX.stroke();
        for(let i=0;i<4;i++){const ra=i*1.57+F*.055;CX.fillStyle=`rgba(${locked?'255,68,68':'0,255,136'},${.38*puls})`;CX.beginPath();CX.arc(pcx+Math.cos(ra)*T*.28,pcy+Math.sin(ra)*T*.28,3,0,6.28);CX.fill();}
        if(!PORTAL_DISCOVERED&&Math.hypot(P.x-(c+.5),P.y-(r+.5))<3.5&&!PORTAL_USED){
          PORTAL_DISCOVERED=true;
          GAME_MSG=locked?'⚠ Defeat the Abyss Warden first!':'✦ Portal found! Reach it to advance!'; GAME_MSG_TIMER=4;
          spawnP(c+.5,r+.5,15,{col:portalCol,spd:1.0,life:0.9,r:3,star:true}); shk(3);
        }
      }
    }
  }

  BLOOD.forEach(d=>{CX.globalAlpha=d.a*.42;CX.fillStyle='#3a0000';CX.beginPath();CX.arc((d.x+.5)*T,(d.y+.5)*T,d.r,0,6.28);CX.fill();});
  CX.globalAlpha=1;

  TORCHES.forEach(t=>{
    const distToPlayer = Math.hypot(t.x - P.x, t.y - P.y);
    const closeFactor = Math.max(0, 1 - distToPlayer / 5);
    const flickerSpeed = 0.22 + closeFactor * 0.2;
    const flickerAmt = 0.18 + closeFactor * 0.25;
    const fl=Math.sin(F*flickerSpeed+t.ph)*flickerAmt+1, fl2=Math.sin(F*.31+t.ph+1)*.15+1;
    const px=(t.x+.5)*T, py=(t.y+.5)*T;
    // Warm halo
    const haloG=CX.createRadialGradient(px,py,1,px,py,T*1.1*fl);
    haloG.addColorStop(0,'rgba(255,180,60,0.18)');
    haloG.addColorStop(0.5,'rgba(255,120,30,0.08)');
    haloG.addColorStop(1,'rgba(0,0,0,0)');
    CX.fillStyle=haloG; CX.fillRect(px-T*1.2,py-T*1.2,T*2.4,T*2.4);
    // Bracket
    CX.fillStyle='#57340a'; CX.fillRect(px-2,py,4,9);
    CX.fillStyle='#78350f'; CX.fillRect(px-3,py-1,6,4);
    // Ember base glow
    CX.save();
    const emberG=CX.createRadialGradient(px,py-4,0,px,py-4,8*fl);
    emberG.addColorStop(0,'rgba(255,200,80,0.9)');
    emberG.addColorStop(0.4,'rgba(255,120,20,0.7)');
    emberG.addColorStop(1,'rgba(200,50,0,0)');
    CX.fillStyle=emberG; CX.beginPath(); CX.arc(px,py-4,8*fl,0,6.28); CX.fill();
    // Flame (layered)
    CX.shadowColor='#f97316'; CX.shadowBlur=12;
    const fCols=['#fde68a','#f97316','#fb923c'];
    for(let fi=0;fi<3;fi++){
      const ffl=fl*(1-fi*0.15), offset=Math.sin(F*.18+t.ph+fi)*1.5;
      CX.fillStyle=fCols[fi]; CX.globalAlpha=0.9-fi*0.2;
      CX.beginPath();
      CX.moveTo(px+offset-3*ffl,py-3);
      CX.quadraticCurveTo(px+offset-2*ffl,py-9*ffl,px+offset,py-13*ffl*fl2);
      CX.quadraticCurveTo(px+offset+2*ffl,py-9*ffl,px+offset+3*ffl,py-3);
      CX.closePath(); CX.fill();
    }
    CX.globalAlpha=1; CX.restore();
    // Spawn spark particles when player is close (< 5 tiles)
    if (distToPlayer < 5 && Math.random() < 0.04 * closeFactor) {
      spawnP(t.x + 0.5, t.y - 0.1, 1, { col: '#ffcc66', life: 0.8, r: 2, spd: 0.6, spread: 1.2, angle: -Math.PI/2 });
    }
  });

  TRAPS.forEach(t=>{
    const px=(t.x+.5)*T, py=(t.y+.5)*T;
    if(t.type==='spike'){
      CX.fillStyle='#94a3b8';
      for(let i=0;i<5;i++){const a=(i/5)*6.28;CX.beginPath();CX.moveTo(px+Math.cos(a)*4,py+Math.sin(a)*4);CX.lineTo(px+Math.cos(a+.3)*12,py+Math.sin(a+.3)*12);CX.lineTo(px+Math.cos(a-.3)*12,py+Math.sin(a-.3)*12);CX.closePath();CX.fill();}
    } else {
      const active=(t.timer%2.0)<0.92;
      if(active){CX.fillStyle=['#f97316','#ef4444','#fde68a'][(Math.floor(F*.18))%3];CX.beginPath();CX.arc(px,py,8+Math.sin(F*.3)*2,0,6.28);CX.fill();}
      else{CX.fillStyle='#7c2d12';CX.beginPath();CX.arc(px,py,5,0,6.28);CX.fill();}
    }
  });

  ITEMS.forEach(it=>{
    if(it.taken)return;
    const bob=Math.sin(F*.09+it.x+it.y)*3;
    const px=(it.x+.5)*T, py=(it.y+.5)*T+bob;
    if(it.kind==='weapon'){
      const w=WD[it.sub]||WD.sword, rar=it.rarity||RARITIES[0];
      CX.save(); CX.shadowColor=rar.col; CX.shadowBlur=10+Math.sin(F*.12)*4;
      CX.fillStyle=rar.glow; CX.beginPath(); CX.arc(px,py,14+Math.sin(F*.11)*2,0,6.28); CX.fill();
      CX.font='18px serif'; CX.textAlign='center'; CX.textBaseline='middle'; CX.fillText(w.icon,px,py);
      CX.fillStyle=rar.col; CX.font='bold 7px Cinzel,serif'; CX.fillText(rar.name[0],px,py+14);
      CX.restore();
    } else if(it.kind==='health'){
      CX.fillStyle='rgba(239,68,68,.2)'; CX.beginPath(); CX.arc(px,py,11,0,6.28); CX.fill();
      CX.font='15px serif'; CX.textAlign='center'; CX.textBaseline='middle'; CX.fillText('❤️',px,py);
    } else if(it.kind==='sanity'){
      CX.fillStyle='rgba(129,140,248,.2)'; CX.beginPath(); CX.arc(px,py,11,0,6.28); CX.fill();
      CX.font='15px serif'; CX.textAlign='center'; CX.textBaseline='middle'; CX.fillText('🧠',px,py);
    } else if(it.kind==='shield'){
      const sp=Math.sin(F*.12)*.5+.5;
      CX.fillStyle=`rgba(6,182,212,${.15+sp*.1})`; CX.beginPath(); CX.arc(px,py,13+sp*2,0,6.28); CX.fill();
      CX.save(); CX.shadowColor='#67e8f9'; CX.shadowBlur=10+sp*6;
      CX.font='17px serif'; CX.textAlign='center'; CX.textBaseline='middle'; CX.fillText('🛡️',px,py); CX.restore();
    }
  });

  ALLIES.forEach(a=>{
    if(a.rescued)return;
    const ax=(a.x+.5)*T, ay=(a.y+.5)*T+Math.sin(F*.1+a.ph)*1.5;
    const puls=.4+Math.sin(F*.12+a.ph)*.28;
    // Rescue glow aura
    const rescueGrad=CX.createRadialGradient(ax,ay,2,ax,ay,15);
    rescueGrad.addColorStop(0,`rgba(34,197,94,${puls*0.3})`);
    rescueGrad.addColorStop(1,'rgba(0,0,0,0)');
    CX.fillStyle=rescueGrad; CX.beginPath(); CX.arc(ax,ay,15,0,6.28); CX.fill();
    CX.strokeStyle=`rgba(34,197,94,${puls})`; CX.lineWidth=1.5; CX.beginPath(); CX.arc(ax,ay,12,0,6.28); CX.stroke();
    // Body (huddled prisoner)
    CX.fillStyle='#78350f'; CX.beginPath(); CX.ellipse(ax,ay+2,5,7,0.2,0,6.28); CX.fill();
    // Torn clothes shading
    CX.fillStyle='rgba(0,0,0,0.2)'; CX.beginPath(); CX.ellipse(ax+2,ay+3,3,5,0,0,6.28); CX.fill();
    // Head
    CX.fillStyle='rgba(240,210,150,0.92)'; CX.beginPath(); CX.arc(ax,ay-5.5,5,0,6.28); CX.fill();
    // Scared eyes
    CX.fillStyle='#1e293b'; CX.beginPath(); CX.arc(ax-2,ay-6,1.2,0,6.28); CX.fill();
    CX.beginPath(); CX.arc(ax+2,ay-6,1.2,0,6.28); CX.fill();
    // Bound hands
    CX.strokeStyle='#92400e'; CX.lineWidth=1.5;
    CX.beginPath(); CX.moveTo(ax-4,ay+2); CX.lineTo(ax+4,ay+2); CX.stroke();
  });

  ENE.forEach(e=>{ AnimSystem.drawEnemy(e); });
  drawPRT(); drawSlashTrails(); drawProjectiles();
  FX.drawWeaponTrails();
  if(LV===10) drawBoss();
  AnimSystem.drawPlayer();

  FX.endWorldTransform();

  // Lighting overlay (screen-space)
  const ci = FX.getCamInfo();
  Lighting.render(ci.camX, ci.camY, ci.zoom, LV===10);
  Lighting.apply();
  Lighting.applyTint();

  // Soft vignette (always-on atmospheric depth)
  const vigG = CX.createRadialGradient(LW/2, LH/2, LW*0.28, LW/2, LH/2, LW*0.72);
  vigG.addColorStop(0, 'rgba(0,0,0,0)');
  vigG.addColorStop(1, 'rgba(0,0,0,0.55)');
  CX.fillStyle=vigG; CX.fillRect(0,0,LW,LH);
}

// ── HUD ───────────────────────────────────────────────────────────────
function drawHUD() {

  const hx=12,hy=LH-38,hw=180,hh=14;
  CX.fillStyle='rgba(0,0,0,.7)'; roundRect(CX,hx-2,hy-2,hw+4,hh+4,5); CX.fill();
  CX.fillStyle='#1e293b'; CX.fillRect(hx,hy,hw,hh);
  const hg=CX.createLinearGradient(hx,0,hx+hw,0);
  if(lowHp){const pulse=Math.sin(F*.15)*.4+.6;hg.addColorStop(0,`rgba(220,38,38,${pulse})`);hg.addColorStop(1,`rgba(239,68,68,${pulse*.7})`);}
  else{hg.addColorStop(0,'#22c55e');hg.addColorStop(0.6,'#16a34a');hg.addColorStop(1,'#15803d');}
  CX.fillStyle=hg; CX.fillRect(hx,hy,hw*hpFrac,hh);
  CX.strokeStyle='rgba(255,255,255,.15)'; CX.lineWidth=1; CX.strokeRect(hx,hy,hw,hh);
  CX.fillStyle='#f1f5f9'; CX.font='bold 10px Cinzel,serif'; CX.textAlign='left'; CX.textBaseline='middle';

  const sf=Math.max(0,P.san/100);
  const sx=12,sy=LH-58,sw2=180,seh=10;
  CX.fillStyle='rgba(0,0,0,.7)'; roundRect(CX,sx-2,sy-2,sw2+4,seh+4,5); CX.fill();
  CX.fillStyle='#1e1b4b'; CX.fillRect(sx,sy,sw2,seh);
  const sg2=CX.createLinearGradient(sx,0,sx+sw2,0);
  if(P.san<35){const fp=Math.sin(F*.2)*.3+.7;sg2.addColorStop(0,`rgba(139,92,246,${fp})`);sg2.addColorStop(1,`rgba(109,40,217,${fp*.7})`);}
  else{sg2.addColorStop(0,'#8b5cf6');sg2.addColorStop(1,'#7c3aed');}
  CX.fillStyle=sg2; CX.fillRect(sx,sy,sw2*sf,seh);
  CX.strokeStyle='rgba(139,92,246,.25)'; CX.lineWidth=1; CX.strokeRect(sx,sy,sw2,seh);
  CX.fillStyle='#c4b5fd'; CX.font='bold 9px Cinzel,serif'; CX.textAlign='left'; CX.textBaseline='middle';
  CX.fillText('🧠 '+Math.floor(Math.max(0,P.san))+'%',sx+4,sy+seh/2);

  if(P.wep&&WD[P.wep]){
    const w=WD[P.wep],rar=P.wepRarity||RARITIES[0];
    CX.fillStyle='rgba(0,0,0,.7)'; roundRect(CX,12,LH-84,180,22,5); CX.fill();
    CX.fillStyle=rar.col; CX.font='bold 10px Cinzel,serif'; CX.textAlign='left'; CX.textBaseline='middle';
    CX.fillText(w.label+' ['+rar.name+']',16,LH-73);
    if(P.acd>0){CX.fillStyle='rgba(0,0,0,.5)';CX.fillRect(12,LH-65,180*(P.acd/w.cd),4);CX.fillStyle='#fde68a';CX.fillRect(12,LH-65,180*(1-P.acd/w.cd),4);}
  }
  if(P.shieldActive){
    const sp=Math.sin(F*.12)*.5+.5;
    CX.fillStyle=`rgba(6,182,212,${.18+sp*.08})`; roundRect(CX,12,LH-108,180,20,5); CX.fill();
    CX.strokeStyle=`rgba(103,232,249,${.6+sp*.3})`; CX.lineWidth=1.5; CX.strokeRect(12,LH-108,180,20);
    CX.fillStyle='#67e8f9'; CX.font='bold 10px Cinzel,serif'; CX.textAlign='left'; CX.textBaseline='middle';
    CX.fillText('🛡️ SHIELD '+P.shieldTimer.toFixed(1)+'s',16,LH-98);
  }
  CX.fillStyle='rgba(0,0,0,.6)'; roundRect(CX,LW-160,8,150,22,5); CX.fill();
  CX.fillStyle='#94a3b8'; CX.font='10px Cinzel,serif'; CX.textAlign='right'; CX.textBaseline='middle';
  CX.fillText('LV'+LV+' ⏱'+LEVEL_TIME_STR+'  💀'+P.killed+'  🧍'+P.saved,LW-12,19);
  // Speed badge — always visible
  {
    const spCol = GAME_SPEED > 1.05 ? '#f97316' : GAME_SPEED < 0.95 ? '#38bdf8' : '#94a3b8';
    CX.fillStyle = 'rgba(0,0,0,.6)'; roundRect(CX, LW - 162, 34, 152, 30, 5); CX.fill();
    CX.strokeStyle = 'rgba(100,116,139,.3)'; CX.lineWidth = 1; CX.strokeRect(LW - 162, 34, 152, 30);
    CX.fillStyle = spCol; CX.font = 'bold 11px Cinzel,serif'; CX.textAlign = 'right'; CX.textBaseline = 'top';
    CX.fillText('⚡ Speed: ' + GAME_SPEED.toFixed(2) + 'x', LW - 10, 38);

    CX.fillText('O ▼  P ▲ to adjust', LW - 10, 52);
  }

  if(GAME_MSG&&GAME_MSG_TIMER>0){
    const alpha=Math.min(1,GAME_MSG_TIMER/0.6)*Math.min(1,GAME_MSG_TIMER);
    if(alpha>0){
      CX.save(); CX.globalAlpha=alpha;
      CX.fillStyle='rgba(0,0,0,.75)'; roundRect(CX,LW/2-240,LH-130,480,30,8); CX.fill();
      CX.fillStyle='#fde68a'; CX.font='bold 12px Cinzel,serif'; CX.textAlign='center'; CX.textBaseline='middle';
      CX.fillText(GAME_MSG,LW/2,LH-115);
      CX.restore();
      GAME_MSG_TIMER-=DT;
      if(GAME_MSG_TIMER<=0){GAME_MSG='';GAME_MSG_TIMER=0;}
    }
  }
}

// ── Title screen ──────────────────────────────────────────────────────
function drawTitle() {
  CX.fillStyle='#000'; CX.fillRect(0,0,LW,LH);
  for(let i=0;i<8;i++){
    const px=((i*137+F*.3)%LW),py=((i*97+F*.18+i*80)%LH);
    CX.fillStyle=`rgba(201,168,76,${.02+i*.004})`; CX.beginPath(); CX.arc(px,py,60+i*18,0,6.28); CX.fill();
  }
  CX.fillStyle='#0a0a18';
  for(let i=0;i<Math.ceil(LW/40)+1;i++){const bx=i*40,bh=i%2===0?60:40;CX.fillRect(bx,LH-bh,36,bh);}
  CX.fillRect(0,LH-30,LW,30);
  CX.save(); CX.shadowColor='#c9a84c'; CX.shadowBlur=40;
  CX.fillStyle='#fde68a'; CX.font='bold 64px Cinzel,serif'; CX.textAlign='center'; CX.textBaseline='alphabetic';
  CX.fillText('DUNGEON',LW/2,140); CX.fillText('BREAK',LW/2,210); CX.restore();
  CX.fillStyle='rgba(148,163,184,.7)'; CX.font='italic 14px Crimson Text,serif'; CX.textAlign='center';
  CX.fillText('— Abyss Edition —',LW/2,235);

  // Animated buttons with staggered slide-in
  if(!drawTitle._t) drawTitle._t = 0;
  drawTitle._t = Math.min(drawTitle._t + DT * 2.2, 1);
  const t = drawTitle._t;

  function motionBtn(label,y,primary,delay){
    const progress = Math.max(0, Math.min(1, (t - delay) / 0.35));
    const eased = 1 - Math.pow(1-progress,3);
    const slideY = y + (1-eased)*30;
    const alpha = eased;
    if(alpha <= 0) return;
    CX.save(); CX.globalAlpha = alpha;
    const bx=LW/2-110,bw=220,bh=52;
    CX.fillStyle=primary?'rgba(201,168,76,.18)':'rgba(15,20,40,.8)';
    CX.strokeStyle=primary?'rgba(201,168,76,.75)':'rgba(51,65,85,.55)'; CX.lineWidth=1.5;
    roundRect(CX,bx,slideY,bw,bh,8); CX.fill(); CX.stroke();
    CX.save(); if(primary){CX.shadowColor='#c9a84c';CX.shadowBlur=12;}
    CX.fillStyle=primary?'#fde68a':'#cbd5e1'; CX.font=`bold ${primary?15:13}px Cinzel,serif`; CX.textAlign='center'; CX.textBaseline='middle';
    CX.fillText(label,LW/2,slideY+bh/2); CX.restore();
    CX.restore();
  }

  motionBtn('▶  PLAY  ( Enter )',261,true,0);
  motionBtn('📖  How To Play',320,false,0.15);
  motionBtn('⚙  Settings',382,false,0.3);
  motionBtn('🏆  Achievements',444,false,0.45);

  const sv=loadSave();
  if(sv){
    CX.fillStyle='rgba(148,163,184,.45)'; CX.font='11px Cinzel,serif'; CX.textAlign='center';
    CX.fillText('[ R ] Resume saved game — Level '+sv.lv,LW/2,514);
  }
  CX.fillStyle='rgba(100,116,139,.4)'; CX.font='10px Cinzel,serif'; CX.textAlign='center';
  CX.fillText('Arrow Keys / WASD — Move    Space — Attack    Esc — Pause',LW/2,LH-15);
}

function drawSettings() {
  SETTINGS_SLIDE=Math.min(1,SETTINGS_SLIDE+DT*4);
  const panW=440,panH=440,panX=LW/2-panW/2,panY=LH/2-panH/2-(1-SETTINGS_SLIDE)*60;
  CX.globalAlpha=SETTINGS_SLIDE;
  CX.fillStyle='rgba(5,8,22,0.96)'; CX.strokeStyle='rgba(201,168,76,.55)'; CX.lineWidth=1.5;
  roundRect(CX,panX,panY,panW,panH,12); CX.fill(); CX.stroke();
  CX.fillStyle='#c9a84c'; CX.font='bold 16px Cinzel,serif'; CX.textAlign='center'; CX.textBaseline='top';
  CX.fillText('⚙ SETTINGS',LW/2,panY+18);
  CX.fillStyle='rgba(71,85,105,.5)'; CX.fillRect(panX+20,panY+42,panW-40,1);

  // Speed row (special visual)
  const sry=panY+58;
  CX.fillStyle='rgba(0,0,0,.3)'; roundRect(CX,panX+16,sry,panW-32,50,6); CX.fill();
  CX.fillStyle='#fde68a'; CX.font='bold 12px Cinzel,serif'; CX.textAlign='left'; CX.textBaseline='middle';

  CX.fillStyle='#64748b'; CX.font='10px Cinzel,serif'; CX.textAlign='center';
  CX.fillText('O  →  Decrease  /  P  →  Increase', panX+panW/2, sry+16);
  // Speed bar
  const barX=panX+28, barY=sry+30, barW=panW-80, barH=10;

  CX.fillStyle='#1e293b'; roundRect(CX,barX,barY,barW,barH,4); CX.fill();
  const barGrad=CX.createLinearGradient(barX,0,barX+barW,0);
  barGrad.addColorStop(0,'#3b82f6'); barGrad.addColorStop(0.5,'#22c55e'); barGrad.addColorStop(1,'#f97316');
  CX.fillStyle=barGrad; roundRect(CX,barX,barY,barW*speedFrac,barH,4); CX.fill();
  for(let s=GAME_SPEED_MIN;s<=GAME_SPEED_MAX+0.01;s+=GAME_SPEED_STEP){
    const nx=barX+barW*(s-GAME_SPEED_MIN)/(GAME_SPEED_MAX-GAME_SPEED_MIN);

  CX.fillStyle='#fde68a'; CX.font='bold 11px Cinzel,serif'; CX.textAlign='right';

  const rows=[['Joystick Size','+ / -',CTRL.joySize+'px'],['Attack Button Size','Q / W',CTRL.atkSize+'px'],['Audio','Auto','Web Audio'],['Performance','60fps','Delta-time engine']];
  rows.forEach((row,i)=>{
    const ry=panY+118+i*50;

    CX.fillStyle='#cbd5e1'; CX.font='12px Cinzel,serif'; CX.textAlign='left'; CX.textBaseline='middle';
    CX.fillText(row[0],panX+28,ry+20);
    CX.fillStyle='#64748b'; CX.font='10px Cinzel,serif'; CX.textAlign='center';
    CX.fillText('['+row[1]+']',panX+panW/2,ry+20);
    CX.fillStyle='#c9a84c'; CX.textAlign='right';
    CX.fillText(row[2],panX+panW-28,ry+20);
  });

  // ── Mobile Controls section ──────────────────────────────────────────
  const mry = panY + 320;

  CX.strokeStyle='rgba(201,168,76,0.25)'; CX.lineWidth=1; roundRect(CX,panX+16,mry,panW-32,56,6); CX.stroke();
  CX.fillStyle='#fde68a'; CX.font='bold 11px Cinzel,serif'; CX.textAlign='left'; CX.textBaseline='middle';
  CX.fillText('📱 Mobile Controls',panX+28,mry+14);

  // Edit button
  const editBtnX = panX+24, editBtnY = mry+28, editBtnW = 170, editBtnH = 22;

  CX.lineWidth = 1.5;
  roundRect(CX,editBtnX,editBtnY,editBtnW,editBtnH,5); CX.fill(); CX.stroke();
  CX.fillStyle = isEditing ? '#22c55e' : '#fde68a';

  CX.fillText(isEditing ? '✓ DONE EDITING' : '✏ EDIT CONTROLS', editBtnX+editBtnW/2, editBtnY+editBtnH/2);

  CX.fillText('↺ RESET LAYOUT', resetBtnX+resetBtnW/2, resetBtnY+resetBtnH/2);

  // Store button rects for click handling (canvas-space)
  drawSettings._editBtn  = { x: editBtnX,  y: editBtnY,  w: editBtnW,  h: editBtnH  };
  drawSettings._resetBtn = { x: resetBtnX, y: resetBtnY, w: resetBtnW, h: resetBtnH };

  CX.fillStyle='rgba(71,85,105,.4)'; CX.font='11px Cinzel,serif'; CX.textAlign='center';
  CX.fillText('Click or press Esc to close',LW/2,panY+panH-16);
  CX.globalAlpha=1;
}

function drawAchievPanel() {
  ACHIEV_SLIDE = Math.min(1, ACHIEV_SLIDE + DT * 4);
  const panW = 560, panH = 540, panX = LW / 2 - panW / 2, panY = LH / 2 - panH / 2 - (1 - ACHIEV_SLIDE) * 60;
  const headerH = 50, footerH = 28, scrollAreaH = panH - headerH - footerH;
  const keys = Object.keys(ACHIEVEMENTS);
  const cardW = (panW - 48) / 2, cardH = 62, cardGap = 6;
  const rowH = cardH + cardGap;
  const totalRows = Math.ceil(keys.length / 2);
  const totalContentH = totalRows * rowH;
  const maxScroll = Math.max(0, totalContentH - scrollAreaH);
  // Clamp scroll
  ACHIEV_SCROLL = Math.max(0, Math.min(ACHIEV_SCROLL, maxScroll));

  CX.save();
  CX.globalAlpha = ACHIEV_SLIDE;

  // Panel background
  CX.fillStyle = 'rgba(5,8,22,0.97)';
  CX.strokeStyle = 'rgba(201,168,76,.6)';
  CX.lineWidth = 1.5;
  roundRect(CX, panX, panY, panW, panH, 12); CX.fill(); CX.stroke();

  CX.fillStyle = '#c9a84c'; CX.font = 'bold 16px Cinzel,serif';

    CX.fillText(a.name, cx2 + 36, cy2 + 10);

    // Description (truncate if too long)
    CX.fillStyle = a.unlocked ? '#94a3b8' : '#475569';

    while (CX.measureText(desc).width > cardW - 44 && desc.length > 4) desc = desc.slice(0, -4) + '…';

      roundRect(CX, cx2 + 36, cy2 + 41, 54, 13, 3); CX.fill();
      CX.fillStyle = '#c9a84c'; CX.font = 'bold 8px Cinzel,serif'; CX.textBaseline = 'middle';
      CX.fillText('✓ UNLOCKED', cx2 + 39, cy2 + 47);
    } else {
      CX.fillStyle = 'rgba(51,65,85,0.5)';
      roundRect(CX, cx2 + 36, cy2 + 41, 46, 13, 3); CX.fill();
      CX.fillStyle = '#475569'; CX.font = 'bold 8px Cinzel,serif'; CX.textBaseline = 'middle';
      CX.fillText('🔒 LOCKED', cx2 + 39, cy2 + 47);
    }
  });

  CX.restore(); // end clip

  // Scroll indicator bar (right edge)
  if (maxScroll > 0) {
    const trackX = panX + panW - 10, trackY = panY + headerH + 4, trackH = scrollAreaH - 8;
    CX.fillStyle = 'rgba(51,65,85,0.4)'; roundRect(CX, trackX, trackY, 4, trackH, 2); CX.fill();
    const thumbH = Math.max(28, trackH * (scrollAreaH / totalContentH));
    const thumbY = trackY + (trackH - thumbH) * (ACHIEV_SCROLL / maxScroll);
    CX.fillStyle = 'rgba(201,168,76,0.55)'; roundRect(CX, trackX, thumbY, 4, thumbH, 2); CX.fill();
  }

  // Top/bottom fade gradients to hint scrollability
  if (ACHIEV_SCROLL > 4) {

    fadeTop.addColorStop(0, 'rgba(5,8,22,0.9)'); fadeTop.addColorStop(1, 'rgba(5,8,22,0)');
    CX.fillStyle = fadeTop; CX.fillRect(clipX, clipY, clipW - 8, 22);
  }
  if (ACHIEV_SCROLL < maxScroll - 4) {

    fadeBtm.addColorStop(0, 'rgba(5,8,22,0)'); fadeBtm.addColorStop(1, 'rgba(5,8,22,0.9)');
    CX.fillStyle = fadeBtm; CX.fillRect(clipX, clipY + clipH - 22, clipW - 8, 22);
  }

  // Footer
  CX.fillStyle = 'rgba(71,85,105,.4)'; CX.fillRect(panX + 16, panY + panH - footerH - 4, panW - 32, 1);
  CX.fillStyle = 'rgba(71,85,105,.55)'; CX.font = '10px Cinzel,serif'; CX.textAlign = 'center'; CX.textBaseline = 'middle';
  CX.fillText('↑ ↓ Arrow Keys or Scroll Wheel  ·  Esc to close', LW / 2, panY + panH - footerH / 2 + 2);

  CX.restore();
}

function endIntroCinematic() {
  CINEMATIC_ACTIVE = false;
  STATE = 'playing';
  restoreTouchAfterCinematic();
  GAME_MSG = 'Level ' + LV + ' — ' + THEMES[Math.min(LV - 1, THEMES.length - 1)].name + ' — Find the portal.';
  GAME_MSG_TIMER = 5.0;
}

function endBossIntroCinematic() {
  CINEMATIC_ACTIVE = false;
  STATE = 'playing';
  restoreTouchAfterCinematic();
  BOSS_AI_ACTIVE = true;          // unlock boss combat AI
  if (BOSS) { BOSS.atkC = 1.2; BOSS.projC = 1.5; }  // short grace period before first attack
  GAME_MSG = 'Level 10 — Defeat the Abyss Warden!';

  shk(10);
