!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Dungeon Break — Abyss Edition v6.0</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
body{display:flex;align-items:center;justify-content:center}
#c{display:block;cursor:pointer;image-rendering:auto;position:fixed}
#touch-overlay{position:fixed;inset:0;pointer-events:none;z-index:50;display:none}
#joy-zone{position:absolute;pointer-events:all;touch-action:none}
#joy-bg{position:absolute;inset:0;border-radius:50%;background:rgba(201,168,76,.1);border:2px solid rgba(201,168,76,.22)}
#joy-knob{position:absolute;border-radius:50%;background:rgba(201,168,76,.4);border:2px solid rgba(201,168,76,.65);top:50%;left:50%;transform:translate(-50%,-50%)}
#atk-btn{position:absolute;border-radius:50%;background:rgba(239,68,68,.18);border:2px solid rgba(239,68,68,.55);pointer-events:all;touch-action:none;display:flex;align-items:center;justify-content:center;color:rgba(239,68,68,.9);user-select:none;font-family:'Cinzel',serif}
#shoot-btn{position:absolute;border-radius:50%;background:rgba(52,211,153,.18);border:2px solid rgba(52,211,153,.55);pointer-events:all;touch-action:none;display:none;align-items:center;justify-content:center;color:rgba(52,211,153,.9);user-select:none}
#special-btn{position:absolute;border-radius:50%;background:rgba(255,215,0,.25);border:2px solid gold;box-shadow:0 0 10px rgba(255,215,0,0.4);pointer-events:all;touch-action:none;display:none;align-items:center;justify-content:center;user-select:none;font-size:20px}
/* ── In-Game Pause Button ─────────────────────────────────────────── */
#ingame-pause-btn{
  position:fixed;top:10px;right:10px;z-index:80;
  width:44px;height:44px;border-radius:50%;
  background:rgba(0,0,0,0.65);border:1.5px solid rgba(201,168,76,0.55);
  display:none;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;pointer-events:all;
  color:#fde68a;touch-action:none;user-select:none;
  transition:background .15s;
}
#ingame-pause-btn:active{ background:rgba(201,168,76,0.25); }
/* ── In-Game Speed Panel ─────────────────────────────────────────── */
#ingame-speed-panel{
  position:fixed;top:62px;right:10px;z-index:80;
  background:rgba(5,8,22,0.94);border:1.5px solid rgba(201,168,76,0.45);
  border-radius:10px;padding:12px 16px;display:none;
  color:#fde68a;font-family:'Cinzel',serif;font-size:11px;
  min-width:160px;pointer-events:all;touch-action:none;
}
#ingame-speed-panel .sp-title{ font-weight:700;margin-bottom:8px;letter-spacing:.05em;color:#c9a84c; }
#ingame-speed-panel .sp-row{ display:flex;align-items:center;gap:8px;margin-bottom:6px; }
#ingame-speed-panel .sp-label{ color:#94a3b8;font-size:10px;width:50px; }
.sp-btn{
  flex:1;padding:5px 0;border:1px solid rgba(201,168,76,0.4);border-radius:5px;
  background:rgba(201,168,76,0.1);color:#fde68a;font-family:'Cinzel',serif;
  font-size:9px;font-weight:700;cursor:pointer;text-align:center;
  transition:background .12s;touch-action:none;
}
.sp-btn.active{ background:rgba(201,168,76,0.35);border-color:rgba(201,168,76,0.8); }
.sp-btn:active{ background:rgba(201,168,76,0.4); }
.sp-resume-btn{
  width:100%;margin-top:8px;padding:7px 0;
  background:rgba(34,197,94,0.18);border:1px solid rgba(34,197,94,0.55);
  border-radius:6px;color:#22c55e;font-family:'Cinzel',serif;font-size:10px;
  font-weight:700;cursor:pointer;text-align:center;touch-action:none;
}
.sp-resume-btn:active{ background:rgba(34,197,94,0.35); }
.ctrl-edit-mode #joy-zone,
.ctrl-edit-mode #atk-btn,
.ctrl-edit-mode #shoot-btn,
.ctrl-edit-mode #special-btn{
  box-shadow:0 0 0 2px rgba(255,215,0,0.9),0 0 16px rgba(255,215,0,0.5)!important;
  cursor:grab;
  animation:ctrlPulse 1.8s ease-in-out infinite;
}
.ctrl-edit-mode #joy-zone{ border-color:rgba(255,215,0,0.9)!important; }
@keyframes ctrlPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}
#ctrl-edit-hint{
  position:fixed;top:0;left:0;right:0;
  background:rgba(0,0,0,0.82);
  color:#fde68a;font-family:'Cinzel',serif;font-size:11px;font-weight:700;
  text-align:center;padding:7px 4px;z-index:200;
  letter-spacing:.06em;display:none;pointer-events:none;
  border-bottom:1px solid rgba(201,168,76,0.5);
}
.ctrl-resize-handle{
  position:absolute;bottom:-3px;right:-3px;width:18px;height:18px;
  border-radius:50%;background:rgba(255,215,0,0.85);
  border:1.5px solid #fff;display:none;align-items:center;justify-content:center;
  font-size:9px;z-index:210;touch-action:none;pointer-events:all;cursor:se-resize;
  color:#000;font-weight:900;
}
.ctrl-edit-mode .ctrl-resize-handle{ display:flex; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="touch-overlay">
  <div id="joy-zone"><div id="joy-bg"></div><div id="joy-knob"></div><div class="ctrl-resize-handle" id="joy-resize">⤡</div></div>
  <div id="atk-btn">⚔️<div class="ctrl-resize-handle" id="atk-resize">⤡</div></div>
  <div id="shoot-btn">🏹<div class="ctrl-resize-handle" id="shoot-resize">⤡</div></div>
  <div id="special-btn">✨<div class="ctrl-resize-handle" id="special-resize">⤡</div></div>
</div>
<div id="ctrl-edit-hint">✦ DRAG TO MOVE  •  DRAG ⤡ TO RESIZE  •  TAP DONE WHEN FINISHED ✦</div>
<div id="ingame-pause-btn" title="Pause / Settings">⏸</div>
<div id="ingame-speed-panel">
  <div class="sp-title">⚡ GAME SPEED</div>
  <div class="sp-row">
    <span class="sp-label">Speed:</span>
    <div class="sp-btn" data-spd="0.5">0.5×</div>
    <div class="sp-btn" data-spd="1.0">1.0×</div>
    <div class="sp-btn" data-spd="1.5">1.5×</div>
    <div class="sp-btn" data-spd="2.0">2.0×</div>
  </div>
  <div class="sp-resume-btn" id="sp-resume-btn">▶ RESUME GAME</div>
</div>
<script>
'use strict';

// ================================================================
// == game.js
// ================================================================
// =====================================================================
//  DUNGEON BREAK — ABYSS EDITION  v6.0  — game.js (Central State)
// =====================================================================

// ── Canvas ────────────────────────────────────────────────────────────
const CV = document.getElementById('c');
const CX = CV.getContext('2d');
const LW = 896, LH = 640;
CV.width = LW; CV.height = LH;
CV.style.touchAction = 'none';

// ── Landscape/Portrait overlay ────────────────────────────────────────
(function() {
  const ov = document.createElement('div');
  ov.id = 'rotate-overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:#000;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fde68a;font-family:Cinzel,serif;text-align:center;gap:16px;';
  ov.innerHTML = '<div style="font-size:52px;animation:rotSpin 1.5s linear infinite">📱</div><div style="font-size:18px;font-weight:700;letter-spacing:.05em">ROTATE YOUR DEVICE</div><div style="font-size:12px;color:#94a3b8">Landscape mode required to play</div>';
  const style = document.createElement('style');
  style.textContent = '@keyframes rotSpin{0%{transform:rotate(0deg)}50%{transform:rotate(90deg)}100%{transform:rotate(90deg)}}';
  document.head.appendChild(style);
  document.body.appendChild(ov);
  function checkOrientation() {
    const portrait = window.matchMedia('(orientation:portrait)').matches;
    const mobile = window.matchMedia('(max-width:900px),(pointer:coarse)').matches;
    ov.style.display = (portrait && mobile) ? 'flex' : 'none';
  }
  window.addEventListener('orientationchange', checkOrientation);
  window.addEventListener('resize', checkOrientation);
  checkOrientation();
})();

function resizeCanvas() {
  const sw = window.innerWidth, sh = window.innerHeight;
  const scale = Math.min(sw / LW, sh / LH);
  const cw = Math.floor(LW * scale), ch = Math.floor(LH * scale);
  CV.style.width = cw + 'px'; CV.style.height = ch + 'px';
  CV.style.left = Math.floor((sw - cw) / 2) + 'px';
  CV.style.top = Math.floor((sh - ch) / 2) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => { setTimeout(resizeCanvas, 120); });

// ── Constants ─────────────────────────────────────────────────────────
const TARGET_FPS = 60;
const COLS = 28, ROWS = 20, T = 32;

// ── Delta-time ────────────────────────────────────────────────────────
let lastTime = 0, DT = 1 / TARGET_FPS, F = 0;

// ── State machine ─────────────────────────────────────────────────────
let STATE = 'title';
let LV = 1;
const MAX_LV = 10;
let PORTAL_USED = false, PORTAL_DISCOVERED = false;
let BOSS_DEAD = false, BOSS_PORTAL_UNLOCKED = false;
let LEVEL_TOOK_DAMAGE = false, LEVEL_TIMER = 0, LEVEL_TIME_STR = '00:00';
let BOW_KILLS = 0;
let SHK = 0, AFL = 0, DFL = 0, FADE = 0, FADEIN = false, FREEZE_TIME = 0;
let SETTINGS_SLIDE = 0, ACHIEV_SLIDE = 0, ACHIEV_SCROLL = 0;
let CINEMATIC_ACTIVE = false;
let GAME_MSG = '', GAME_MSG_TIMER = 0;

// ── Game speed ────────────────────────────────────────────────────────
// Default 1.25x (snappier feel). Adjustable in settings: O → decrease speed / P → increase speed.
// Range: 0.5x (slow-mo) → 2.0x (fast). Only affects gameplay ticks, not render.
let GAME_SPEED = 1.25;
const GAME_SPEED_MIN = 0.5, GAME_SPEED_MAX = 2.0, GAME_SPEED_STEP = 0.25;
function setGameSpeed(v) { GAME_SPEED = Math.max(GAME_SPEED_MIN, Math.min(GAME_SPEED_MAX, Math.round(v / GAME_SPEED_STEP) * GAME_SPEED_STEP)); }

function shk(n) { SHK = Math.max(SHK, n); }

// ── Touch controls ────────────────────────────────────────────────────
const TOUCH_DIR = { x: 0, y: 0 };
let JOY_ID = null, JOY_ORIGIN = { x: 0, y: 0 };
const joyZone = document.getElementById('joy-zone');
const joyKnob = document.getElementById('joy-knob');
const atkBtn = document.getElementById('atk-btn');
const shootBtn = document.getElementById('shoot-btn');
const specialBtn = document.getElementById('special-btn');
const touchOv = document.getElementById('touch-overlay');
const ctrlEditHint = document.getElementById('ctrl-edit-hint');

// ── Default layout values ─────────────────────────────────────────────
const CTRL_DEFAULTS = {
  joySize: 110, joyX: 24, joyYBot: 24,
  atkSize: 72,  atkX: null, atkYBot: 29,   // null = right-anchored
  shootSize: 56, shootX: null, shootYBot: 0,
  specialSize: 56, specialX: null, specialYBot: 0,
};
// Current layout (loaded from storage or defaults)
let CTRL = { ...CTRL_DEFAULTS };

// Backwards compat shims
let JOY_SIZE = 110, JOY_X = 24, JOY_Y_BOT = 24, ATK_SIZE = 72;

// ── Mobile Control Layout Editor ─────────────────────────────────────
let CTRL_EDIT_MODE = false;

function loadCtrlLayout() {
  try {
    const raw = localStorage.getItem('db_mobile_controls');
    if (raw) {
      const saved = JSON.parse(raw);
      Object.assign(CTRL, saved);
      JOY_SIZE = CTRL.joySize; JOY_X = CTRL.joyX; JOY_Y_BOT = CTRL.joyYBot; ATK_SIZE = CTRL.atkSize;
    }
  } catch (e) {}
}

function saveCtrlLayout() {
  try { localStorage.setItem('db_mobile_controls', JSON.stringify(CTRL)); } catch (e) {}
}

function resetCtrlLayout() {
  CTRL = { ...CTRL_DEFAULTS };
  JOY_SIZE = CTRL.joySize; JOY_X = CTRL.joyX; JOY_Y_BOT = CTRL.joyYBot; ATK_SIZE = CTRL.atkSize;
  saveCtrlLayout();
  applyJoyLayout();
}

// Compute screen-space pixel positions for absolute-positioned controls
function _getAbsPos(el) {
  const r = el.getBoundingClientRect();
  return { left: r.left, top: r.top, w: r.width, h: r.height };
}

function applyJoyLayout() {
  const sw = window.innerWidth, sh = window.innerHeight;
  // JOY
  const jx = Math.max(0, Math.min(sw - CTRL.joySize, CTRL.joyX));
  const jy = sh - CTRL.joyYBot - CTRL.joySize;
  joyZone.style.cssText = `position:absolute;left:${jx}px;top:${jy}px;width:${CTRL.joySize}px;height:${CTRL.joySize}px;pointer-events:all;touch-action:none`;
  joyKnob.style.width = joyKnob.style.height = Math.floor(CTRL.joySize * 0.4) + 'px';

  // ATK
  const ax = CTRL.atkX !== null ? Math.max(0, Math.min(sw - CTRL.atkSize, CTRL.atkX))
             : sw - 28 - CTRL.atkSize;
  const ay = sh - CTRL.atkYBot - CTRL.atkSize;
  atkBtn.style.cssText = `position:absolute;left:${ax}px;top:${ay}px;width:${CTRL.atkSize}px;height:${CTRL.atkSize}px;border-radius:50%;background:rgba(239,68,68,.18);border:2px solid rgba(239,68,68,.55);pointer-events:all;touch-action:none;display:flex;align-items:center;justify-content:center;font-size:${(CTRL.atkSize*0.35)|0}px;color:rgba(239,68,68,.9);user-select:none`;

  // SHOOT
  const shSz = CTRL.shootSize;
  const shx = CTRL.shootX !== null ? Math.max(0, Math.min(sw - shSz, CTRL.shootX))
              : sw - 28 - shSz;
  const shy = CTRL.shootYBot !== 0 ? sh - CTRL.shootYBot - shSz
              : ay - shSz - 10;
  shootBtn.style.cssText = `position:absolute;left:${shx}px;top:${shy}px;width:${shSz}px;height:${shSz}px;border-radius:50%;background:rgba(52,211,153,.18);border:2px solid rgba(52,211,153,.55);pointer-events:all;touch-action:none;display:none;align-items:center;justify-content:center;font-size:${(shSz*0.38)|0}px;color:rgba(52,211,153,.9);user-select:none`;

  // SPECIAL
  const spSz = CTRL.specialSize;
  const spx = CTRL.specialX !== null ? Math.max(0, Math.min(sw - spSz, CTRL.specialX))
              : sw - 28 - spSz;
  const spy = CTRL.specialYBot !== 0 ? sh - CTRL.specialYBot - spSz
              : shy - spSz - 10;
  specialBtn.style.cssText = `position:absolute;left:${spx}px;top:${spy}px;width:${spSz}px;height:${spSz}px;border-radius:50%;background:rgba(255,215,0,.25);border:2px solid gold;box-shadow:0 0 10px rgba(255,215,0,0.4);pointer-events:all;touch-action:none;display:none;align-items:center;justify-content:center;font-size:${(spSz*0.38)|0}px;user-select:none`;

  // Sync legacy shims
  JOY_SIZE = CTRL.joySize; JOY_X = CTRL.joyX; JOY_Y_BOT = CTRL.joyYBot; ATK_SIZE = CTRL.atkSize;
}

function enterCtrlEditMode() {
  CTRL_EDIT_MODE = true;
  touchOv.classList.add('ctrl-edit-mode');
  ctrlEditHint.style.display = 'block';
  // Ensure shoot/special visible in edit mode
  shootBtn.style.display = 'flex';
  specialBtn.style.display = 'flex';
  _bindCtrlDrag();
}

function exitCtrlEditMode() {
  CTRL_EDIT_MODE = false;
  touchOv.classList.remove('ctrl-edit-mode');
  ctrlEditHint.style.display = 'none';
  saveCtrlLayout();
  applyJoyLayout();
  // Hide shoot/special unless weapon active
  if (!isMobile() || (P && P.wep !== 'bow')) shootBtn.style.display = 'none';
  if (!isMobile() || !P || !P.wep) specialBtn.style.display = 'none';
  _unbindCtrlDrag();
}

// ── Drag & Resize Logic ───────────────────────────────────────────────
let _ctrlDragActive = false;
const _ctrlTouchMap = {}; // touchId → { el, kind, startX, startY, origLeft, origTop, origSize }

function _ctrlPointerStart(e, el, kind) {
  if (!CTRL_EDIT_MODE) return;
  e.stopPropagation();
  const t = e.changedTouches ? e.changedTouches[0] : e;
  const id = t.identifier !== undefined ? t.identifier : 'mouse';
  const r = el.getBoundingClientRect();
  _ctrlTouchMap[id] = {
    el, kind, startX: t.clientX, startY: t.clientY,
    origLeft: r.left, origTop: r.top, origSize: parseInt(el.style.width) || 80
  };
  _ctrlDragActive = true;
}

function _ctrlPointerMove(e) {
  if (!CTRL_EDIT_MODE || !_ctrlDragActive) return;
  e.stopPropagation(); e.preventDefault();
  const touches = e.changedTouches || [e];
  for (const t of touches) {
    const id = t.identifier !== undefined ? t.identifier : 'mouse';
    const drag = _ctrlTouchMap[id];
    if (!drag) continue;
    const dx = t.clientX - drag.startX;
    const dy = t.clientY - drag.startY;
    const sw = window.innerWidth, sh = window.innerHeight;
    let newLeft = Math.max(0, Math.min(sw - drag.origSize, drag.origLeft + dx));
    let newTop  = Math.max(0, Math.min(sh - drag.origSize, drag.origTop  + dy));
    drag.el.style.left = newLeft + 'px';
    drag.el.style.top  = newTop  + 'px';
  }
}

function _ctrlPointerEnd(e) {
  if (!CTRL_EDIT_MODE) return;
  e.stopPropagation();
  const touches = e.changedTouches || [e];
  for (const t of touches) {
    const id = t.identifier !== undefined ? t.identifier : 'mouse';
    const drag = _ctrlTouchMap[id];
    if (!drag) { delete _ctrlTouchMap[id]; continue; }
    const sh = window.innerHeight;
    const r = drag.el.getBoundingClientRect();
    const finalLeft = r.left, finalTop = r.top, finalBot = sh - r.bottom;
    // Persist into CTRL
    if (drag.el === joyZone) {
      CTRL.joyX = finalLeft; CTRL.joyYBot = Math.max(0, finalBot);
    } else if (drag.el === atkBtn) {
      CTRL.atkX = finalLeft; CTRL.atkYBot = Math.max(0, finalBot);
    } else if (drag.el === shootBtn) {
      CTRL.shootX = finalLeft; CTRL.shootYBot = Math.max(0, finalBot);
    } else if (drag.el === specialBtn) {
      CTRL.specialX = finalLeft; CTRL.specialYBot = Math.max(0, finalBot);
    }
    delete _ctrlTouchMap[id];
  }
  if (Object.keys(_ctrlTouchMap).length === 0) _ctrlDragActive = false;
}

// ── Resize Handles ────────────────────────────────────────────────────
const _resizeTouches = {};

function _resizeStart(e, resizeEl, targetEl, ctrlKey, minSz, maxSz) {
  if (!CTRL_EDIT_MODE) return;
  e.stopPropagation(); e.preventDefault();
  const t = e.changedTouches ? e.changedTouches[0] : e;
  const id = t.identifier !== undefined ? t.identifier : 'rmouse';
  const r = targetEl.getBoundingClientRect();
  _resizeTouches[id] = { resizeEl, targetEl, ctrlKey, minSz, maxSz,
    startX: t.clientX, startY: t.clientY,
    origSize: r.width, origLeft: r.left, origTop: r.top };
}

function _resizeMove(e) {
  if (!CTRL_EDIT_MODE) return;
  e.stopPropagation(); e.preventDefault();
  const touches = e.changedTouches || [e];
  for (const t of touches) {
    const id = t.identifier !== undefined ? t.identifier : 'rmouse';
    const d = _resizeTouches[id]; if (!d) continue;
    const delta = Math.hypot(t.clientX - d.startX, t.clientY - d.startY)
                  * (t.clientX > d.startX || t.clientY > d.startY ? 1 : -1);
    const newSize = Math.max(d.minSz, Math.min(d.maxSz, d.origSize + delta));
    d.targetEl.style.width = d.targetEl.style.height = newSize + 'px';
    if (d.targetEl === joyZone) joyKnob.style.width = joyKnob.style.height = Math.floor(newSize * 0.4) + 'px';
  }
}

function _resizeEnd(e) {
  if (!CTRL_EDIT_MODE) return;
  e.stopPropagation();
  const touches = e.changedTouches || [e];
  for (const t of touches) {
    const id = t.identifier !== undefined ? t.identifier : 'rmouse';
    const d = _resizeTouches[id]; if (!d) continue;
    const sz = parseInt(d.targetEl.style.width);
    CTRL[d.ctrlKey] = sz;
    delete _resizeTouches[id];
  }
}

function _bindCtrlDrag() {
  // Per-element drag on main body
  const elMap = [
    [joyZone, 'joy'], [atkBtn, 'atk'], [shootBtn, 'shoot'], [specialBtn, 'special']
  ];
  elMap.forEach(([el, kind]) => {
    el._ctrlDragStart = (e) => { if (e.target.classList.contains('ctrl-resize-handle')) return; _ctrlPointerStart(e, el, kind); };
    el.addEventListener('touchstart', el._ctrlDragStart, { passive: false });
    el.addEventListener('mousedown',  el._ctrlDragStart, false);
  });
  touchOv.addEventListener('touchmove',  _ctrlPointerMove, { passive: false });
  touchOv.addEventListener('touchend',   _ctrlPointerEnd,  { passive: false });
  touchOv.addEventListener('touchcancel',_ctrlPointerEnd,  { passive: false });
  touchOv.addEventListener('mousemove',  _ctrlPointerMove, false);
  touchOv.addEventListener('mouseup',    _ctrlPointerEnd,  false);
  // Resize handles
  const handles = [
    [document.getElementById('joy-resize'),     joyZone,   'joySize',     70, 180],
    [document.getElementById('atk-resize'),     atkBtn,    'atkSize',     50, 140],
    [document.getElementById('shoot-resize'),   shootBtn,  'shootSize',   50, 140],
    [document.getElementById('special-resize'), specialBtn,'specialSize', 50, 140],
  ];
  handles.forEach(([h, el, key, mn, mx]) => {
    if (!h) return;
    h._rsStart = (e) => _resizeStart(e, h, el, key, mn, mx);
    h.addEventListener('touchstart', h._rsStart, { passive: false });
    h.addEventListener('mousedown',  h._rsStart, false);
  });
  touchOv.addEventListener('touchmove',  _resizeMove, { passive: false });
  touchOv.addEventListener('touchend',   _resizeEnd,  { passive: false });
  touchOv.addEventListener('touchcancel',_resizeEnd,  { passive: false });
  touchOv.addEventListener('mousemove',  _resizeMove, false);
  touchOv.addEventListener('mouseup',    _resizeEnd,  false);
}

function _unbindCtrlDrag() {
  const elMap = [joyZone, atkBtn, shootBtn, specialBtn];
  elMap.forEach(el => {
    if (el._ctrlDragStart) {
      el.removeEventListener('touchstart', el._ctrlDragStart);
      el.removeEventListener('mousedown',  el._ctrlDragStart);
      el._ctrlDragStart = null;
    }
  });
}

// ── Load saved layout on startup ──────────────────────────────────────
loadCtrlLayout();

function isMobile() { return window.matchMedia('(max-width:900px),(pointer:coarse)').matches; }

joyZone.addEventListener('touchstart', e => {
  if (CTRL_EDIT_MODE) return;
  SoundManager.init(); const t = e.changedTouches[0]; JOY_ID = t.identifier;
  const r = joyZone.getBoundingClientRect(); JOY_ORIGIN = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}, { passive: false });
joyZone.addEventListener('touchmove', e => {
  if (CTRL_EDIT_MODE) return;
  for (const t of e.changedTouches) {
    if (t.identifier !== JOY_ID) continue;
    const dx = t.clientX - JOY_ORIGIN.x, dy = t.clientY - JOY_ORIGIN.y;
    const maxR = JOY_SIZE * 0.38, dist = Math.hypot(dx, dy), cd = Math.min(dist, maxR);
    const nx = dist > 0 ? cd / dist * dx : 0, ny = dist > 0 ? cd / dist * dy : 0;
    joyKnob.style.transform = `translate(calc(-50% + ${nx}px),calc(-50% + ${ny}px))`;
    const targetX = dx / maxR, targetY = dy / maxR;
    TOUCH_DIR.x += (targetX - TOUCH_DIR.x) * 0.25;
    TOUCH_DIR.y += (targetY - TOUCH_DIR.y) * 0.25;
    if (Math.abs(TOUCH_DIR.x) < 0.15) TOUCH_DIR.x = 0;
    if (Math.abs(TOUCH_DIR.y) < 0.15) TOUCH_DIR.y = 0;
  }
}, { passive: false });
function joyRelease() { TOUCH_DIR.x = 0; TOUCH_DIR.y = 0; joyKnob.style.transform = 'translate(-50%,-50%)'; JOY_ID = null; }
joyZone.addEventListener('touchend', joyRelease);
joyZone.addEventListener('touchcancel', joyRelease);

CV.addEventListener('touchstart', e => {
  e.preventDefault();
  SoundManager.init();
  const r = CV.getBoundingClientRect();
  const t = e.changedTouches[0];
  const mx = (t.clientX - r.left) * (LW / r.width);
  const my = (t.clientY - r.top) * (LH / r.height);
  if (STATE === 'title') {
    if (mx > LW/2-120 && mx < LW/2+120 && my > 261 && my < 317) { startGame(); return; }
    if (mx > LW/2-110 && mx < LW/2+110 && my > 320 && my < 376) { openTrainingDungeon(); return; }
    if (mx > LW/2-110 && mx < LW/2+110 && my > 382 && my < 438) { openSettings(); return; }
    if (mx > LW/2-110 && mx < LW/2+110 && my > 444 && my < 500) { openAchievements(); return; }
  } else if (STATE === 'settings') {
    const eb = drawSettings._editBtn, rb = drawSettings._resetBtn;
    if (eb && mx >= eb.x && mx <= eb.x+eb.w && my >= eb.y && my <= eb.y+eb.h) {
      if (CTRL_EDIT_MODE) exitCtrlEditMode(); else enterCtrlEditMode(); return;
    }
    if (rb && mx >= rb.x && mx <= rb.x+rb.w && my >= rb.y && my <= rb.y+rb.h) { resetCtrlLayout(); return; }
    STATE = 'title'; SETTINGS_SLIDE = 0;
  } else if (STATE === 'achievements') { STATE = 'title'; ACHIEV_SLIDE = 0; }
  else if (STATE === 'endcard') { STATE = 'title'; }
  else if (STATE === 'cinematic') { ciAdvance(); }
  else if (STATE === 'pause') { resumeGame(); }
  else if (STATE === 'titlecinematic') { TC_skip(); }
  else if (STATE === 'training') { TR_handleClick(mx, my); }
}, { passive: false });

const K = {};
window.addEventListener('keydown', e => {
  SoundManager.init();
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
  K[e.key] = true;
  if (STATE === 'settings') {
    if (e.key === '+' || e.key === '=') { CTRL.joySize = Math.min(180, CTRL.joySize + 10); JOY_SIZE = CTRL.joySize; applyJoyLayout(); }
    if (e.key === '-') { CTRL.joySize = Math.max(70, CTRL.joySize - 10); JOY_SIZE = CTRL.joySize; applyJoyLayout(); }
    if (e.key === 'q' || e.key === 'Q') { CTRL.atkSize = Math.max(50, CTRL.atkSize - 8); ATK_SIZE = CTRL.atkSize; applyJoyLayout(); }
    if (e.key === 'w' || e.key === 'W') { CTRL.atkSize = Math.min(140, CTRL.atkSize + 8); ATK_SIZE = CTRL.atkSize; applyJoyLayout(); }
    if (e.key === 'o' || e.key === 'O') setGameSpeed(GAME_SPEED - GAME_SPEED_STEP);
    if (e.key === 'p' || e.key === 'P') setGameSpeed(GAME_SPEED + GAME_SPEED_STEP);
    if (e.key === 'Escape') { STATE = 'title'; SETTINGS_SLIDE = 0; }
    return;
  }
  if (STATE === 'achievements') {
    if (e.key === 'Escape') { STATE = 'title'; ACHIEV_SLIDE = 0; ACHIEV_SCROLL = 0; return; }
    if (e.key === 'ArrowDown') { ACHIEV_SCROLL = Math.min(ACHIEV_SCROLL + 56, _achievMaxScroll()); return; }
    if (e.key === 'ArrowUp')   { ACHIEV_SCROLL = Math.max(0, ACHIEV_SCROLL - 56); return; }
    return;
  }
  if (e.key === 'Escape') { if (STATE === 'playing') pauseGame(); else if (STATE === 'pause') resumeGame(); }
  if (e.key === ' ' && STATE === 'playing') doAttack();
  if ((e.key === 'o' || e.key === 'O') && STATE === 'playing') { setGameSpeed(GAME_SPEED - GAME_SPEED_STEP); GAME_MSG = '⚡ Speed changed to ' + GAME_SPEED.toFixed(2) + 'x'; GAME_MSG_TIMER = 1.5; }
  if ((e.key === 'p' || e.key === 'P') && STATE === 'playing') { setGameSpeed(GAME_SPEED + GAME_SPEED_STEP); GAME_MSG = '⚡ Speed changed to ' + GAME_SPEED.toFixed(2) + 'x'; GAME_MSG_TIMER = 1.5; }
  if (e.key === 'Enter') {
    if (STATE === 'title') startGame();
    else if (STATE === 'endcard') STATE = 'title';
    else if (STATE === 'cinematic') ciAdvance();
    else if (STATE === 'titlecinematic') TC_skip();
    else if (STATE === 'training') TR_handleExit();
    else if (STATE === 'pause') resumeGame();
  }
  if ((e.key === 'r' || e.key === 'R') && STATE === 'title') { const sv = loadSave(); if (sv) applyLoadedSave(sv); }
});

    localStorage.setItem('db_achievements', JSON.stringify(o));
  } catch (e) {}

function unlockAchievement(id) {

  ACHIEV_TOASTS.push({ name: a.name, icon: a.icon, timer: 4.0 });
}
function tickAchievToasts(dt) {
  for (let i = ACHIEV_TOASTS.length - 1; i >= 0; i--) {
    ACHIEV_TOASTS[i].timer -= dt;
    if (ACHIEV_TOASTS[i].timer <= 0) ACHIEV_TOASTS.splice(i, 1);
  }
}
function drawAchievToasts() {
  ACHIEV_TOASTS.forEach((t, i) => {
    const alpha = Math.min(1, t.timer / 0.5) * Math.min(1, t.timer / 0.8); if (alpha <= 0) return;
    const tx = LW - 248, ty = 58 + i * 62;

    CX.fillStyle = 'rgba(5,8,22,0.93)'; CX.strokeStyle = 'rgba(201,168,76,0.75)'; CX.lineWidth = 1.5;
    roundRect(CX, tx, ty, 232, 52, 8); CX.fill(); CX.stroke();
    CX.font = '20px serif'; CX.textAlign = 'left'; CX.textBaseline = 'middle'; CX.fillText(t.icon, tx + 12, ty + 26);
    CX.fillStyle = '#c9a84c'; CX.font = 'bold 11px Cinzel,serif'; CX.fillText('ACHIEVEMENT UNLOCKED', tx + 42, ty + 14);
    CX.fillStyle = '#e2e8f0'; CX.font = '12px Crimson Text,serif'; CX.fillText(t.name, tx + 42, ty + 31);

}

const SoundManager = (() => {

  const layers = {
    ambient: { gain: null, osc: null, target: 0, current: 0 },
    combat:  { gain: null, osc: null, target: 0, current: 0 },
    boss:    { gain: null, osc: null, target: 0, current: 0 },
    tension: { gain: null, osc: null, target: 0, current: 0 },

  // Sound cooldowns

    melee_hit: 0.07, bow_shoot: 0.10, enemy_death: 0.06,
    player_hurt: 0.25, item_pickup: 0.15, portal_enter: 0.8,

        reverbNode = null;

      // Initialize all music layers
      Object.keys(layers).forEach(name => {
        const g = ctx.createGain();
        g.gain.value = 0;
        g.connect(masterGain);
        layers[name].gain = g;

      ready = true;
    } catch (e) {
      ready = false;
    }
  }

  function _startLayer(name) {
    if (!ready || layers[name].osc) return;
    const layer = layers[name];

      // Each layer uses a pair of slightly detuned oscillators for richness
      const freqs = { ambient: 55, combat: 110, boss: 40, tension: 220 };

      filtNode.Q.value = 0.7;

      osc1.type = types[name];
      osc1.frequency.value = freqs[name];
      osc1.detune.value = detunes[name];
      osc1.connect(filtNode);
      filtNode.connect(layer.gain);

      // Secondary detuned oscillator for warmth
      const osc2 = ctx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.value = freqs[name] * 1.5;
      osc2.detune.value = detunes[name] - 3;
      const g2 = ctx.createGain();
      g2.gain.value = 0.3;
      osc2.connect(g2);
      g2.connect(layer.gain);

      // Optional: feed ambient into reverb
      if (name === 'ambient' && reverbNode) {
        const reverbSend = ctx.createGain();
        reverbSend.gain.value = 0.18;
        filtNode.connect(reverbSend);
        reverbSend.connect(reverbNode);
      }

      osc1.start();
      osc2.start();
      // Store composite stop function
      layer.osc = { stop: () => { try { osc1.stop(); osc2.stop(); } catch (e) {} } };
    } catch (e) {
      layer.osc = null;
    }
  }

  function _stopLayer(name) {
    const layer = layers[name];
    if (layer.osc) {
      try { layer.osc.stop(); } catch (e) {}
      layer.osc = null;
    }
  }

  function playTone(freq, type, dur, vol, freqEnd) {
    if (!ready || !ctx) return;
    try {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filt = ctx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = 2200;

      osc.connect(filt);
      filt.connect(gain);
      gain.connect(masterGain);

      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, ctx.currentTime + dur);

      const safeVol = Math.min(vol || 0.15, 0.22);
      gain.gain.setValueAtTime(0.001, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(safeVol, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);

      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + dur + 0.03);
    } catch (e) {}
  }

  function snd(name) {
    if (!ready || !ctx) return;
    const now = ctx.currentTime;
    const cd = SND_CD[name] || 0.08;
    if (SND_LAST[name] !== undefined && now - SND_LAST[name] < cd) return;
    SND_LAST[name] = now;

    if (name === 'melee_hit') {
      playTone(200, 'sawtooth', 0.07, 0.14, 100);
      setTimeout(() => playTone(180, 'sine', 0.05, 0.06), 30);
    } else if (name === 'bow_shoot') {
      playTone(900, 'sine', 0.10, 0.10, 450);
    } else if (name === 'enemy_death') {
      playTone(170, 'sawtooth', 0.16, 0.16, 55);
      setTimeout(() => playTone(80, 'sine', 0.12, 0.08), 60);
    } else if (name === 'player_hurt') {
      playTone(150, 'square', 0.13, 0.18, 75);
    } else if (name === 'item_pickup') {
      playTone(660, 'sine', 0.06, 0.11);
      setTimeout(() => playTone(880, 'sine', 0.06, 0.09), 75);
      setTimeout(() => playTone(1100, 'sine', 0.05, 0.07), 140);
    } else if (name === 'portal_enter') {
      playTone(440, 'sine', 0.13, 0.13);
      setTimeout(() => playTone(660, 'sine', 0.18, 0.13, 880), 140);
      setTimeout(() => playTone(1000, 'sine', 0.22, 0.10), 280);
    } else if (name === 'shield_activate') {
      playTone(700, 'sine', 0.18, 0.16, 1100);
      setTimeout(() => playTone(900, 'sine', 0.15, 0.10, 1300), 100);
    } else if (name === 'boss_roar') {
      playTone(55, 'sawtooth', 0.5, 0.20, 35);
      setTimeout(() => playTone(80, 'square', 0.3, 0.12, 50), 200);
    }
  }

  function updateMusicLayers(dt) {
    if (!ready) return;

    const inCombat = ENE.some(e => e.alive && Math.hypot(P.x - e.x, P.y - e.y) < 8);
    const bossActive = LV === 10 && BOSS && BOSS.alive;
    const lowSan = P.san < 35;

    // Target volumes — balanced, no clipping
    const targets = {
      ambient:  bossActive ? 0.012 : 0.022,
      combat:   (inCombat && !bossActive) ? 0.028 : 0,
      boss:     bossActive ? 0.038 : 0,
      tension:  lowSan ? 0.020 : 0,
    };

    const fadeSpeed = dt * 1.8;

    Object.keys(layers).forEach(name => {
      const layer = layers[name];
      const tgt = targets[name];

      // Start oscillator if needed
      if (tgt > 0 && !layer.osc) _startLayer(name);

      // Smooth crossfade
      if (layer.gain) {
        const cur = layer.gain.gain.value;
        const next = cur + (tgt - cur) * Math.min(1, fadeSpeed);
        layer.gain.gain.value = Math.max(0, Math.min(0.06, next));
        layer.current = next;
      }
    });
  }

  function tickHeartbeat(dt) {
    if (!ready || P.san > 30) { hbTimer = 0; return; }
    const interval = Math.max(0.20, P.san / 120);
    hbTimer = Math.max(0, hbTimer) + dt;
    if (hbTimer >= interval) {
      hbTimer = 0;
      playTone(58, 'sine', 0.16, 0.06, 38);
    }
  }

  // Exposed API
  return { init, snd, playTone, updateMusicLayers, tickHeartbeat };
})();

// == effects.js
// ================================================================
// =====================================================================
//  DUNGEON BREAK — ABYSS EDITION  v6.0  — effects.js
//  Camera system, screen shake, hit-stop, motion smoothing, weapon trails
// =====================================================================

const FX = (() => {
  // Camera state — smooth lag follow
  const cam = {
    x: 0, y: 0,          // current rendered position (world tiles)
    tx: 0, ty: 0,         // target position
    lagX: 0, lagY: 0,     // velocity-based lag offset
    shake: 0,
    shakeX: 0, shakeY: 0,
    zoom: 1, tzoom: 1,
  };

  // Weapon trail history for motion blur
  const weaponTrails = [];
  const MAX_TRAIL = 8;

  function init() {
    if (ROOMS.length > 0) {
      cam.x = P.x; cam.y = P.y;
      cam.tx = P.x; cam.ty = P.y;
    }
  }

  function update(dt) {
    // Target camera on player
    cam.tx = P.x;
    cam.ty = P.y;

    // Smooth follow with lag
    const followSpeed = 6.5;
    cam.x += (cam.tx - cam.x) * Math.min(1, dt * followSpeed);
    cam.y += (cam.ty - cam.y) * Math.min(1, dt * followSpeed);

    // Zoom smooth
    cam.zoom += (cam.tzoom - cam.zoom) * Math.min(1, dt * 3.5);

    // Screen shake decay
    if (cam.shake > 0.3) {
      cam.shakeX = (Math.random() - 0.5) * cam.shake;
      cam.shakeY = (Math.random() - 0.5) * cam.shake;
      cam.shake *= Math.pow(0.74, dt * TARGET_FPS);
    } else {
      cam.shake = 0;
      cam.shakeX = 0;
      cam.shakeY = 0;
    }

    // Weapon trail
    if (P.aanim > 0 && P.wep) {
      weaponTrails.push({
        x: (P.x + 0.5) * T + P.fx * T * 0.45,
        y: (P.y + 0.5) * T + P.fy * T * 0.45,
        age: 0,
        col: WD[P.wep] ? WD[P.wep].trailCol : '#fff',
      });
      if (weaponTrails.length > MAX_TRAIL) weaponTrails.shift();
    }
    for (let i = weaponTrails.length - 1; i >= 0; i--) {
      weaponTrails[i].age += dt * 6;
      if (weaponTrails[i].age > 1) weaponTrails.splice(i, 1);
    }
  }

  function addShake(amount) {
    cam.shake = Math.max(cam.shake, amount);
  }

  // Apply camera transform to canvas context before drawing world
  function beginWorldTransform() {
    // World is drawn with camera offset so player stays centered
    const worldW = COLS * T;
    const worldH = ROWS * T;

    // Camera-centered offset
    let ox = LW / 2 - (cam.x + 0.5) * T * cam.zoom;
    let oy = LH / 2 - (cam.y + 0.5) * T * cam.zoom;

    // Clamp to map bounds
    ox = Math.max(LW - worldW * cam.zoom, Math.min(0, ox));
    oy = Math.max(LH - worldH * cam.zoom, Math.min(0, oy));

    CX.save();
    CX.translate(Math.round(ox + cam.shakeX), Math.round(oy + cam.shakeY));
    CX.scale(cam.zoom, cam.zoom);

    // Return transform info (used by caller if needed)
    return { ox: Math.round(ox + cam.shakeX), oy: Math.round(oy + cam.shakeY), zoom: cam.zoom };
  }

  function endWorldTransform() {
    CX.restore();
  }

  // Draw weapon motion trails (call inside world transform)
  function drawWeaponTrails() {
    if (weaponTrails.length < 2) return;
    CX.save();
    for (let i = 1; i < weaponTrails.length; i++) {
      const prev = weaponTrails[i - 1];
      const curr = weaponTrails[i];
      const alpha = (1 - curr.age) * 0.5 * (i / weaponTrails.length);
      if (alpha <= 0) continue;
      CX.globalAlpha = alpha;
      CX.strokeStyle = curr.col;
      CX.lineWidth = (1 - curr.age) * 5;
      CX.lineCap = 'round';
      CX.shadowColor = curr.col;
      CX.shadowBlur = 8 * (1 - curr.age);
      CX.beginPath();
      CX.moveTo(prev.x, prev.y);
      CX.lineTo(curr.x, curr.y);
      CX.stroke();
    }
    CX.restore();
  }

  // Impact burst at world position
  function spawnImpactBurst(wx, wy, col, size) {
    const n = 12;
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * 6.28 + Math.random() * 0.5;
      const spd = size * (0.8 + Math.random() * 0.8);
      PRT.push({
        wx: wx, wy: wy,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
        life: 0.22 + Math.random() * 0.15,
        ml: 0.37,
        r: 2.5 + Math.random() * 2,
        col: col, gv: 0, star: Math.random() < 0.3
      });
    }
  }

  // Get current camera offset for use in lighting render
  function getCamInfo() {
    const worldW = COLS * T;
    const worldH = ROWS * T;
    let ox = LW / 2 - (cam.x + 0.5) * T * cam.zoom;
    let oy = LH / 2 - (cam.y + 0.5) * T * cam.zoom;
    ox = Math.max(LW - worldW * cam.zoom, Math.min(0, ox));
    oy = Math.max(LH - worldH * cam.zoom, Math.min(0, oy));
    // Convert offset back to world-tile camera position for lighting
    const camTileX = (LW / 2 - ox) / (T * cam.zoom) - 0.5;
    const camTileY = (LH / 2 - oy) / (T * cam.zoom) - 0.5;
    return { camX: camTileX, camY: camTileY, zoom: cam.zoom };
  }

  return { init, update, addShake, beginWorldTransform, endWorldTransform, drawWeaponTrails, spawnImpactBurst, getCamInfo, cam };
})();

// ================================================================
// == lighting.js
// ================================================================
// =====================================================================
//  DUNGEON BREAK — ABYSS EDITION  v6.0  — lighting.js
//  Dynamic lighting: fog-of-war, radial player light, torch flicker,
//  boss arena dramatic lighting. Offscreen canvas mask for performance.
// =====================================================================

const Lighting = (() => {
  // Offscreen canvas for the darkness/fog mask
  let fogCanvas = null;
  let fogCtx = null;
  // Fog-of-war memory: tiles the player has seen
  let exploredTiles = null;

  function init() {
    fogCanvas = document.createElement('canvas');
    fogCanvas.width = LW;
    fogCanvas.height = LH;
    fogCtx = fogCanvas.getContext('2d');
    // Initialize explored map
    exploredTiles = [];
    for (let r = 0; r < ROWS; r++) {
      exploredTiles.push(new Uint8Array(COLS));
    }
  }

  function _updateExplored() {
    // Mark tiles within player's light radius as explored
    const lightR = 5;
    const px = Math.round(P.x), py = Math.round(P.y);
    for (let dy = -lightR; dy <= lightR; dy++) {
      for (let dx = -lightR; dx <= lightR; dx++) {
        const dist = Math.hypot(dx, dy);
        if (dist <= lightR) {
          const tx = px + dx, ty = py + dy;
          if (ty >= 0 && ty < ROWS && tx >= 0 && tx < COLS) {
            exploredTiles[ty][tx] = 1;
          }
        }
      }
    }
  }

  function render(camX, camY, camZoom, isBossArena) {
    if (!fogCanvas || !fogCtx) return;

    _updateExplored();

    const fc = fogCtx;
    fc.clearRect(0, 0, LW, LH);

    // Fill entire canvas with darkness
    fc.fillStyle = 'rgba(0,0,0,1)';
    fc.fillRect(0, 0, LW, LH);

    // Use destination-out to cut holes in the darkness

    // --- Fog-of-war: show explored but dimmed areas ---
    fc.globalCompositeOperation = 'destination-out';

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (!exploredTiles[r][c]) continue;
        const wx = (c + 0.5) * T, wy = (r + 0.5) * T;
        // Transform to screen coords
        const sx = (wx - camX * T) * camZoom + LW / 2;
        const sy = (wy - camY * T) * camZoom + LH / 2;
        const size = T * camZoom + 1;
        // Dim explored but not currently lit tiles
        fc.globalAlpha = 0.38;
        fc.fillStyle = 'rgba(255,255,255,1)';
        fc.fillRect(sx - size / 2, sy - size / 2, size, size);
      }
    }

    // --- Current player light (bright circle) ---
    const playerSX = (P.x + 0.5) * T;
    const playerSY = (P.y + 0.5) * T;
    const psx = (playerSX - camX * T) * camZoom + LW / 2;
    const psy = (playerSY - camY * T) * camZoom + LH / 2;
    const lightRadius = 4.8 * T * camZoom;

    // Shield makes light slightly bigger/brighter
    const actualRadius = P.shieldActive ? lightRadius * 1.2 : lightRadius;
    const grad = fc.createRadialGradient(psx, psy, 0, psx, psy, actualRadius);
    grad.addColorStop(0, 'rgba(255,255,255,1)');
    grad.addColorStop(0.45, 'rgba(255,255,255,0.95)');
    grad.addColorStop(0.75, 'rgba(255,255,255,0.55)');
    grad.addColorStop(1.0, 'rgba(255,255,255,0)');
    fc.globalAlpha = 1;
    fc.fillStyle = grad;
    fc.beginPath();
    fc.arc(psx, psy, actualRadius, 0, Math.PI * 2);
    fc.fill();

    // --- Torch lights --- only render when tile is explored OR player is nearby
    TORCHES.forEach(t => {
      const tileExplored = exploredTiles[t.y] && exploredTiles[t.y][t.x];
      const distToPlayer = Math.hypot(t.x - P.x, t.y - P.y);
      const torchRadius = 3.5; // in tiles
      if (!tileExplored && distToPlayer >= torchRadius) return; // skip unexplored, distant torches

      // Dynamic flicker: stronger when player is close
      const closeFactor = Math.max(0, 1 - distToPlayer / 5);
      const flickerSpeed = 0.22 + closeFactor * 0.2;
      const flickerAmt = 0.18 + closeFactor * 0.25;
      const flicker = Math.sin(F * flickerSpeed + t.ph) * flickerAmt + 1.0;

      const tsx = ((t.x + 0.5) * T - camX * T) * camZoom + LW / 2;
      const tsy = ((t.y + 0.5) * T - camY * T) * camZoom + LH / 2;
      const torchR = 2.4 * T * camZoom * flicker;
      const tGrad = fc.createRadialGradient(tsx, tsy, 0, tsx, tsy, torchR);
      tGrad.addColorStop(0, 'rgba(255,220,150,0.9)');
      tGrad.addColorStop(0.5, 'rgba(255,160,60,0.5)');
      tGrad.addColorStop(1.0, 'rgba(255,100,20,0)');
      fc.globalAlpha = 0.55 * flicker;
      fc.fillStyle = tGrad;
      fc.beginPath();
      fc.arc(tsx, tsy, torchR, 0, Math.PI * 2);
      fc.fill();
    });

    // --- Boss arena dramatic lighting ---
    if (isBossArena && BOSS && BOSS.alive) {
      const bsx = ((BOSS.x + 0.5) * T - camX * T) * camZoom + LW / 2;
      const bsy = ((BOSS.y + 0.5) * T - camY * T) * camZoom + LH / 2;
      const phaseIntensity = BOSS.phase === 3 ? 1.0 : BOSS.phase === 2 ? 0.75 : 0.5;
      const bossR = 5.5 * T * camZoom * phaseIntensity;
      const pulse = Math.sin(F * 0.12) * 0.3 + 0.7;
      const bGrad = fc.createRadialGradient(bsx, bsy, 0, bsx, bsy, bossR);
      const bossCol = BOSS.phase === 3 ? 'rgba(255,80,80,' : BOSS.phase === 2 ? 'rgba(160,80,255,' : 'rgba(200,50,50,';
      bGrad.addColorStop(0, bossCol + (0.7 * pulse) + ')');
      bGrad.addColorStop(0.5, bossCol + (0.4 * pulse) + ')');
      bGrad.addColorStop(1.0, 'rgba(0,0,0,0)');
      fc.globalAlpha = 0.72;
      fc.fillStyle = bGrad;
      fc.beginPath();
      fc.arc(bsx, bsy, bossR, 0, Math.PI * 2);
      fc.fill();
    }

    fc.globalCompositeOperation = 'source-over';
    fc.globalAlpha = 1;
  }

  function apply() {
    if (!fogCanvas) return;
    CX.save();
    CX.globalCompositeOperation = 'multiply';
    CX.drawImage(fogCanvas, 0, 0);
    CX.globalCompositeOperation = 'source-over';
    CX.restore();
  }

  // Add warm tint overlay for current theme
  function applyTint() {
    const th = getTheme();
    if (!th.tint) return;
    CX.save();
    CX.globalCompositeOperation = 'source-over';
    CX.fillStyle = th.tint;
    CX.fillRect(0, 0, LW, LH);
    CX.restore();
  }

  return { init, render, apply, applyTint };
})();

// == animation.js
// ================================================================
// =====================================================================
//  DUNGEON BREAK — ABYSS EDITION  v6.0  — animation.js
//  Animation state machine, frame interpolation, delta-time smoothness
// =====================================================================

const AnimSystem = (() => {

  // ── Player animation states ─────────────────────────────────────────
  function tickPlayer(dt) {
    // Breathing cycle always runs
    P.breathCycle = (P.breathCycle || 0) + dt * 1.4;

    const isMoving = Math.abs(P.vx) > 0.01 || Math.abs(P.vy) > 0.01 ||
      Math.abs(TOUCH_DIR.x) > 0.15 || Math.abs(TOUCH_DIR.y) > 0.15 ||
      K['ArrowUp'] || K['ArrowDown'] || K['ArrowLeft'] || K['ArrowRight'] ||
      K['w'] || K['a'] || K['s'] || K['d'];

    if (P.dead) {
      P.animState = 'death';
    } else if (P.aanim > 0) {
      P.animState = 'attack';
    } else if (P.hitFlash > 0) {
      P.animState = 'hurt';
    } else if (isMoving) {
      P.animState = 'walk';
      P.walkCycle = (P.walkCycle || 0) + dt * 8.0;
    } else {
      P.animState = 'idle';
    }
    P.animTimer = (P.animTimer || 0) + dt;
  }

  function tickEnemy(e, dt) {
    const isMoving = Math.hypot(e.vx, e.vy) > 0.02;
    if (!e.alive) {
      e.animState = 'death';
    } else if (e.hitFlash > 0) {
      e.animState = 'hurt';
    } else if (isMoving && e.alertT > 0.2) {
      e.animState = 'walk';
      e.walkCycle = (e.walkCycle || 0) + dt * 7.0;
    } else {
      e.animState = 'idle';
    }
    e.animTimer = (e.animTimer || 0) + dt;
  }

  // ── Draw player (full armored dark-fantasy silhouette) ──────────────
  function drawPlayer() {
    const pp = (P.x + 0.5) * T;
    const pq = (P.y + 0.5) * T;
    const state = P.animState || 'idle';
    const breath = Math.sin(P.breathCycle) * 0.6;
    const bodyBob = state === 'walk' ? Math.sin(P.walkCycle) * 1.4 : breath * 0.5;
    const headBob = state === 'walk' ? -Math.abs(Math.sin(P.walkCycle)) * 1.2 + bodyBob : bodyBob;
    const walkLean = state === 'walk' ? Math.sin(P.walkCycle * 0.5) * 0.06 : 0;
    const isDead = state === 'death';
    const deathT = isDead ? Math.min(1, (P.animTimer || 0) * 1.5) : 0;

    // Shield aura
    if (P.shieldActive) {
      const sp = Math.sin(F * 0.12) * 0.35 + 0.65;
      CX.save();
      CX.globalAlpha = 0.32 * sp;
      const shieldGrad = CX.createRadialGradient(pp,pq,T*0.2,pp,pq,T*0.6);
      shieldGrad.addColorStop(0,'rgba(103,232,249,0.5)');
      shieldGrad.addColorStop(1,'rgba(14,165,233,0)');
      CX.fillStyle=shieldGrad; CX.beginPath(); CX.arc(pp,pq,T*0.6,0,6.28); CX.fill();
      CX.strokeStyle = '#67e8f9'; CX.lineWidth = 1.8; CX.globalAlpha = 0.55 * sp;
      CX.beginPath(); CX.arc(pp,pq,T*0.52,0,6.28); CX.stroke();
      CX.restore();
    }

    // Ground shadow
    const shadowW = isDead ? 14 : 9;
    const shadowH = isDead ? 3 : 4;
    CX.fillStyle = 'rgba(0,0,0,0.42)';
    CX.beginPath();
    CX.ellipse(pp, pq + 14, shadowW, shadowH, 0, 0, 6.28);
    CX.fill();

    // Death collapse
    if (isDead) {
      CX.save();
      CX.translate(pp, pq + 8);
      CX.rotate(Math.PI * 0.5 * deathT);
      CX.globalAlpha = Math.max(0, 1 - deathT * 0.6);
      // Fallen body
      CX.fillStyle = '#1e293b'; CX.fillRect(-12, -5, 24, 12);
      CX.fillStyle = '#334155'; CX.fillRect(-12, -5, 24, 5);
      // Blood pool
      CX.fillStyle = `rgba(139,0,0,${deathT * 0.55})`;
      CX.beginPath(); CX.ellipse(0, 8, 14 * deathT, 5 * deathT, 0, 0, 6.28); CX.fill();
      CX.restore();
      return;
    }

    // Hit flash overlay
    if (P.hitFlash > 0) {
      CX.save();
      CX.globalAlpha = Math.min(1, P.hitFlash / 0.23) * 0.45;
      CX.fillStyle = '#ff4444';
      CX.beginPath(); CX.arc(pp, pq, T * 0.38, 0, 6.28); CX.fill();
      CX.restore();
    }

    CX.save();
    CX.translate(pp, pq);
    CX.rotate(walkLean);

    let scaleX = 1, scaleY = 1;
    if (state === 'hurt') {
      const ht = P.hitFlash / 0.23;
      scaleX = 1 + ht * 0.18; scaleY = 1 - ht * 0.12;
    }
    CX.scale(scaleX, scaleY);

    // ── LAYER 1: Cape/cloak (behind body) ──
    const capeSwing = state === 'walk' ? Math.sin(P.walkCycle * 0.5) * 5 : Math.sin(P.breathCycle * 0.25) * 2;
    const capeLen = 20;
    CX.save();
    // Cape gradient
    const capeGrad = CX.createLinearGradient(0, -3, 0, capeLen);
    capeGrad.addColorStop(0, '#1e1b4b');
    capeGrad.addColorStop(0.5, '#161240');
    capeGrad.addColorStop(1, 'rgba(20,15,60,0.4)');
    CX.fillStyle = capeGrad;
    CX.beginPath();
    CX.moveTo(-8, -2 + bodyBob);
    CX.quadraticCurveTo(-13 + capeSwing, 8 + bodyBob, -7, capeLen + bodyBob);
    CX.quadraticCurveTo(0, capeLen + 3 + capeSwing * 0.4 + bodyBob, 7, capeLen + bodyBob);
    CX.quadraticCurveTo(13 - capeSwing, 8 + bodyBob, 8, -2 + bodyBob);
    CX.closePath();
    CX.fill();
    // Cape edge shimmer
    CX.strokeStyle = 'rgba(100,80,200,0.25)'; CX.lineWidth = 1;
    CX.beginPath();
    CX.moveTo(-7, capeLen - 2 + bodyBob);
    CX.quadraticCurveTo(0, capeLen + 4 + capeSwing * 0.4 + bodyBob, 7, capeLen - 2 + bodyBob);
    CX.stroke();
    CX.restore();

    // ── LAYER 2: Legs ──
    const leftStride  = state === 'walk' ? Math.sin(P.walkCycle) * 3 : 0;
    const rightStride = state === 'walk' ? -Math.sin(P.walkCycle) * 3 : 0;
    // Left leg
    CX.fillStyle = '#1e293b';
    CX.beginPath();
    CX.roundRect(-5, 8 + bodyBob, 4, 9 + leftStride, 2);
    CX.fill();
    // Right leg
    CX.beginPath();
    CX.roundRect(1, 8 + bodyBob, 4, 9 + rightStride, 2);
    CX.fill();
    // Boot shine
    CX.fillStyle = 'rgba(100,116,136,0.3)';
    CX.beginPath(); CX.ellipse(-3, 17 + bodyBob + leftStride, 3, 1.5, 0, 0, 6.28); CX.fill();
    CX.beginPath(); CX.ellipse(3, 17 + bodyBob + rightStride, 3, 1.5, 0, 0, 6.28); CX.fill();

    // ── LAYER 3: Torso + armor ──
    // Chest plate
    CX.fillStyle = '#334155';
    CX.beginPath();
    CX.ellipse(0, bodyBob, 8, 9, 0, 0, 6.28);
    CX.fill();
    // Armor highlight (top-left sheen)
    const armorGrad = CX.createLinearGradient(-6, bodyBob - 8, 4, bodyBob + 4);
    armorGrad.addColorStop(0,'rgba(255,255,255,0.18)');
    armorGrad.addColorStop(1,'rgba(0,0,0,0)');
    CX.fillStyle = armorGrad;
    CX.beginPath(); CX.ellipse(0, bodyBob, 8, 9, 0, 0, 6.28); CX.fill();
    // Center chest ridge
    CX.strokeStyle = 'rgba(148,163,184,0.35)'; CX.lineWidth = 1;
    CX.beginPath(); CX.moveTo(0, bodyBob - 6); CX.lineTo(0, bodyBob + 5); CX.stroke();
    // Shoulder plates
    CX.fillStyle = '#475569';
    CX.beginPath(); CX.ellipse(-8, -1 + bodyBob, 4, 3, -0.3, 0, 6.28); CX.fill();
    CX.beginPath(); CX.ellipse(8, -1 + bodyBob, 4, 3, 0.3, 0, 6.28); CX.fill();
    // Shoulder highlight
    CX.fillStyle = 'rgba(255,255,255,0.12)';
    CX.beginPath(); CX.ellipse(-8, -2.5 + bodyBob, 2.5, 1.5, -0.3, 0, 6.28); CX.fill();
    CX.beginPath(); CX.ellipse(8, -2.5 + bodyBob, 2.5, 1.5, 0.3, 0, 6.28); CX.fill();

    // ── LAYER 4: Weapon arm ──
    if (P.wep && WD[P.wep]) {
      const wData = WD[P.wep];
      const armAngle = Math.atan2(P.fy, P.fx);
      const armSwing = state === 'walk' ? Math.sin(P.walkCycle) * 0.3 : 0;
      const atkProg = P.aanim > 0 ? (1 - P.aanim / wData.cd) : 0;
      const atkSwing = P.aanim > 0 ? Math.sin(atkProg * Math.PI) * 0.7 : 0;

      CX.save();
      CX.rotate(armAngle + armSwing + atkSwing);

      // Upper arm
      CX.strokeStyle = '#475569'; CX.lineWidth = 4; CX.lineCap = 'round';
      CX.beginPath(); CX.moveTo(0, bodyBob); CX.lineTo(6, bodyBob + 3); CX.stroke();
      // Forearm
      CX.strokeStyle = '#64748b'; CX.lineWidth = 3;
      CX.beginPath(); CX.moveTo(6, bodyBob + 3); CX.lineTo(11, bodyBob + 5); CX.stroke();

      // Draw weapon visually (not just emoji)
      CX.save();
      CX.translate(11, bodyBob + 5);
      const wCol = wData.col;
      if (P.wep === 'sword') {
        CX.strokeStyle = wCol; CX.lineWidth = 2.5; CX.shadowColor = wCol; CX.shadowBlur = 6;
        CX.beginPath(); CX.moveTo(0,0); CX.lineTo(8,0); CX.stroke(); // blade
        CX.strokeStyle='#94a3b8'; CX.lineWidth=1.5;
        CX.beginPath(); CX.moveTo(0,-3); CX.lineTo(0,3); CX.stroke(); // guard
      } else if (P.wep === 'axe') {
        CX.fillStyle=wCol; CX.shadowColor=wCol; CX.shadowBlur=8;
        CX.beginPath(); CX.moveTo(2,0); CX.lineTo(8,-4); CX.lineTo(10,0); CX.lineTo(8,4); CX.closePath(); CX.fill();
        CX.strokeStyle='#78350f'; CX.lineWidth=1.5; CX.beginPath(); CX.moveTo(0,0); CX.lineTo(5,0); CX.stroke();
      } else if (P.wep === 'dagger') {
        CX.strokeStyle=wCol; CX.lineWidth=2; CX.shadowColor=wCol; CX.shadowBlur=5;
        CX.beginPath(); CX.moveTo(0,0); CX.lineTo(7,0); CX.stroke();
        CX.fillStyle=wCol; CX.beginPath(); CX.moveTo(7,-1.5); CX.lineTo(10,0); CX.lineTo(7,1.5); CX.closePath(); CX.fill();
      } else if (P.wep === 'spear') {
        CX.strokeStyle='#94a3b8'; CX.lineWidth=1.5;
        CX.beginPath(); CX.moveTo(-2,0); CX.lineTo(9,0); CX.stroke();
        CX.fillStyle=wCol; CX.shadowColor=wCol; CX.shadowBlur=6;
        CX.beginPath(); CX.moveTo(9,-2); CX.lineTo(13,0); CX.lineTo(9,2); CX.closePath(); CX.fill();
      } else if (P.wep === 'bow') {
        CX.strokeStyle=wCol; CX.lineWidth=2; CX.shadowColor=wCol; CX.shadowBlur=5;
        CX.beginPath(); CX.arc(4,0,5,Math.PI*0.4,Math.PI*1.6); CX.stroke();
        CX.strokeStyle='rgba(200,255,220,0.5)'; CX.lineWidth=1;
        CX.beginPath(); CX.moveTo(2,-3); CX.lineTo(2,3); CX.stroke();
      }
      CX.shadowBlur=0;
      CX.restore();
      CX.restore();
    }

    // ── LAYER 5: Head + helmet ──
    // Neck
    CX.fillStyle = 'rgba(210,190,150,0.7)';
    CX.fillRect(-2, -5 + headBob, 4, 4);

    // Helmet base (dark steel)
    CX.fillStyle = '#1e293b';
    CX.beginPath(); CX.arc(0, -9 + headBob, 6.5, 0, 6.28); CX.fill();
    // Helmet top dome
    CX.fillStyle = '#293548';
    CX.beginPath(); CX.arc(0, -11 + headBob, 6, Math.PI, 2*Math.PI); CX.fill();
    // Helmet brow plate
    CX.fillStyle = '#334155';
    CX.fillRect(-6, -7 + headBob, 12, 3);
    // Helmet sheen
    const helmGrad = CX.createLinearGradient(-4, -14+headBob, 3, -9+headBob);
    helmGrad.addColorStop(0,'rgba(255,255,255,0.18)');
    helmGrad.addColorStop(1,'rgba(255,255,255,0)');
    CX.fillStyle=helmGrad; CX.beginPath(); CX.arc(0,-9+headBob,6.5,0,6.28); CX.fill();

    // Visor eye slit glow
    const eyeCol = P.san < 35 ? '#c4b5fd' : (P.san < 60 ? '#a5f3fc' : '#e2e8f0');
    CX.save();
    CX.shadowColor = eyeCol; CX.shadowBlur = P.san < 35 ? 10 : 5;
    CX.fillStyle = eyeCol;
    // Eye slit (single horizontal bar like a visor)
    CX.fillRect(-4, -8.5 + headBob, 8, 1.8);
    // Eye dots
    CX.fillStyle = eyeCol;
    CX.beginPath(); CX.arc(-2, -7.8 + headBob, 1.1, 0, 6.28); CX.fill();
    CX.beginPath(); CX.arc(2, -7.8 + headBob, 1.1, 0, 6.28); CX.fill();
    CX.restore();

    // Helmet crest/ridge
    CX.fillStyle = '#475569';
    CX.beginPath();
    CX.moveTo(-1, -17 + headBob); CX.lineTo(1, -17 + headBob);
    CX.lineTo(1.5, -11 + headBob); CX.lineTo(-1.5, -11 + headBob);
    CX.closePath(); CX.fill();

    // ── LAYER 6: Attack arc flash ──
    if (P.aanim > 0 && P.wep) {
      const wData = WD[P.wep];
      const aa = P.aanim / wData.cd;
      const atkAngle = Math.atan2(P.fy, P.fx);
      CX.save();
      CX.globalAlpha = aa * 0.55;
      CX.strokeStyle = wData.col;
      CX.shadowColor = wData.col; CX.shadowBlur = 14;
      CX.lineWidth = 3; CX.lineCap = 'round';
      CX.beginPath();
      CX.arc(0, 0, T*0.42, atkAngle - wData.arc * 0.7, atkAngle + wData.arc * 0.7);
      CX.stroke();
      // Slash streak
      CX.globalAlpha = aa * 0.35;
      CX.fillStyle = wData.col;
      CX.beginPath();
      CX.moveTo(P.fx * T * 0.12, P.fy * T * 0.12);
      CX.lineTo(P.fx * T * 0.55, P.fy * T * 0.55 + P.fy * T * 0.15);
      CX.lineTo(P.fx * T * 0.3 + P.fy * T * 0.18, P.fy * T * 0.3 - P.fx * T * 0.18);
      CX.closePath(); CX.fill();
      CX.restore();
    }

    CX.restore();
  }

  // ── Draw an enemy (unique per type) ────────────────────────────────
  function drawEnemy(e) {
    const EB = { skeleton: '#f1f5f9', ghoul: '#86efac', demon: '#fca5a5', wraith: '#c4b5fd' };
    const EE = { skeleton: '#ef4444', ghoul: '#fde68a', demon: '#ff3030', wraith: '#a78bfa' };

    if (!e.alive) {
      if (e.dAnim > 0) {
        const ta = Math.max(0, e.dAnim / 0.5);
        CX.globalAlpha = ta;
        CX.fillStyle = '#7c3aed';
        CX.beginPath();
        CX.arc((e.x + 0.5) * T, (e.y + 0.5) * T, T * 0.4 * (1 - ta + 0.3), 0, 6.28);
        CX.fill();
        CX.globalAlpha = 1;
      }
      return;
    }

    const px = (e.x + 0.5) * T;
    const py = (e.y + 0.5) * T;
    const bob = Math.sin(F * 0.14 + e.ph) * 1.5;

    const floatY = e.type === 'wraith' ? Math.sin(F * 0.1 + e.ph) * 3.5 : 0;
    if (e.type === 'wraith') CX.globalAlpha = 0.72 + Math.sin(F * 0.08 + e.ph) * 0.22;

    // Alert indicator
    const alertFrac = e.alertT / 1.33;
    if (alertFrac > 0.28) {
      CX.fillStyle = `rgba(239,68,68,${alertFrac * 0.22})`;
      CX.beginPath();
      CX.arc(px, py + bob, T * 0.52, 0, 6.28);
      CX.fill();
    }

    // Hit flash
    if (e.hitFlash > 0) {
      CX.fillStyle = `rgba(255,255,255,${Math.min(1, e.hitFlash / 0.17) * 0.6})`;
      CX.beginPath();
      CX.arc(px, py + bob, T * 0.3, 0, 6.28);
      CX.fill();
    }

    CX.save();
    CX.translate(px, py - floatY + bob);

    // Squash on hurt
    if (e.hitFlash > 0) {
      const ht = e.hitFlash / 0.17;
      CX.scale(1 + ht * 0.15, 1 - ht * 0.1);
    }

    // Shadow
    CX.fillStyle = 'rgba(0,0,0,.3)';
    CX.beginPath();
    CX.ellipse(0, 12 + floatY, 9, 4, 0, 0, 6.28);
    CX.fill();

    // Walk bob
    const walkBob = e.animState === 'walk' ? Math.sin(e.walkCycle || 0) * 1.5 : 0;

    // Type-specific body
    if (e.type === 'skeleton') {
      _drawSkeleton(e, walkBob, EE);
    } else if (e.type === 'ghoul') {
      _drawGhoul(e, walkBob, EB, EE);
    } else if (e.type === 'demon') {
      _drawDemon(e, walkBob, EE);
    } else if (e.type === 'wraith') {
      _drawWraith(e, walkBob, EE);
    }

    CX.restore();
    CX.globalAlpha = 1;

    // HP bar
    if (e.maxHp > 1) {
      CX.fillStyle = '#1e293b';
      CX.fillRect(px - 11, py + bob + 12, 22, 3);
      CX.fillStyle = '#ef4444';
      CX.fillRect(px - 11, py + bob + 12, 22 * (e.hp / e.maxHp), 3);
    }
  }

  function _drawSkeleton(e, wb, EE) {
    // Sharp shoulder plates
    CX.fillStyle = '#d1d5db';
    CX.beginPath(); CX.moveTo(-8,wb-3); CX.lineTo(-12,wb-8); CX.lineTo(-5,wb-4); CX.closePath(); CX.fill();
    CX.beginPath(); CX.moveTo(8,wb-3); CX.lineTo(12,wb-8); CX.lineTo(5,wb-4); CX.closePath(); CX.fill();
    // Spine
    CX.strokeStyle = '#e2e8f0'; CX.lineWidth = 1.5;
    CX.beginPath(); CX.moveTo(0,wb+8); CX.lineTo(0,wb-5); CX.stroke();
    // Ribcage (3 ribs each side)
    for (let i = 0; i < 3; i++) {
      const ry = wb - 1 + i * 3.5;
      CX.beginPath(); CX.moveTo(0,ry); CX.quadraticCurveTo(-5,ry-1,-5.5,ry+1.5); CX.stroke();
      CX.beginPath(); CX.moveTo(0,ry); CX.quadraticCurveTo(5,ry-1,5.5,ry+1.5); CX.stroke();
    }
    // Arms (bony)
    CX.lineWidth=1.5;
    CX.beginPath(); CX.moveTo(-5,wb-2); CX.lineTo(-9,wb+2); CX.lineTo(-10,wb+6); CX.stroke();
    CX.beginPath(); CX.moveTo(5,wb-2); CX.lineTo(9,wb+2); CX.lineTo(10,wb+6); CX.stroke();
    // Claw fingers
    for(let f=0;f<3;f++){
      CX.beginPath(); CX.moveTo(-10,wb+6); CX.lineTo(-12+f*1.5,wb+9); CX.stroke();
      CX.beginPath(); CX.moveTo(10,wb+6); CX.lineTo(12-f*1.5,wb+9); CX.stroke();
    }
    // Skull (larger, more defined)
    CX.fillStyle = '#f1f5f9';
    CX.beginPath(); CX.arc(0,wb-11,6.5,0,6.28); CX.fill();
    // Skull shading
    CX.fillStyle='rgba(0,0,0,0.18)'; CX.beginPath(); CX.arc(2,wb-10,4,0,6.28); CX.fill();
    // Hollow eye sockets
    CX.fillStyle = '#0f0f0f';
    CX.beginPath(); CX.ellipse(-2.2,wb-12.5,2.2,2,0,0,6.28); CX.fill();
    CX.beginPath(); CX.ellipse(2.2,wb-12.5,2.2,2,0,0,6.28); CX.fill();
    // Eye glow
    CX.fillStyle = EE.skeleton; CX.shadowColor=EE.skeleton; CX.shadowBlur=6+Math.sin(F*0.1+e.ph)*3;
    CX.beginPath(); CX.arc(-2.2,wb-12.5,1.3,0,6.28); CX.fill();
    CX.beginPath(); CX.arc(2.2,wb-12.5,1.3,0,6.28); CX.fill();
    CX.shadowBlur=0;
    // Jaw
    CX.strokeStyle = '#e2e8f0'; CX.lineWidth = 1.2;
    CX.beginPath(); CX.arc(0,wb-7,4.5,0.2,Math.PI-0.2); CX.stroke();
    // Teeth
    CX.fillStyle='#f1f5f9';
    for(let t=0;t<3;t++) { CX.fillRect(-2.5+t*2,wb-7,1.2,2.5); }
  }

  function _drawGhoul(e, wb, EB, EE) {
    const twitch = Math.sin(F * 0.3 + e.ph * 2) * (e.animState === 'idle' ? 1.5 : 0.5);
    // Hunched back bump
    CX.fillStyle = '#16803a';
    CX.beginPath(); CX.ellipse(-2, wb - 4, 6, 8, 0.35, 0, 6.28); CX.fill(); // hump
    // Body (low, wide, hunched)
    CX.fillStyle = EB.ghoul;
    CX.beginPath(); CX.ellipse(1, wb + 2, 7, 8, 0.15, 0, 6.28); CX.fill();
    // Skin shading
    CX.fillStyle='rgba(0,0,0,0.20)'; CX.beginPath(); CX.ellipse(3,wb+3,5,6,0.15,0,6.28); CX.fill();
    // Long trailing arms (droop to ground)
    CX.strokeStyle = '#4ade80'; CX.lineWidth = 2.5; CX.lineCap='round';
    // Left arm
    CX.beginPath(); CX.moveTo(-5,wb+1+twitch); CX.quadraticCurveTo(-10,wb+4,-12,wb+10+twitch*0.5); CX.stroke();
    // Right arm
    CX.beginPath(); CX.moveTo(6,wb+1-twitch); CX.quadraticCurveTo(11,wb+4,13,wb+10-twitch*0.5); CX.stroke();
    // Clawed fingers (left)
    CX.lineWidth=1.5;
    CX.beginPath(); CX.moveTo(-12,wb+10+twitch*0.5); CX.lineTo(-15,wb+8+twitch*0.5); CX.stroke();
    CX.beginPath(); CX.moveTo(-12,wb+10+twitch*0.5); CX.lineTo(-14.5,wb+12+twitch*0.5); CX.stroke();
    CX.beginPath(); CX.moveTo(-12,wb+10+twitch*0.5); CX.lineTo(-11,wb+13+twitch*0.5); CX.stroke();
    // Clawed fingers (right)
    CX.beginPath(); CX.moveTo(13,wb+10-twitch*0.5); CX.lineTo(16,wb+8-twitch*0.5); CX.stroke();
    CX.beginPath(); CX.moveTo(13,wb+10-twitch*0.5); CX.lineTo(15.5,wb+12-twitch*0.5); CX.stroke();
    CX.beginPath(); CX.moveTo(13,wb+10-twitch*0.5); CX.lineTo(12,wb+13-twitch*0.5); CX.stroke();
    // Head (low, forward-jutting)
    CX.fillStyle = 'rgba(74,222,128,0.92)';
    CX.beginPath(); CX.arc(2+twitch*0.3, wb-7, 6, 0, 6.28); CX.fill();
    // Dark shading on face
    CX.fillStyle='rgba(0,0,0,0.25)'; CX.beginPath(); CX.arc(4,wb-7,4,0,6.28); CX.fill();
    // Eyes (large, yellow)
    CX.fillStyle = EE.ghoul; CX.shadowColor=EE.ghoul; CX.shadowBlur=7+Math.sin(F*0.08+e.ph)*3;
    CX.beginPath(); CX.ellipse(-1.5+twitch*0.2,wb-8,2.2,1.8,0,0,6.28); CX.fill();
    CX.beginPath(); CX.ellipse(3+twitch*0.2,wb-8,2.2,1.8,0,0,6.28); CX.fill();
    CX.shadowBlur=0;
    // Pupils
    CX.fillStyle='#0f0'; CX.beginPath(); CX.arc(-1.5,wb-8,1,0,6.28); CX.fill();
    CX.beginPath(); CX.arc(3,wb-8,1,0,6.28); CX.fill();
    // Teeth (jagged)
    CX.fillStyle = '#f1f5f9'; CX.lineWidth=1;
    for(let t=0;t<3;t++){CX.beginPath();CX.moveTo(-2+t*2.2,wb-3.5);CX.lineTo(-1.2+t*2.2,wb-1);CX.lineTo(-0.4+t*2.2,wb-3.5);CX.closePath();CX.fill();}
  }

  function _drawDemon(e, wb, EE) {
    const pulse = Math.sin(F * 0.1 + e.ph) * 0.4 + 0.6;
    // Broad armored chest
    CX.fillStyle = '#7f1d1d';
    CX.beginPath(); CX.ellipse(0, wb, 10, 11, 0, 0, 6.28); CX.fill();
    // Chest plate metal
    CX.fillStyle = '#991b1b';
    CX.beginPath(); CX.ellipse(0, wb - 1, 7, 8, 0, 0, 6.28); CX.fill();
    // Chest rune glow
    const chestGlow = CX.createRadialGradient(0, wb-1, 0, 0, wb-1, 7);
    chestGlow.addColorStop(0, `rgba(255,50,0,${0.6*pulse})`);
    chestGlow.addColorStop(0.5, `rgba(200,0,0,${0.3*pulse})`);
    chestGlow.addColorStop(1, 'rgba(0,0,0,0)');
    CX.fillStyle=chestGlow; CX.beginPath(); CX.arc(0,wb-1,8,0,6.28); CX.fill();
    // Armor highlights
    CX.fillStyle='rgba(255,100,100,0.20)'; CX.beginPath(); CX.ellipse(-2,wb-4,4,3.5,-0.4,0,6.28); CX.fill();
    // Broad shoulders
    CX.fillStyle='#6b0000';
    CX.beginPath(); CX.ellipse(-11,wb-2,5,4,0.2,0,6.28); CX.fill();
    CX.beginPath(); CX.ellipse(11,wb-2,5,4,-0.2,0,6.28); CX.fill();
    // Spike shoulder pieces
    CX.fillStyle='#450000';
    CX.beginPath(); CX.moveTo(-11,wb-5); CX.lineTo(-13,wb-12); CX.lineTo(-9,wb-5); CX.fill();
    CX.beginPath(); CX.moveTo(11,wb-5); CX.lineTo(13,wb-12); CX.lineTo(9,wb-5); CX.fill();
    // Arms
    CX.strokeStyle='#6b0000'; CX.lineWidth=4; CX.lineCap='round';
    CX.beginPath(); CX.moveTo(-9,wb); CX.lineTo(-13,wb+6); CX.stroke();
    CX.beginPath(); CX.moveTo(9,wb); CX.lineTo(13,wb+6); CX.stroke();
    // Fist claws
    CX.fillStyle='#c00'; CX.lineWidth=1.5;
    CX.beginPath(); CX.moveTo(-13,wb+6); CX.lineTo(-16,wb+4); CX.lineTo(-13,wb+9); CX.fill();
    CX.beginPath(); CX.moveTo(13,wb+6); CX.lineTo(16,wb+4); CX.lineTo(13,wb+9); CX.fill();
    // Head
    CX.fillStyle = '#991b1b';
    CX.beginPath(); CX.arc(0, wb - 11, 7, 0, 6.28); CX.fill();
    CX.fillStyle='rgba(0,0,0,0.25)'; CX.beginPath(); CX.arc(2,wb-11,5,0,6.28); CX.fill();
    // Curved horns (large)
    CX.fillStyle = '#450000';
    CX.beginPath(); CX.moveTo(-5,wb-16); CX.quadraticCurveTo(-12,wb-28,-7,wb-34); CX.quadraticCurveTo(-4,wb-36,-3,wb-30); CX.quadraticCurveTo(-6,wb-26,-2,wb-16); CX.fill();
    CX.beginPath(); CX.moveTo(5,wb-16); CX.quadraticCurveTo(12,wb-28,7,wb-34); CX.quadraticCurveTo(4,wb-36,3,wb-30); CX.quadraticCurveTo(6,wb-26,2,wb-16); CX.fill();
    // Eyes (menacing red glow)
    CX.fillStyle = EE.demon; CX.shadowColor=EE.demon; CX.shadowBlur=10+pulse*8;
    CX.beginPath(); CX.ellipse(-2.5,wb-12,2.5,1.8,0,0,6.28); CX.fill();
    CX.beginPath(); CX.ellipse(2.5,wb-12,2.5,1.8,0,0,6.28); CX.fill();
    CX.shadowBlur=0;
    // Brow ridges
    CX.strokeStyle='#450000'; CX.lineWidth=2;
    CX.beginPath(); CX.moveTo(-6,wb-15); CX.lineTo(-0.5,wb-14); CX.stroke();
    CX.beginPath(); CX.moveTo(6,wb-15); CX.lineTo(0.5,wb-14); CX.stroke();
  }

  function _drawWraith(e, wb, EE) {
    const floatWave = Math.sin(F * 0.07 + e.ph) * 3;
    const pulse = Math.sin(F * 0.05 + e.ph) * 0.3 + 0.7;
    // Outer aura (large, transparent)
    const auraGrad = CX.createRadialGradient(floatWave, wb, 0, floatWave, wb, T * 0.55);
    auraGrad.addColorStop(0, `rgba(99,40,200,${0.15*pulse})`);
    auraGrad.addColorStop(0.5, `rgba(80,20,160,${0.10*pulse})`);
    auraGrad.addColorStop(1, 'rgba(0,0,0,0)');
    CX.fillStyle=auraGrad; CX.beginPath(); CX.arc(floatWave,wb,T*0.55,0,6.28); CX.fill();
    // Lower body — fade out (no legs, wispy tendrils)
    for(let i=0;i<4;i++){
      const tox=floatWave*(i%2===0?1:-1)*0.6, toyBase=wb+8+i*4;
      const tAlpha=(0.5-i*0.1)*pulse;
      const tw=5-i*0.8;
      CX.globalAlpha=tAlpha;
      CX.fillStyle='#312e81';
      CX.beginPath(); CX.ellipse(tox*(0.5+i*0.2), toyBase, tw, tw*0.7, floatWave*0.1, 0, 6.28); CX.fill();
    }
    CX.globalAlpha=1;
    // Robe body (dark indigo)
    const robeGrad = CX.createLinearGradient(0,wb-10,0,wb+6);
    robeGrad.addColorStop(0,'#4338ca'); robeGrad.addColorStop(1,'#312e81');
    CX.fillStyle=robeGrad;
    CX.beginPath(); CX.ellipse(floatWave*0.2, wb, 8, 11, 0, 0, 6.28); CX.fill();
    // Robe sheen
    CX.fillStyle='rgba(150,130,255,0.12)'; CX.beginPath(); CX.ellipse(-2+floatWave*0.2,wb-3,4,6,-0.3,0,6.28); CX.fill();
    // Hood/head
    CX.fillStyle = '#312e81';
    CX.beginPath(); CX.arc(floatWave*0.3, wb - 11, 7, 0, 6.28); CX.fill();
    // Hood shadow
    CX.fillStyle='rgba(0,0,0,0.35)'; CX.beginPath(); CX.arc(floatWave*0.3+2,wb-10,5,0,6.28); CX.fill();
    // Void-dark face
    CX.fillStyle = '#1a1730';
    CX.beginPath(); CX.ellipse(floatWave*0.3, wb - 11, 4.5, 4, 0, 0, 6.28); CX.fill();
    // Glowing eyes (intense)
    const eyePulse = Math.sin(F*0.12+e.ph)*0.5+0.5;
    CX.fillStyle = EE.wraith; CX.shadowColor=EE.wraith; CX.shadowBlur=12+eyePulse*8;
    CX.beginPath(); CX.arc(-2.5+floatWave*0.3, wb-12, 2.2, 0, 6.28); CX.fill();
    CX.beginPath(); CX.arc(2.5+floatWave*0.3, wb-12, 2.2, 0, 6.28); CX.fill();
    CX.shadowBlur=0;
    // Spectral particles floating upward
    if(F%4===0){
      const px=(e.x+0.5)*T, py=(e.y+0.5)*T;
      spawnP(e.x, e.y, 1, {col:'#818cf8',spd:0.4,life:0.8,r:1.5,gv:-0.02});
    }
  }

  return { tickPlayer, tickEnemy, drawPlayer, drawEnemy };
})();

//  DUNGEON BREAK — ABYSS EDITION  v6.0  — enemies.js
//  Enemy AI, separation, pathfinding, trap system
// =====================================================================

function tickENE(dt) {
  const diff = getDiff(LV);
  ENE.forEach((e, ei) => {
    if (!e.alive) { e.dAnim = Math.max(0, e.dAnim - dt); return; }
    e.ph += .04 * dt * TARGET_FPS;
    if (e.atkC > 0)   e.atkC    = Math.max(0, e.atkC - dt);
    if (e.hitFlash > 0) e.hitFlash = Math.max(0, e.hitFlash - dt);

    const dx = P.x - e.x, dy = P.y - e.y, dist = Math.hypot(dx, dy);
    const sightR = e.type === 'wraith' ? 9 : 7;
    if (dist < sightR) e.alertT = Math.min(e.alertT + dt, 1.33);
    else if (e.alertT > 0) e.alertT -= dt * 0.5;

    const spdMul = e.type === 'wraith' ? 1.55 : e.type === 'demon' ? 1.3 : e.type === 'ghoul' ? 1.1 : 1;
    const topSpd = diff.espd * spdMul;

    if (e.alertT > 0.33 && dist > .4) {
      e.vx += (dx / dist) * topSpd * .18 * dt;
      e.vy += (dy / dist) * topSpd * .18 * dt;
    } else if (e.alertT <= 0.33) {
      e.vx += Math.cos(e.ph * .7) * topSpd * .04 * dt;
      e.vy += Math.sin(e.ph * .7) * topSpd * .04 * dt;
    }

    // Separation
    ENE.forEach((o, oi) => {
      if (oi === ei || !o.alive) return;
      const sd = Math.hypot(e.x - o.x, e.y - o.y);
      if (sd < .85 && sd > .001) {
        e.vx += (e.x - o.x) / sd * .18 * dt;
        e.vy += (e.y - o.y) / sd * .18 * dt;
      }
    });

    const spd2 = Math.hypot(e.vx, e.vy);
    if (spd2 > topSpd * dt) { e.vx = e.vx / spd2 * topSpd * dt; e.vy = e.vy / spd2 * topSpd * dt; }
    e.vx *= Math.pow(0.82, dt * TARGET_FPS);
    e.vy *= Math.pow(0.82, dt * TARGET_FPS);

    if (!solidAt(e.x + e.vx, e.y)) e.x += e.vx; else e.vx *= -.4;
    if (!solidAt(e.x, e.y + e.vy)) e.y += e.vy; else e.vy *= -.4;

    // Attack player
    if (dist < .62 && e.atkC <= 0) {
      e.atkC = 1.0;
      if (!P.shieldActive && P.dcd <= 0 && !P.dead) playerTakeDamage(1);
    }

    // Tick animation state
    AnimSystem.tickEnemy(e, dt);
  });
}

function tickTraps(dt) {
  TRAPS.forEach(t => {
    t.timer += dt;
    const active = t.type === 'spike' ? true : (t.timer % 2.0) < 0.92;
    if (t.type === 'fire' && active && F % 4 === 0) {
      spawnP(t.x, t.y, 2, { col: Math.random() < .5 ? '#f97316' : '#fde68a', spd: .5, life: 0.35, r: 2.5, gv: -.04 });
    }
    if (!active) return;
    if (!P.shieldActive && P.dcd <= 0 && !P.dead && Math.abs(P.x - t.x) < .55 && Math.abs(P.y - t.y) < .55) {
      playerTakeDamage(1);
    }
  });
}
